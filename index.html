// v3.7: 初回チュートリアル。先輩大家🧑‍🏫の吹き出しが基本動作を順番に案内（スキップ可・完了は端末に記録）。
// v3.12: 対象ボタンはPC用パネル（btn-*）とスマホ用バー（m-*）で別物なので、候補を並べて
// 「実際に画面に出ている方」を選ぶ。従来はPC用のidだけを見ており、スマホではすべての対象が
// 非表示（実サイズ0）だったため、吹き出しが毎回画面左上に固定され上部の情報バーに被っていた。
const TUTORIAL_STEPS = [
  { targets: ['m-work', 'btn-work'], text: 'まずは💼「働く」で種銭を作ろう。長押しで連続で稼げるぞ。' },
  { targets: ['m-search', 'btn-open-search'], text: '次は🏘️「物件を探す」。1回ごとに行動力1。何度も足を運ぶほど出物に近づく。' },
  { targets: ['btn-open-listings', 'm-menu'], text: '見つけた物件は🗂️市場一覧に並ぶ（スマホは≡メニューの中）。「買付を検討」から満額か指値で申し込もう。指値は断られることもある。' },
  { targets: ['btn-open-listings', 'm-menu'], text: '支払いは現金一括か融資。融資なら頭金をスライダーで自由に決めて、4つの銀行の審査結果を見比べよう。' },
  { targets: ['m-next', 'btn-next-month-desk'], text: '📅「翌月へ進む」と家賃が入り、行動力が全回復する。ここからは君の腕次第だ！' },
];
// 候補のうち実際に表示されている（実サイズを持つ）ものを返す
function visibleTutTarget(ids) {
  for (const id of ids) {
    const e = document.getElementById(id);
    if (!e) continue;
    const r = e.getBoundingClientRect();
    if (r.width > 0 && r.height > 0) return e;
  }
  return null;
}
let tutIdx = -1, tutBubble = null;
function startTutorial() { tutIdx = 0; renderTutStep(); }
function endTutorial() {
  localStorage.setItem('lm_tutorial_done', '1');
  tutBubble?.remove(); tutBubble = null;
  document.querySelectorAll('.tut-hl').forEach(e => e.classList.remove('tut-hl', 'ring-4', 'ring-amber-400'));
  tutIdx = -1;
}
function renderTutStep() {
  if (tutIdx < 0) return;
  tutBubble?.remove(); tutBubble = null;
  document.querySelectorAll('.tut-hl').forEach(e => e.classList.remove('tut-hl', 'ring-4', 'ring-amber-400'));
  if (tutIdx >= TUTORIAL_STEPS.length) { endTutorial(); return; }
  const stp = TUTORIAL_STEPS[tutIdx];
  const target = visibleTutTarget(stp.targets);
  if (!target) { tutIdx += 1; renderTutStep(); return; }
  target.classList.add('tut-hl', 'ring-4', 'ring-amber-400');
  tutBubble = el(`<div class="fixed z-[65]" style="visibility:hidden; left:0; top:0;">
    <div class="relative bg-white rounded-xl shadow-2xl p-3 text-xs space-y-2 border-2 border-amber-400">
      <div class="font-bold text-slate-800">🧑‍🏫 先輩大家（${tutIdx + 1}/${TUTORIAL_STEPS.length}）</div>
      <div class="text-slate-700 leading-relaxed">${stp.text}</div>
      <div class="flex gap-2">
        <button class="tut-next flex-1 bg-amber-500 hover:bg-amber-600 text-white rounded py-1.5 font-bold">${tutIdx === TUTORIAL_STEPS.length - 1 ? 'はじめる！' : '次へ ▶'}</button>
        <button class="tut-skip text-slate-500 px-2">スキップ</button>
      </div>
      <div class="tut-arrow absolute"></div>
    </div></div>`);
  document.body.appendChild(tutBubble);
  placeTutBubble(tutBubble, target.getBoundingClientRect());
  tutBubble.querySelector('.tut-next').addEventListener('click', () => { tutIdx += 1; renderTutStep(); });
  tutBubble.querySelector('.tut-skip').addEventListener('click', endTutorial);
}

// v3.12: 吹き出しを「対象ボタンに重ならない空いている側」へ置き、対象を指す三角を出す。
// 従来は対象の258px左に固定していたため、幅の狭いスマホでは必ず左端(8,8)へ丸められ、
// 上部の情報バーに文字が被ったうえ何を指しているのか分からなくなっていた。
function placeTutBubble(bubble, r) {
  const vw = window.innerWidth, vh = window.innerHeight, M = 8, GAP = 12, A = 8;
  const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
  const w = Math.min(260, vw - M * 2);
  bubble.style.width = w + 'px';
  const h = bubble.offsetHeight;                       // 幅確定後に実測する
  let left, top, dir;
  if (r.left - w - GAP >= M) {                         // 対象の左に置く（PCの右パネル）
    dir = 'right'; left = r.left - w - GAP; top = clamp(r.top - 10, M, vh - h - M);
  } else if (r.right + w + GAP <= vw - M) {            // 対象の右に置く（PCの左パネル）
    dir = 'left'; left = r.right + GAP; top = clamp(r.top - 10, M, vh - h - M);
  } else if (r.top - h - GAP >= M) {                   // 対象の上に置く（スマホ下部バー）
    dir = 'down'; left = clamp(r.left + r.width / 2 - w / 2, M, vw - w - M); top = r.top - h - GAP;
  } else {                                             // 対象の下に置く（スマホ上部バー）
    dir = 'up'; left = clamp(r.left + r.width / 2 - w / 2, M, vw - w - M); top = clamp(r.bottom + GAP, M, vh - h - M);
  }
  bubble.style.left = Math.round(left) + 'px';
  // 対象の上に置く場合は下端を基準にする。文字が後から折り返して高さが伸びても、
  // 吹き出しは上へ伸びるだけで対象ボタンに被らない（高さの実測値に依存しない）。
  if (dir === 'down') { bubble.style.top = 'auto'; bubble.style.bottom = Math.round(vh - r.top + GAP) + 'px'; }
  else { bubble.style.bottom = 'auto'; bubble.style.top = Math.round(top) + 'px'; }
  const ax = clamp(r.left + r.width / 2 - left, 16, w - 16);
  const ay = clamp(r.top + r.height / 2 - top, 16, h - 16);
  const arrow = bubble.querySelector('.tut-arrow');
  const base = 'position:absolute;width:0;height:0;';
  if (dir === 'down')       arrow.style.cssText = `${base}left:${ax - A}px;bottom:${-A * 2}px;border-left:${A}px solid transparent;border-right:${A}px solid transparent;border-top:${A * 2}px solid #fbbf24;`;
  else if (dir === 'up')    arrow.style.cssText = `${base}left:${ax - A}px;top:${-A * 2}px;border-left:${A}px solid transparent;border-right:${A}px solid transparent;border-bottom:${A * 2}px solid #fbbf24;`;
  else if (dir === 'right') arrow.style.cssText = `${base}top:${ay - A}px;right:${-A * 2}px;border-top:${A}px solid transparent;border-bottom:${A}px solid transparent;border-left:${A * 2}px solid #fbbf24;`;
  else                      arrow.style.cssText = `${base}top:${ay - A}px;left:${-A * 2}px;border-top:${A}px solid transparent;border-bottom:${A}px solid transparent;border-right:${A * 2}px solid #fbbf24;`;
  bubble.style.visibility = 'visible';
}

function save(){ localStorage.setItem(SAVE_KEY, L.serialize(state)); }
function load(){
  const raw = localStorage.getItem(SAVE_KEY);
  if(!raw) return false;
  state = L.deserialize(raw);
  state.stats = state.stats || { buys: 0, sales: 0, profitSales: 0, junkFlips: 0, hadLoan: false };
  state.stats.junkRepairs = state.stats.junkRepairs || 0;
  state.badges = state.badges || [];
  state.favorites = state.favorites || [];
  state.notifications = state.notifications || [];
  state.nextNotifId = state.nextNotifId || 1;
  state.salesSearch = state.salesSearch || { spent: 0, threshold: null };   // v3: 営業進捗
  state.nextPropertyId = state.nextPropertyId || 1;
  // v3.5: 旧採番バグで衝突したIDを修復（一覧と詳細が別物件を指す不具合の根治）
  const dd = L.dedupePropertyIds(state);
  if (dd.fixed) { state = dd.state; console.info(`物件IDの重複を${dd.fixed}件修復しました`); }
  return true;
}

function openMobileDrawer() {
  const m = document.getElementById('mobile-drawer');
  m.classList.remove('hidden');
  const close = () => { m.classList.add('hidden'); m.innerHTML = ''; };
  const g = state.goal;
  const pct = Math.max(0, Math.min(100, Math.round((g.type === 'networth' ? L.netWorth(state) : L.monthlyCF(state)) / g.amount * 100)));
  const unread = (state.notifications || []).filter(n => !n.read).length;
  const item = (id, label) => `<button id="${id}" class="w-full text-left bg-slate-50 hover:bg-slate-100 rounded-lg px-3 py-3 text-sm font-bold flex justify-between items-center">${label}</button>`;
  const box = el(`<div class="absolute inset-0"><div class="absolute inset-0 bg-black/40" id="dr-backdrop"></div>
    <div class="absolute top-0 right-0 bottom-0 w-72 max-w-[85%] bg-white shadow-2xl p-3 space-y-2 overflow-y-auto">
      <div class="flex justify-between items-center"><h2 class="font-bold">≡ メニュー</h2><button id="dr-close" class="text-slate-400 text-2xl leading-none">✕</button></div>
      <div class="bg-slate-50 rounded-lg p-2 text-xs">
        <div class="flex justify-between font-bold text-slate-700"><span>🎯 目標達成度</span><span>${pct}%</span></div>
        <div class="w-full bg-slate-200 rounded-full h-2 mt-1 overflow-hidden"><div class="bg-emerald-500 h-2" style="width:${pct}%"></div></div>
      </div>
      ${item('dr-listings', `🗂️ 物件市場（${state.market.length}件）`)}
      ${item('dr-notifs', `🔔 通知${unread ? `（未読${unread}）` : ''}`)}
      ${item('dr-props', `🏠 所有物件・売却センター（${state.properties.length}件）`)}
      ${item('dr-assets', '💰 資産・バランスシート')}
      ${item('dr-credit', '📊 信用度・銀行取引')}
      ${item('dr-log', '📜 ログ履歴')}
      <div class="bg-slate-50 rounded-lg p-2 text-xs space-y-1">
        <div class="font-bold text-slate-700 mb-1">🎓 スキル状況</div>
        ${skillRow('目利き力', 'appraisal')}${skillRow('交渉力', 'negotiation')}${skillRow('自主管理', 'selfmgmt')}
      </div>
      <div class="flex gap-2 pt-1 border-t">
        <button id="dr-bgm" class="flex-1 border rounded-lg py-2 text-sm">🎵 BGM</button>
        <button id="dr-mute" class="flex-1 border rounded-lg py-2 text-sm">${muted ? '🔇 消音中' : '🔊 音あり'}</button>
        <button id="dr-reset" class="flex-1 border rounded-lg py-2 text-sm text-red-600">リセット</button>
      </div>
    </div></div>`);
  m.innerHTML = ''; m.appendChild(box);
  const go = (fn) => { close(); fn(); };
  m.querySelector('#dr-backdrop').addEventListener('click', close);
  m.querySelector('#dr-close').addEventListener('click', close);
  m.querySelector('#dr-listings').addEventListener('click', () => go(openListingsModal));
  m.querySelector('#dr-notifs').addEventListener('click', () => go(openNotificationsModal));
  m.querySelector('#dr-props').addEventListener('click', () => go(() => openKpiModal('props')));
  m.querySelector('#dr-assets').addEventListener('click', () => go(() => openKpiModal('cash')));
  m.querySelector('#dr-credit').addEventListener('click', () => go(() => openKpiModal('credit')));
  m.querySelector('#dr-log').addEventListener('click', () => go(openLogModal));
  m.querySelector('#dr-bgm').addEventListener('click', () => go(openBgmModal));
  m.querySelector('#dr-mute').addEventListener('click', () => { setMuted(!muted); updateMuteButton(); close(); });
  m.querySelector('#dr-reset').addEventListener('click', () => { if (confirm('データをリセットしますか？')) { localStorage.removeItem(SAVE_KEY); location.reload(); } });
}

function pushLog(msg){ state.log = state.log || []; state.log.unshift(msg); if(state.log.length>50) state.log.pop(); }
function gainExp(skill, base){ state.skills[skill].exp += Math.round(base * (state.expMult||1)); }

        <div class="flex justify-between text-[11px] font-bold text-slate-700 mb-1"><span>🎯 目標達成度</span><span>${pct}%</span></div>
        <div class="w-full bg-slate-100 rounded-full h-2 overflow-hidden"><div class="bg-emerald-500 h-2 rounded-full" style="width:${pct}%"></div></div>
      </div>
      <button id="btn-bs-toggle" class="w-full text-[11px] font-bold text-slate-700 underline">${bsDetailOpen ? '▲ バランスシートを閉じる' : '▶ バランスシート詳細'}</button>
      <div id="bs-detail" class="space-y-1 text-xs border-t pt-2 ${bsDetailOpen ? '' : 'hidden'}">

        <div class="flex justify-between"><span>総資産</span><b>${L.yen(L.totalAssetsV2(state))}</b></div>
        <div class="flex justify-between"><span>総負債</span><b class="text-red-600">${L.yen(L.totalDebt(state))}</b></div>
        <div class="flex justify-between"><span>税リスク</span><span class="${risk === '低' ? 'text-blue-600' : risk === '中' ? 'text-yellow-600' : 'text-red-600'} font-bold">${risk}</span></div>

// v3.5: 売却センターの一括査定モード状態（モーダルをHUDから開き直すとリセット）
let bulkMode = false;

// 左上の4KPIアイコン（💰🏠📈📊）をタップすると、それぞれの内訳・詳細を表示する。
function openKpiModal(which, keepBulk = false) {
  if (which === 'props' && !keepBulk) bulkMode = false;
  const m = document.getElementById('kpi-modal');
  m.classList.remove('hidden'); m.classList.add('flex'); m.innerHTML = '';
  const close = () => { m.classList.add('hidden'); m.classList.remove('flex'); m.innerHTML = ''; };
  let title = '', body = '';
  if (which === 'cash') {
    title = '💰 資産スナップショット';
    body = `<table class="w-full text-sm">
      <tr><td>手元現金</td><td class="text-right font-bold">${L.yen(state.cash)}</td></tr>
      <tr class="border-t"><td>総資産（現金＋物件時価）</td><td class="text-right">${L.yen(L.totalAssetsV2(state))}</td></tr>
      <tr><td>総負債（残債）</td><td class="text-right text-red-600">-${L.yen(L.totalDebt(state))}</td></tr>
      <tr class="border-t font-bold"><td>純資産</td><td class="text-right text-emerald">${L.yen(L.netWorth(state))}</td></tr>
    </table>
    ${!state.isIncorporated ? `<div class="mt-4 pt-4 border-t">
      <h3 class="font-bold text-sm mb-1">🏢 法人化</h3>
      <p class="text-[11px] text-slate-500 mb-2">設立費用 ${L.yen(L.CONFIG.corporateSetupCost)}。以降、NOIへの課税が法人税率（${L.CONFIG.corporateTaxRate * 100}%）に固定されます。</p>
      <button id="btn-incorporate" class="w-full bg-navy text-white rounded py-2 text-sm ${state.cash < L.CONFIG.corporateSetupCost ? 'opacity-40' : ''}" ${state.cash < L.CONFIG.corporateSetupCost ? 'disabled' : ''}>法人を設立する</button>
    </div>` : '<div class="mt-4 pt-4 border-t text-sm font-bold text-navy">🏢 法人化済み</div>'}`;
  } else if (which === 'props') {
    // v3.5: 売却センター。名義・売出中・修繕中・入居状況をバッジで常時表示し、複数まとめて査定できる。
    const corpN = state.properties.filter(p => p.owner === 'corp').length;
    const persN = state.properties.length - corpN;
    title = `🏠 所有物件・売却センター（${state.properties.length}件）`;
    const header = state.properties.length ? `
      <div class="flex items-center justify-between text-xs mb-1">
        <div class="font-bold text-slate-700">👤個人${persN}件 ・ 🏢法人${corpN}件</div>
        <button id="kpi-bulk-toggle" class="border rounded px-2 py-1 font-bold ${bulkMode ? 'bg-navy text-white' : 'text-navy'}">${bulkMode ? '✕ まとめて査定を終了' : '☑ まとめて査定'}</button>
      </div>
      ${bulkMode ? '<div class="text-[11px] text-slate-500 mb-1">査定したい物件にチェック → 下の「査定する」（1件につき行動力-5）</div>' : ''}` : '';
    body = state.properties.length ? `${header}<div class="space-y-1">${state.properties.map(p => {
      const occ = p.units.length ? Math.round(p.units.filter(u => u.occupied).length / p.units.length * 100) : 0;
      const listing = (state.listings || []).find(l => l.propertyId === p.id);
      const badges = [
        p.owner === 'corp' ? '<span class="bg-navy text-white rounded px-1">🏢法人</span>' : '<span class="bg-slate-200 text-slate-700 rounded px-1">👤個人</span>',
        listing ? `<span class="bg-amber-500 text-white rounded px-1">📢売出中${listing.listedMonths + 1}ヶ月目</span>` : '',
        p.repairJob ? `<span class="bg-amber-100 text-amber-700 rounded px-1">🔨修繕中 残り${p.repairJob.monthsLeft}ヶ月</span>` : '',
        (!p.repairJob && p.repairState < 20) ? '<span class="bg-red-100 text-red-700 rounded px-1">⚠️要修繕</span>' : '',
        occ >= 100 ? '<span class="bg-emerald-100 text-emerald-700 rounded px-1">満室</span>' : `<span class="bg-slate-100 text-slate-600 rounded px-1">入居${occ}%</span>`,
      ].filter(Boolean).join(' ');
      const la = p.lastAppraisal;   // v3.6: 査定結果は物件に保存され、一覧に残り続ける
      const laAge = la ? (state.month - la.month === 0 ? '今月' : `${state.month - la.month}ヶ月前`) : '';
      return `<div class="w-full border rounded p-2 text-xs ${bulkMode ? '' : 'hover:bg-slate-50'}">
        <div class="kpi-prop flex items-center gap-2 ${bulkMode ? '' : 'cursor-pointer'}" data-id="${p.id}">
          ${bulkMode ? `<input type="checkbox" class="kpi-check w-4 h-4 shrink-0" data-id="${p.id}">` : ''}
          ${renderBuildingSVG(p, 'w-10 h-10')}
          <div class="min-w-0 flex-1"><div class="font-bold">${p.name || p.label}</div>
          <div class="text-slate-500">${p.label}｜利回り${(p.grossYield * 100).toFixed(1)}%・修繕度${p.repairState}%</div>
          <div class="mt-0.5 space-x-1 text-[11px]">${badges}</div></div>
        </div>
        ${la ? `<div class="mt-1 pt-1 border-t flex items-center justify-between"><span>査定額 <b class="text-emerald-700">${L.yen(la.amount)}</b> <span class="text-slate-500">（${laAge}）</span></span><button class="kpi-sell bg-emerald text-white rounded px-2 py-1" data-id="${p.id}">売出設定へ</button></div>` : ''}
      </div>`;
    }).join('')}</div>
    ${bulkMode ? '<button id="kpi-bulk-run" class="w-full bg-navy text-white rounded py-2 text-sm font-bold mt-2">🔍 チェックした物件をまとめて査定する</button>' : ''}` : '<div class="text-slate-500 text-sm">まだ物件を所有していません。営業→買付で増やしましょう。</div>';
  } else if (which === 'cf') {
    title = '📈 月間キャッシュフロー内訳';
    const total = L.monthlyCF(state);
    const rows = state.properties.map(p => {
      const cf = p.history.at(-1)?.cf ?? 0;
      return `<tr class="border-t"><td>${p.name || p.label}</td><td class="text-right ${cf >= 0 ? 'text-emerald' : 'text-red-600'}">${L.yen(cf)}</td></tr>`;
    }).join('');
    body = `<table class="w-full text-sm">${rows || '<tr><td class="text-slate-500 py-2">まだ物件収支の記録がありません（買付後、翌月から計上）</td></tr>'}
      <tr class="border-t-2 font-bold"><td>物件からの月CF合計</td><td class="text-right ${total >= 0 ? 'text-emerald' : 'text-red-600'}">${L.yen(total)}</td></tr></table>
      <div class="text-[11px] text-slate-500 mt-2">※ 種銭は「💼 働く」で行動力を使って稼げます（自動では増えません）。</div>`;
  } else if (which === 'credit') {
    title = '📊 信用度と銀行取引実績';
    const rel = state.bankRelations || {};
    const bankRows = Object.keys(L.BANKS).map(k => {
      const r = rel[k] || { loans: 0, paidOff: 0 };
      return `<tr class="border-t"><td>${L.BANKS[k].label}</td><td class="text-right">融資${r.loans}件・完済${r.paidOff}件</td></tr>`;
    }).join('');
    body = `<div class="text-sm mb-2">現在の信用度: <b>${state.creditScore}</b></div>
      <div class="text-[11px] text-slate-500 mb-1">信用度が高いほど審査に通りやすく、取引実績（完済）が増えると金利優遇を受けやすくなります。</div>
      <table class="w-full text-sm">${bankRows}</table>`;
  }
  const boxEl = el(`<div class="bg-white rounded-xl p-4 w-full max-w-md max-h-[75vh] overflow-y-auto space-y-2">
    <div class="flex justify-between items-center"><h2 class="font-bold">${title}</h2><button id="kpi-close" class="text-slate-400 text-xl">✕</button></div>
    <div>${body}</div></div>`);
  m.appendChild(boxEl);
  boxEl.querySelector('#kpi-close').addEventListener('click', close);
  if (which === 'cash' && !state.isIncorporated && state.cash >= L.CONFIG.corporateSetupCost) {
    boxEl.querySelector('#btn-incorporate').addEventListener('click', () => {
      const r = L.incorporate(state);
      state = r.state;
      pushLog('🏢 法人を設立した（法人名義の購入・法人への移転が可能に）');
      save(); render(); close();
      playIncorporationCelebration();
    });
  }
  boxEl.querySelectorAll('.kpi-prop').forEach(b => b.addEventListener('click', () => {
    if (bulkMode) return;   // まとめて査定中は行クリックで詳細を開かない（チェック操作を優先）
    close(); openDetail(parsePropId(b.dataset.id), 'owned', () => openKpiModal('props', true)); }));
  boxEl.querySelector('#kpi-bulk-toggle')?.addEventListener('click', () => {
    bulkMode = !bulkMode; close(); openKpiModal('props', true);
  });
  boxEl.querySelector('#kpi-bulk-run')?.addEventListener('click', () => {
    const ids = [...boxEl.querySelectorAll('.kpi-check')].filter(c => c.checked).map(c => parsePropId(c.dataset.id));
    if (!ids.length) { alert('査定したい物件にチェックを入れてください'); return; }
    const cost = ids.length * 5;
    if (state.actionPower < cost) { alert(`行動力が足りません（${ids.length}件で${cost}必要）`); return; }
    ids.forEach(id => { const r = L.requestAppraisal(state, id, Math.random); state = r.state; });
    pushLog(`まとめて査定を依頼した（${ids.length}件・行動力-${cost}）`);
    save(); renderPanelRight();
    close(); openKpiModal('props', true);
  });
  boxEl.querySelectorAll('.kpi-sell').forEach(b => b.addEventListener('click', (e) => {
    e.stopPropagation();
    const id = parsePropId(b.dataset.id);
    const pp = state.properties.find(x => x.id === id);
    if (!pp?.lastAppraisal) return;
    close();
    openSellWithAppraisal(id, pp.lastAppraisal.amount);
  }));
}

// v3.5: 一括査定の結果から直接売出設定へ（査定は取得済み。既に売出中なら管理画面へ）
// v3.6: 売り出し後・戻るボタンで売却センターへ戻る
function openSellWithAppraisal(propId, appraisal) {
  const p = state.properties.find(x => x.id === propId);
  if (!p) return;
  const m = document.getElementById('sell-modal');
  m.classList.remove('hidden'); m.classList.add('flex'); m.innerHTML = '';
  const close = () => { m.classList.add('hidden'); m.classList.remove('flex'); m.innerHTML = ''; };
  const back = () => openKpiModal('props', true);
  const listing = (state.listings || []).find(l => l.propertyId === propId);
  if (listing) { drawListingManage(m, p, listing, close); return; }
  drawPricing(m, p, appraisal, close, back);
}

          <div class="min-w-0"><div class="font-bold truncate">${p.name || p.label} ${from === 'owned' ? `<span class="text-[11px] align-middle ${p.owner === 'corp' ? 'bg-navy text-white' : 'bg-slate-200 text-slate-700'} rounded px-1.5 py-0.5">${p.owner === 'corp' ? '🏢法人' : '👤個人'}</span>` : ''}</div><div class="text-[11px] text-slate-500">${p.label}</div></div></div>
      </div>
      ${from === 'market' ? `<div class="px-3 py-2 border-b shrink-0"><button id="dt-buy" class="w-full bg-navy hover:bg-navy-dark text-white rounded-lg py-2 text-sm font-bold shadow">💰 この物件に買付を入れる（行動力-10）</button></div>` : ''}
      <div class="flex border-b text-sm shrink-0">${tabs.map((t, i) => `<button class="dt-tab flex-1 py-2 ${i === active ? 'border-b-2 border-navy font-bold' : 'text-slate-500'}" data-i="${i}">${t}</button>`).join('')}</div>
      <div id="dt-body" class="p-4 text-sm overflow-y-auto min-h-0 flex-1"></div>

    m.appendChild(box);
    box.querySelector('#dt-close').addEventListener('click', close);
    if (back) box.querySelector('#dt-back').addEventListener('click', () => { close(); back(); });
    box.querySelectorAll('.dt-tab').forEach(b => b.addEventListener('click', () => { active = Number(b.dataset.i); draw(); }));
    const body = box.querySelector('#dt-body');
    if (active === 0) {
      body.innerHTML = overviewTab(p, from);
      body.querySelector('.dt-map-jump')?.addEventListener('click', () => { close(); jumpToMapWithBubble(p, from); });
      body.querySelector('.dt-to-corp')?.addEventListener('click', () => { close(); openCorpTransfer(p.id); });
    }
    if (active === 1) { body.innerHTML = rentRollTab(p, from); wireFillButtons(body, p, from); }
    if (active === 2) body.innerHTML = plTab(p);
    if (active === 3) body.innerHTML = financeTab(p);
    if (from === 'owned') {
      box.querySelector('.dt-diy')?.addEventListener('click', () => { close(); openDiyGame(p.id); });
      box.querySelector('.dt-repair')?.addEventListener('click', () => { close(); openRepairService(p.id); });
      box.querySelector('.dt-valueup')?.addEventListener('click', () => { close(); openValueUp(p.id); });
      box.querySelector('.dt-sell').addEventListener('click', () => { close(); openSell(p.id); });
    }
    // v3.1: 市場物件はタブの上の固定「買付」ボタンからいつでも買付へ（買付画面から「戻る」でここへ戻れる）
    box.querySelector('#dt-buy')?.addEventListener('click', () => { close(); openPurchase(p.id, () => openDetail(propId, from, back)); });
    // v3.3: 詳細画面からお気に入りをトグル（★は地図の⭐表示にも即反映）
    box.querySelector('#dt-fav')?.addEventListener('click', () => {
      const fav = (state.favorites || []).some(f => f.propertyId === p.id);
      if (fav) {
        state = L.removeFavorite(state, p.id).state;
      } else {
        const r = L.addFavorite(state, p.id);
        if (!r.added) { if (r.reason === 'limit') alert(`お気に入りは最大${L.FAVORITE_LIMIT}件までです`); return; }
        state = r.state;
      }
      save(); render(); draw();
    });
  };
  draw();
}

// 修繕度ゲージ: 緑(60%以上)→黄(20〜59%)→赤(20%未満)で一目で分かる。20%割れは管理会社アラートを併記。
function repairGauge(pct) {
  const color = pct >= 60 ? 'bg-emerald' : pct >= 20 ? 'bg-yellow-400' : 'bg-red-500';
  const warn = pct < 20 ? '<span class="text-red-600 text-[11px] font-bold ml-1">⚠️管理会社から修繕依頼</span>' : '';
  return `<span class="inline-flex items-center gap-1 align-middle">
    <span class="inline-block w-24 bg-slate-200 rounded h-2 overflow-hidden"><span class="${color} block h-2" style="width:${Math.max(0, Math.min(100, pct))}%"></span></span>
    <b>${pct}%</b>${warn}</span>`;
}

function noiTable(p) {
  const gpi = L.gpiAnnual(p), egi = L.egiAnnual(p), opex = L.opexAnnual(p), noi = L.noiAnnualV2(p);
  return `<table class="w-full text-xs mt-2">
      <tr><td>満室想定年収（GPI）</td><td class="text-right">${L.yen(gpi)}</td></tr>
      <tr><td>現況の空室損</td><td class="text-right">-${L.yen(L.vacancyLossAnnual(p))}</td></tr>
      <tr><td>現況年収（EGI）</td><td class="text-right">${L.yen(egi)}</td></tr>
      <tr><td>年間運営費（管理費・修繕積立・PM・固都税）</td><td class="text-right">-${L.yen(opex)}</td></tr>
      <tr class="font-bold border-t"><td>NOI（営業純収益）</td><td class="text-right">${L.yen(noi)}</td></tr>
    </table>`;
}

function overviewTab(p, from) {
  const svg = renderBuildingSVG(p, 'w-24 h-24 mb-2');
  if (from === 'owned') {
    const occN = p.units.filter(u => u.occupied).length, occ = p.units.length ? Math.round(occN / p.units.length * 100) : 0;
    const lastCf = p.history.at(-1)?.cf;
    const gain = (p.timeValue || 0) - (p.boughtPrice || 0);
    return `<div class="flex flex-col items-center">${svg}</div>
      <div class="space-y-2">
      <div class="grid grid-cols-2 gap-2 text-xs">
        <div class="bg-slate-50 rounded-lg p-2">現況入居率<div class="font-bold ${occ >= 100 ? 'text-emerald-600' : occ > 0 ? 'text-amber-600' : 'text-red-600'}">${occ}%</div></div>
        <div class="bg-slate-50 rounded-lg p-2">直近月CF<div class="font-bold ${(lastCf ?? 0) >= 0 ? 'text-emerald-600' : 'text-red-600'}">${lastCf == null ? '—' : L.yen(lastCf)}</div></div>
        <div class="bg-slate-50 rounded-lg p-2">現在の時価<div class="font-bold">${L.yen(p.timeValue)}</div></div>
        <div class="bg-slate-50 rounded-lg p-2">購入差額<div class="font-bold ${gain >= 0 ? 'text-emerald-600' : 'text-red-600'}">${gain >= 0 ? '+' : ''}${L.yen(gain)}</div></div>
      </div>
      <div class="flex items-center justify-between text-xs p-2 bg-slate-50 rounded-lg">🔧 修繕度 ${repairGauge(p.repairState)}${p.repairJob ? `<span class="text-amber-600 font-bold ml-1">🔨修繕中 残り${p.repairJob.monthsLeft}ヶ月</span>` : ''}</div>
      ${(p.valueUpLevel || p.valueUpJob) ? `<div class="flex items-center justify-between text-xs p-2 bg-indigo-50 rounded-lg"><span>✨ バリューアップ ${p.valueUpLevel ? `Lv${p.valueUpLevel}` : ''}</span>${p.valueUpJob ? `<span class="text-indigo-600 font-bold">工事中 残り${p.valueUpJob.monthsLeft}ヶ月</span>` : '<span class="text-slate-500">家賃UP済み</span>'}</div>` : ''}
      <div class="text-xs text-slate-600">${p.structure}造・築${p.builtAge}年・${p.units.length}戸／残存償却 ${p.deprRemaining}ヶ月</div>
      ${buildingComposition(p) ? `<div class="text-xs text-slate-600">🏠 ${buildingComposition(p)}</div>` : ''}
      ${p.junkFlags.length ? `<div class="text-xs text-red-600 font-bold">訳あり: ${p.junkFlags.join('・')}</div>` : ''}
      <div class="flex items-center justify-between text-xs p-2 bg-slate-50 rounded-lg"><span>名義</span><b>${p.owner === 'corp' ? '🏢 法人' : '👤 個人'}</b></div>
      ${p.lastAppraisal ? `<div class="flex items-center justify-between text-xs p-2 bg-slate-50 rounded-lg"><span>査定額（参考）</span><b>${L.yen(p.lastAppraisal.amount)} <span class="text-slate-500 font-normal">（${state.month - p.lastAppraisal.month === 0 ? '今月' : `${state.month - p.lastAppraisal.month}ヶ月前`}）</span></b></div>` : ''}
      ${(state.isIncorporated && p.owner !== 'corp') ? `<button class="dt-to-corp w-full border border-navy text-navy rounded-lg py-2 text-xs font-bold hover:bg-slate-50 ${(p.loan || p.reformLoan) ? 'opacity-40' : ''}" ${(p.loan || p.reformLoan) ? 'disabled' : ''}>🏢 法人へ売却（移転）${(p.loan || p.reformLoan) ? '｜ローン完済後に可能' : ''}</button>` : ''}
      <button class="dt-map-jump w-full border rounded-lg py-2 text-xs text-navy font-bold hover:bg-slate-50">📍 地図で場所を見る</button>
      ${noiTable(p)}</div>`;
  }
  const cut = p.origPrice && p.price < p.origPrice;
  return `<div class="flex flex-col items-center">${svg}</div>
    <div class="space-y-2 text-sm">
    <div class="font-bold text-center">売出価格: ${cut ? `<span class="line-through text-slate-400">${L.yen(p.origPrice)}</span> ` : ''}<span class="text-emerald-700 text-lg">${L.yen(p.price)}</span></div>
    <div class="text-center text-xs text-slate-500">${p.structure}造・築${p.builtAge}年・${p.units.length}戸${buildingComposition(p) ? `／${buildingComposition(p)}` : ''}</div>
    <div class="flex items-center justify-center text-xs p-2 bg-slate-50 rounded-lg">🔧 修繕度 ${repairGauge(p.repairState)}</div>
    ${p.junkFlags.length ? `<div class="text-xs text-red-600 font-bold text-center">訳あり: ${p.junkFlags.join('・')}</div>` : ''}
    ${p.sellerUrgency ? `<div class="text-xs text-rose-600 font-bold text-center">🏃 売り急ぎ: ${p.sellerUrgency.reason}そうだ</div>` : ''}
    <button class="dt-map-jump w-full border rounded-lg py-2 text-xs text-navy font-bold hover:bg-slate-50">📍 地図で場所を見る</button>
    ${noiTable(p)}</div>`;
}

function rentRollTab(p, from) {
  return `<table class="w-full text-xs">
    <tr class="text-slate-500"><th class="text-left">部屋</th><th>間取り</th><th>家賃</th><th>状況</th><th></th></tr>
    ${p.units.map((u, i) => `<tr class="border-t"><td>${i + 1}号室</td>
      <td class="text-center">${u.layout ? `${u.layout}・${u.sizeSqm}㎡` : '—'}</td>
      <td class="text-center">${L.yen(u.rent)}</td>
      <td class="text-center">${u.occupied ? '<span class="text-emerald">入居中</span>' : `<span class="text-red-600">空室${u.vacantMonths}ヶ月</span>`}</td>
      <td class="text-right">${!u.occupied && from === 'owned' ? `<button class="fill-ad text-xs border rounded px-1" data-i="${i}">広告料(家賃1ヶ月)</button>
        <button class="fill-self text-xs border rounded px-1" data-i="${i}">自主客付け(-30)</button>` : ''}</td></tr>`).join('')}
  </table>`;
}

// v3.10: 建物構成サマリ（例: 1K×6戸・平均22㎡）
function buildingComposition(p) {
  if (!p.units?.length || !p.units[0].layout) return '';
  const layout = p.units[0].layout;
  const avg = Math.round(p.units.reduce((s, u) => s + (u.sizeSqm || 0), 0) / p.units.length);
  return `${layout}×${p.units.length}戸・平均${avg}㎡`;
}

function plTab(p) {
  if (!p.history.length) return '<div class="text-slate-500">購入後、月が進むと収支が記録されます。</div>';
  const equity = p.boughtPrice ? p.boughtPrice - (p.loan ? p.loan.principal : 0) + Math.round(p.boughtPrice * L.CONFIG.closingCostRate) : 0;
  const ccr = equity > 0 ? (p.cum.cf / equity * 100).toFixed(1) : '-';
  return `<div class="mb-1">累計CF: <b class="${p.cum.cf >= 0 ? 'text-emerald' : 'text-red-600'}">${L.yen(p.cum.cf)}</b>（${p.cum.months}ヶ月）／ 自己資金回収率 ${ccr}%</div>
    <div class="max-h-60 overflow-y-auto"><table class="w-full text-xs">
    <tr class="text-slate-500"><th>月</th><th>家賃</th><th>空室損</th><th>運営費</th><th>利息</th><th>元金</th><th>税</th><th>CF</th></tr>
    ${[...p.history].reverse().map(h => `<tr class="border-t"><td>${h.month}</td><td>${L.yen(h.rentIn)}</td><td>${L.yen(h.vacancyLoss)}</td>
      <td>${L.yen(h.opex)}</td><td>${L.yen(h.interest)}</td><td>${L.yen(h.principal)}</td><td>${L.yen(h.tax)}</td>
      <td class="${h.cf >= 0 ? 'text-emerald' : 'text-red-600'}">${L.yen(h.cf)}</td></tr>`).join('')}
    </table></div>`;
}

function financeTab(p) {
  if (p.loan) {
    const rem = L.remainingPrincipal(p.loan.principal, p.loan.rate, p.loan.years, p.loan.monthsPaid);
    return `<div class="space-y-1"><div>借入先: <b>${L.BANKS[p.loan.bankKey].label}</b></div>
      <div>金利 ${(p.loan.rate * 100).toFixed(2)}%・期間${p.loan.years}年・返済済${p.loan.monthsPaid}ヶ月</div>
      <div>残債: <b>${L.yen(rem)}</b></div></div>`;
  }
  const rs = L.reviewAllBanks(p, p.price, 0.2, state);
  return `<div class="text-xs text-slate-500 mb-1">頭金2割とした場合の事前審査見込み:</div>` + bankReviewList(rs);
}

function bankReviewList(rs) {
  return `<div class="space-y-1">${rs.map(r => r.approved
    ? `<div class="border rounded p-2"><b>◯ ${r.label}</b><div class="text-xs">金利${(r.terms.rate * 100).toFixed(2)}%・${r.terms.years}年・月返済${L.yen(r.terms.monthlyPay)}・要自己資金${L.yen(r.terms.requiredCash)}</div></div>`
    : `<div class="border rounded p-2 bg-slate-50"><b>✕ ${r.label}</b><div class="text-xs text-red-600">${r.reasons.map(x => x.msg).join('／')}</div></div>`).join('')}</div>`;
}

function wireFillButtons(body, p, from) {
  body.querySelectorAll('.fill-ad').forEach(b => b.addEventListener('click', () => {
    const r = L.fillVacancy(state, p.id, Number(b.dataset.i), 'ad', Math.random);
    state = r.state; pushLog(r.success ? '広告が効いて入居が決まった！' : '広告を出したが今月は決まらず…');
    save(); render(); openDetail(p.id, from);
  }));
  body.querySelectorAll('.fill-self').forEach(b => b.addEventListener('click', () => {
    if (state.actionPower < 30) { alert('行動力が足りません'); return; }
    const r = L.fillVacancy(state, p.id, Number(b.dataset.i), 'self', Math.random);
    state = r.state; pushLog(r.success ? '自主客付けに成功！（自主管理+10 EXP）' : '内見はあったが決まらず…（自主管理+10 EXP）');
    save(); render(); openDetail(p.id, from);
  }));
}

// back を渡すと「← 戻る」を表示し、元のモーダルへ戻れる。
function openPurchase(propId, back) {
  const p = state.market.find(x => x.id === propId);
  if (!p) return;
  const m = document.getElementById('purchase-modal');
  m.classList.remove('hidden'); m.classList.add('flex'); m.innerHTML = '';
  const close = () => { m.classList.add('hidden'); m.classList.remove('flex'); m.innerHTML = ''; };
  const blocked = p.refusedOffer && !p.staleFlag;   // 指値を断られた物件（満額は常に可）
  const box = el(`<div class="bg-white rounded-xl p-5 w-full max-w-md space-y-2">
    <div class="flex justify-between items-center gap-2">
      ${back ? '<button id="of-back" class="text-xs text-navy">← 戻る</button>' : '<span></span>'}
      <button id="of-x" class="text-slate-400 text-xl leading-none shrink-0">✕</button></div>
    <div><h2 class="font-bold">${p.name || p.label} に買付を入れる（行動力-10）</h2><div class="text-[11px] text-slate-500">${p.label}</div></div>
    <div class="text-sm">売出価格: ${p.origPrice && p.price < p.origPrice ? `<span class="line-through text-slate-400">${L.yen(p.origPrice)}</span> → ` : ''}<b>${L.yen(p.price)}</b>${p.origPrice && p.price < p.origPrice ? ' <span class="text-[11px] bg-red-500 text-white rounded px-1">値下げ中</span>' : ''}${p.staleFlag ? ' <span class="text-[11px] bg-amber-500 text-white rounded px-1">売れ残り中</span>' : ''}</div>
    ${p.sellerUrgency ? `<div class="text-xs"><span class="bg-rose-100 text-rose-700 rounded px-1.5 py-0.5 font-bold">🏃 売り急ぎ</span> <span class="text-slate-600">${p.sellerUrgency.reason}そうだ</span></div>` : ''}
    <button id="of-detail" class="w-full text-xs text-navy underline">📋 レントロール・収支・融資の詳細を見る</button>
    <button id="of-full" class="w-full border rounded py-2 text-sm font-bold">満額 ${L.yen(p.price)}（必ず通る）</button>
    <div class="pt-1 border-t ${blocked ? 'opacity-50' : ''}">
      <div class="text-sm">指値 <b id="of-cutpct">5%</b>引き → <b id="of-cutprice">${L.yen(Math.round(p.price * 0.95))}</b></div>
      <input id="of-slider" type="range" min="1" max="99" step="1" value="5" class="w-full" ${blocked ? 'disabled' : ''}>
      <div class="flex items-center gap-2 text-xs">
        <span class="text-slate-500 shrink-0">成功率</span>
        <div class="flex-1 bg-slate-100 rounded-full h-2 overflow-hidden"><div id="of-gauge" class="h-2 rounded-full"></div></div>
        <span id="of-chance" class="font-bold w-12 text-right"></span></div>
      <div id="of-note" class="text-[11px] mt-1"></div>
      <button id="of-submit" class="w-full bg-navy text-white rounded py-2 text-sm font-bold mt-1" ${blocked ? 'disabled' : ''}>この指値で申し込む（行動力-10）</button>
      ${blocked ? '<div class="text-[11px] text-red-600 mt-1">指値を断られた物件です（値下げか売れ残りのタイミングで再交渉できます）</div>' : ''}
    </div>
    <button id="of-cancel" class="w-full text-slate-500 text-sm">やめる</button></div>`);
  m.appendChild(box);
  // 詳細は買付モーダルを閉じてから開く（重なりで見えなくなる問題を解消）。詳細から買付へ「戻る」で戻れる。
  box.querySelector('#of-detail').addEventListener('click', () => { close(); openDetail(propId, 'market', () => openPurchase(propId, back)); });
  box.querySelector('#of-cancel').addEventListener('click', close);
  box.querySelector('#of-x').addEventListener('click', close);
  if (back) box.querySelector('#of-back').addEventListener('click', () => { close(); back(); });
  // v3.8: 指値スライダー。取次ライン内は通常交渉、超えると「ダメ元」（背景あり）／「非常識」（背景なし・評判リスク）に変化
  const lv = L.skillLevel(state.skills.negotiation.exp);
  const line = L.maxBrokerCut(p, lv);
  const slider = box.querySelector('#of-slider');
  const submit = box.querySelector('#of-submit');
  const noteEl = box.querySelector('#of-note');
  const gauge = box.querySelector('#of-gauge');
  const update = () => {
    const cut = Number(slider.value) / 100;
    const chance = L.offerSuccessChance(p, cut, lv);
    box.querySelector('#of-cutpct').textContent = `${slider.value}%`;
    box.querySelector('#of-cutprice').textContent = L.yen(Math.max(10000, Math.round(p.price * (1 - cut))));
    box.querySelector('#of-chance').textContent = `${Math.round(chance * 100)}%`;
    gauge.style.width = `${Math.max(3, Math.round(chance * 100))}%`;
    gauge.style.background = chance >= 0.5 ? '#059669' : chance >= 0.2 ? '#f59e0b' : '#dc2626';
    if (cut <= line) {
      noteEl.textContent = `🏢「頑張って交渉します」（取次ライン: ${Math.round(line * 100)}%引きまで）`;
      noteEl.className = 'text-[11px] mt-1 text-slate-600';
      submit.textContent = 'この指値で申し込む（行動力-10）';
      submit.className = 'w-full bg-navy text-white rounded py-2 text-sm font-bold mt-1';
    } else if (L.hasSellerBackground(p)) {
      noteEl.textContent = '🏢「売主さんには事情があるようです。ダメ元で当たってみます…」（失敗してもペナルティなし）';
      noteEl.className = 'text-[11px] mt-1 text-amber-700 font-bold';
      submit.textContent = '🙏 ダメ元で打診してもらう（行動力-10）';
      submit.className = 'w-full bg-amber-500 hover:bg-amber-600 text-white rounded py-2 text-sm font-bold mt-1';
    } else {
      noteEl.textContent = '🏢「この価格はさすがに…無謀な指値は評判に関わりますよ」（失敗すると交渉力の評判ダウン）';
      noteEl.className = 'text-[11px] mt-1 text-red-600 font-bold';
      submit.textContent = '⚠️ 非常識な指値を強行する（行動力-10）';
      submit.className = 'w-full bg-red-600 hover:bg-red-700 text-white rounded py-2 text-sm font-bold mt-1';
    }
  };
  slider.addEventListener('input', update);
  update();
  const doOffer = (cut) => {
    if (state.actionPower < 10) { alert('行動力が足りません'); return; }
    const r = L.makeOffer(state, propId, cut, Math.random);
    state = r.state; save();
    // 買付は一番ドキドキするポイント。結果を即出さず「交渉中…」の溜め演出を挟んでから発表する。
    playOfferSuspense(r.accepted, cut, () => {
      if (!r.accepted) {
        pushLog(r.penalized
          ? `${p.label} への無謀な指値で評判を落とした…（交渉-15 EXP）`
          : `${p.label} への指値は断られた…（値下げか売れ残りを待てば再指値できる）`);
        render(); close();
        if (r.counterProposal) showCounterProposal(r.counterProposal);
        return;
      }
      pushLog(`${p.label} の買付が通った！（${L.yen(r.price)}・交渉+${5 + Math.round(cut * 100)} EXP）`);
      showPayment(propId, r.price, close);
    });
  };
  box.querySelector('#of-full').addEventListener('click', () => doOffer(0));
  submit.addEventListener('click', () => doOffer(Number(slider.value) / 100));
}

// v3.8: 鬼指値で断られたときの「逆提案」。不動産会社が予算感に合う激安寄りの物件を紹介してくれる。
function showCounterProposal(cp) {
  const m = document.getElementById('purchase-modal');
  m.classList.remove('hidden'); m.classList.add('flex'); m.innerHTML = '';
  const close = () => { m.classList.add('hidden'); m.classList.remove('flex'); m.innerHTML = ''; };
  const box = el(`<div class="bg-white rounded-xl p-5 w-full max-w-md space-y-3">
    <div class="flex justify-between items-center"><h2 class="font-bold">🙋 不動産会社からの逆提案</h2><button id="cp-x" class="text-slate-400 text-xl leading-none">✕</button></div>
    <div class="text-sm text-slate-700 bg-slate-50 rounded-lg p-3">「その予算感でしたら…実は<b>こういう物件</b>がありますよ。訳ありですが、価格は頑張れます」</div>
    <div class="flex items-center gap-2 border rounded-lg p-2">${renderBuildingSVG(cp, 'w-14 h-14')}
      <div class="min-w-0 flex-1 text-left">
        <div class="font-bold truncate">${cp.name || cp.label}</div>
        <div class="text-[11px] text-slate-500">${cp.label}</div>
        <div class="text-sm"><span class="line-through text-slate-400">${L.yen(cp.origPrice)}</span> → <b class="text-emerald-700">${L.yen(cp.price)}</b>・表面${(cp.grossYield * 100).toFixed(1)}%</div>
        ${cp.junkFlags?.length ? `<div class="text-[11px] text-red-600 font-bold">訳あり: ${cp.junkFlags.join('・')}</div>` : ''}
        ${cp.sellerUrgency ? `<div class="text-[11px] text-rose-600 font-bold">🏃 売り急ぎ: ${cp.sellerUrgency.reason}そうだ</div>` : ''}
      </div></div>
    <button id="cp-detail" class="w-full bg-navy text-white rounded-lg py-2 text-sm font-bold">📋 詳細を見る</button>
    <button id="cp-later" class="w-full text-slate-500 text-sm">あとで（🗂️市場一覧に追加されています）</button></div>`);

}

// 買付の結果発表: 交渉中の溜め（ドラムロール＋鼓動）→ ドラマチックな成立/残念の発表 → done()。
// v3.2: 買付の結果発表をリッチに。暗転＋金色の鼓動リング→成立は放射バースト＋判子風「成立」スタンプ、
// 見送りは画面シェイク＋「見送り」スタンプ。コスト・確率などのロジックは一切変更しない。
function playOfferSuspense(accepted, cut, done) {
  const overlay = el(`<div class="fixed inset-0 z-[70] overflow-hidden flex items-center justify-center p-4" style="background:radial-gradient(ellipse at center, rgba(15,23,42,0.88) 0%, rgba(2,6,23,0.97) 100%);">
    <style>
      @keyframes ofs-ring { 0% { transform: scale(0.55); opacity: 0.9; } 100% { transform: scale(2.6); opacity: 0; } }
      @keyframes ofs-stamp { 0% { transform: scale(3.2) rotate(14deg); opacity: 0; } 55% { transform: scale(0.92) rotate(-8deg); opacity: 1; } 75% { transform: scale(1.07) rotate(-8deg); } 100% { transform: scale(1) rotate(-8deg); opacity: 1; } }
      @keyframes ofs-shake { 0%,100% { transform: translateX(0); } 20% { transform: translateX(-14px); } 40% { transform: translateX(11px); } 60% { transform: translateX(-7px); } 80% { transform: translateX(4px); } }
      @keyframes ofs-burst { 0% { transform: scale(0.2) rotate(0deg); opacity: 1; } 100% { transform: scale(1.8) rotate(22deg); opacity: 0; } }
      @keyframes ofs-float { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(-110px) scale(1.4); opacity: 0; } }
    </style>
    <div id="ofs-rings" class="absolute inset-0 flex items-center justify-center pointer-events-none"></div>
    <div id="ofs-burst-layer" class="absolute inset-0 flex items-center justify-center pointer-events-none"></div>
    <div id="ofs-box" class="relative text-center text-white space-y-4">
      <div id="ofs-emoji" class="text-7xl" style="filter: drop-shadow(0 0 25px rgba(251,191,36,0.4));">🤝</div>
      <div id="ofs-title" class="text-2xl font-bold tracking-[0.3em]">交 渉 中<span id="ofs-dots" class="tracking-normal"></span></div>
      <div id="ofs-sub" class="text-sm opacity-80">${cut > 0 ? `指値 -${Math.round(cut * 100)}% で相手の返事を待っています…` : '満額で申し込み中…'}</div>
    </div></div>`);
  document.body.appendChild(overlay);
  const dotsEl = overlay.querySelector('#ofs-dots');
  const emojiEl = overlay.querySelector('#ofs-emoji');
  const titleEl = overlay.querySelector('#ofs-title');
  const subEl = overlay.querySelector('#ofs-sub');
  const ringsEl = overlay.querySelector('#ofs-rings');
  const boxEl = overlay.querySelector('#ofs-box');
  // 溜め: ドット点滅＋鼓動＋外へ広がる金色リング＋ドラムロール音
  let dots = 0;
  const dotTimer = setInterval(() => { dots = (dots + 1) % 4; dotsEl.textContent = '.'.repeat(dots); }, 300);
  emojiEl.style.transition = 'transform 0.35s ease-in-out';
  const beatTimer = setInterval(() => {
    emojiEl.style.transform = emojiEl.style.transform === 'scale(1.15)' ? 'scale(1)' : 'scale(1.15)';
  }, 350);
  const ringTimer = setInterval(() => {
    const ring = el(`<div class="absolute rounded-full" style="width:190px;height:190px;border:2px solid rgba(251,191,36,0.55);animation: ofs-ring 1.1s ease-out forwards;"></div>`);
    ringsEl.appendChild(ring);
    setTimeout(() => ring.remove(), 1150);
  }, 420);
  sfxDrumroll();
  const suspenseMs = cut > 0 ? 2000 : 1100;   // 満額は必ず通るので溜めは短め
  setTimeout(() => {
    clearInterval(dotTimer); clearInterval(beatTimer); clearInterval(ringTimer);
    ringsEl.innerHTML = '';
    if (accepted) {
      // 金色の放射バースト＋判子風「成立」スタンプ＋キラキラ
      overlay.querySelector('#ofs-burst-layer').appendChild(el(
        `<div style="width:460px;height:460px;border-radius:50%;background:repeating-conic-gradient(rgba(251,191,36,0.45) 0 10deg, transparent 10deg 30deg);animation: ofs-burst 0.9s ease-out forwards;"></div>`));
      emojiEl.remove();
      boxEl.insertBefore(el(
        `<div class="mx-auto w-44 h-44 rounded-full bg-white/95 shadow-2xl flex items-center justify-center" style="border:9px solid #dc2626;animation: ofs-stamp 0.55s cubic-bezier(.2,1.4,.4,1) forwards;">
          <span class="text-5xl font-black" style="color:#dc2626;">成立</span></div>`), titleEl);
      ['✨', '💴', '✨', '🎉', '💴', '✨'].forEach((c, i) => {
        const sp = el(`<div class="absolute text-3xl pointer-events-none" style="left:${18 + i * 13}%;top:58%;animation: ofs-float 1.2s ease-out ${i * 0.09}s forwards;opacity:0;">${c}</div>`);
        overlay.appendChild(sp);
      });
      titleEl.textContent = '買付 成立！';
      titleEl.className = 'text-3xl font-black tracking-widest';
      titleEl.style.background = 'linear-gradient(180deg,#fde68a,#f59e0b)';
      titleEl.style.webkitBackgroundClip = 'text';
      titleEl.style.backgroundClip = 'text';
      titleEl.style.color = 'transparent';
      subEl.textContent = '契約に進みましょう';
      sfxFanfare();
    } else {
      boxEl.style.animation = 'ofs-shake 0.5s';
      emojiEl.remove();
      boxEl.insertBefore(el(
        `<div class="mx-auto w-44 h-44 rounded-full flex items-center justify-center" style="border:9px solid #94a3b8;background:rgba(255,255,255,0.06);animation: ofs-stamp 0.55s cubic-bezier(.2,1.4,.4,1) forwards;">
          <span class="text-5xl font-black" style="color:#cbd5e1;">見送り</span></div>`), titleEl);
      titleEl.textContent = '残念…見送りに';
      titleEl.className = 'text-3xl font-bold text-red-400 tracking-widest';
      subEl.textContent = '値下げか売れ残りのタイミングで再指値できます';
      sfxFail();
    }
    setTimeout(() => { overlay.remove(); done(); }, accepted ? 1400 : 1600);
  }, suspenseMs);
}

function showPayment(propId, price, close) {
  const p = state.market.find(x => x.id === propId);
  const m = document.getElementById('purchase-modal');
  const cashNeed = price + Math.round(price * L.CONFIG.closingCostRate);
  let downRatio = 0.2;
  let buyOwner = 'personal';   // v3.5: 法人設立済みなら購入名義を選べる
  const draw = () => {
    m.innerHTML = '';
    // v3.6: 頭金は0%〜「手持ち現金で払える上限」まで1%刻みで自由に設定できる（3割上限を撤廃）
    const closing = Math.round(price * L.CONFIG.closingCostRate);
    const maxDownPct = Math.max(0, Math.min(100, Math.floor((state.cash - closing) / price * 100)));
    if (downRatio > maxDownPct / 100) downRatio = maxDownPct / 100;
    const rs = L.reviewAllBanks(p, price, downRatio, state);
    const box = el(`<div class="bg-white rounded-xl p-5 w-full max-w-md space-y-2 max-h-[85vh] overflow-y-auto">
      <div class="flex justify-between items-start gap-2"><h2 class="font-bold">支払い方法（成約価格 ${L.yen(price)}）</h2><button id="pay-x" class="text-slate-400 text-xl leading-none shrink-0">✕</button></div>
      ${state.isIncorporated ? `<div class="flex gap-2 text-sm items-center"><span class="font-bold shrink-0">名義:</span>
        <label class="flex-1 border rounded p-1.5 text-center cursor-pointer ${buyOwner === 'personal' ? 'bg-slate-100 font-bold border-navy' : ''}"><input type="radio" name="buy-owner" value="personal" ${buyOwner === 'personal' ? 'checked' : ''} class="mr-1">👤 個人</label>
        <label class="flex-1 border rounded p-1.5 text-center cursor-pointer ${buyOwner === 'corp' ? 'bg-slate-100 font-bold border-navy' : ''}"><input type="radio" name="buy-owner" value="corp" ${buyOwner === 'corp' ? 'checked' : ''} class="mr-1">🏢 法人</label></div>` : ''}
      <button id="pay-cash" class="w-full border rounded py-2 text-sm ${state.cash < cashNeed ? 'opacity-40' : ''}" ${state.cash < cashNeed ? 'disabled' : ''}>現金一括（必要 ${L.yen(cashNeed)}）</button>
      <div class="text-sm font-bold pt-2 border-t">融資（4行同時審査）</div>
      <div class="text-sm">頭金 <b id="pay-down-pct">${Math.round(downRatio * 100)}%</b>＝<span id="pay-down-amt" class="font-bold">${L.yen(Math.round(price * downRatio))}</span>
        <span class="text-[11px] text-slate-500">（諸費用込み必要現金 <span id="pay-down-need">${L.yen(Math.round(price * downRatio) + Math.round(price * L.CONFIG.closingCostRate))}</span>）</span></div>
      <input id="pay-down-range" type="range" min="0" max="${maxDownPct}" step="1" value="${Math.round(downRatio * 100)}" class="w-full">
      <div class="text-[11px] text-slate-500">スライドで自由に設定できます（手持ち現金で払える上限 ${maxDownPct}%）。離すと審査結果が更新されます。</div>
      <div id="pay-banks"></div>
      <button id="pay-cancel" class="w-full text-slate-500 text-sm">買付を取り下げる（ペナルティなし）</button></div>`);
    m.appendChild(box);
    const banksDiv = box.querySelector('#pay-banks');
    banksDiv.innerHTML = rs.map(r => r.approved
      ? `<div class="border rounded p-2 mb-1"><div class="flex justify-between items-center"><b>◯ ${r.label}</b>
          <button class="pay-bank bg-navy text-white rounded px-2 py-1 text-sm" data-k="${r.bankKey}">借りる</button></div>
          <div class="text-xs">金利${(r.terms.rate * 100).toFixed(2)}%・${r.terms.years}年・月返済${L.yen(r.terms.monthlyPay)}・要自己資金${L.yen(r.terms.requiredCash)}</div></div>`
      : `<div class="border rounded p-2 mb-1 bg-slate-50"><b>✕ ${r.label}</b>
          <div class="text-xs text-red-600">${r.reasons.map(x => x.msg).join('／')}</div></div>`).join('');
    const range = box.querySelector('#pay-down-range');
    range.addEventListener('input', () => {
      const pct = Number(range.value);
      box.querySelector('#pay-down-pct').textContent = `${pct}%`;
      box.querySelector('#pay-down-amt').textContent = L.yen(Math.round(price * pct / 100));
      box.querySelector('#pay-down-need').textContent = L.yen(Math.round(price * pct / 100) + closing);
    });
    range.addEventListener('change', () => { downRatio = Number(range.value) / 100; draw(); });
    box.querySelectorAll('input[name="buy-owner"]').forEach(rb => rb.addEventListener('change', e => { buyOwner = e.target.value; draw(); }));
    const ownerLabel = () => buyOwner === 'corp' ? '🏢法人名義' : '👤個人名義';
    box.querySelector('#pay-cash').addEventListener('click', () => {
      const r = L.buyPropertyV2(state, propId, { method: 'cash', price, owner: buyOwner });
      state = r.state; r.logs.forEach(pushLog); save(); render(); close(); checkEnd();
      playPurchaseCelebration(p.name || p.label, `${L.yen(price)}（現金一括・${ownerLabel()}）`);
    });
    box.querySelectorAll('.pay-bank').forEach(b => b.addEventListener('click', () => {
      const r = L.buyPropertyV2(state, propId, { method: b.dataset.k, downRatio, price, owner: buyOwner });
      state = r.state; r.logs.forEach(pushLog); save(); render(); close(); checkEnd();
      playPurchaseCelebration(p.name || p.label, `${L.yen(price)}（融資利用・${ownerLabel()}）`);
    }));
    box.querySelector('#pay-cancel').addEventListener('click', () => { pushLog('買付を取り下げた'); close(); });
    box.querySelector('#pay-x').addEventListener('click', () => { pushLog('買付を取り下げた'); close(); });
  };
  draw();
}

// v3.5: 個人所有物件を法人へ売却（移転）する確認画面。時価取引・譲渡税・取得コスト・償却再スタートを明示。
function openCorpTransfer(propId) {
  const p = state.properties.find(x => x.id === propId);
  if (!p) return;
  const m = document.getElementById('sell-modal');
  m.classList.remove('hidden'); m.classList.add('flex'); m.innerHTML = '';
  const close = () => { m.classList.add('hidden'); m.classList.remove('flex'); m.innerHTML = ''; };
  const price = p.timeValue;
  const book = L.bookValueV2(p);
  const gain = Math.max(0, price - book);
  const heldYears = (state.month - (p.boughtMonth ?? state.month)) / 12;
  const capTax = Math.round(gain * (heldYears <= 5 ? L.CONFIG.capGainTaxShort : L.CONFIG.capGainTaxLong));
  const acqCost = Math.round(price * L.CONFIG.corpTransferCostRate);
  const total = capTax + acqCost;
  const box = el(`<div class="bg-white rounded-xl p-5 w-full max-w-md space-y-2">
    <div class="flex justify-between items-start gap-2"><h2 class="font-bold">🏢 ${p.name || p.label} を法人へ売却（移転）</h2><button id="tc-x" class="text-slate-400 text-xl leading-none shrink-0">✕</button></div>
    <table class="w-full text-sm">
      <tr><td>移転価格（現在の時価）</td><td class="text-right font-bold">${L.yen(price)}</td></tr>
      <tr class="border-t"><td>譲渡税（個人側・${heldYears <= 5 ? '短期39%' : '長期20%'}）</td><td class="text-right text-red-600">-${L.yen(capTax)}</td></tr>
      <tr><td>取得コスト（法人側・5%）</td><td class="text-right text-red-600">-${L.yen(acqCost)}</td></tr>
      <tr class="border-t font-bold"><td>支払い合計</td><td class="text-right text-red-600">${L.yen(total)}</td></tr>
    </table>
    <div class="text-xs text-slate-600 bg-slate-50 rounded p-2 space-y-1">
      <div>✅ 以後の課税は法人税率30%（デッドクロス後も40%にならない）</div>
      <div>✅ <b>減価償却が再スタート</b>（中古簡便法・取得価額=現在の時価）</div>
      <div>✅ 売却時の譲渡税が保有期間に関係なく30%に</div>
    </div>
    <button id="tc-run" class="w-full bg-navy text-white rounded py-2 text-sm font-bold ${state.cash < total ? 'opacity-40' : ''}" ${state.cash < total ? 'disabled' : ''}>法人へ移転する（${L.yen(total)} 支払い）</button>
    <button id="tc-cancel" class="w-full text-slate-500 text-sm">やめる</button></div>`);
  m.appendChild(box);
  box.querySelector('#tc-x').addEventListener('click', close);
  box.querySelector('#tc-cancel').addEventListener('click', close);
  box.querySelector('#tc-run').addEventListener('click', () => {
    const r = L.transferToCorp(state, propId);
    if (!r.done) { alert(r.reason === 'cash' ? '現金が足りません' : '移転できませんでした'); return; }
    state = r.state;
    pushLog(`${p.name || p.label} を法人へ移転（譲渡税${L.yen(r.capTax)}・取得コスト${L.yen(r.acqCost)}・償却再スタート）`);
    save(); render(); close();
    // v3.6: 移転も決定的イベントとして判子スタンプ演出に統一
    playStampFx({ stamp: '移転完了', title: '法人名義へ！', sub: `${p.name || p.label}（課税30%・償却再スタート）`, emojis: ['🏢', '📋', '✨', '💴', '✨'] });
  });
}

function openSell(propId) {
  const p = state.properties.find(x => x.id === propId);
  if (!p) return;
  const m = document.getElementById('sell-modal');
  m.classList.remove('hidden'); m.classList.add('flex'); m.innerHTML = '';
  const close = () => { m.classList.add('hidden'); m.classList.remove('flex'); m.innerHTML = ''; };
  const listing = (state.listings || []).find(l => l.propertyId === propId);
  if (listing) { drawListingManage(m, p, listing, close); return; }
  const box = el(`<div class="bg-white rounded-xl p-5 w-full max-w-md space-y-3">
    <div class="flex justify-between items-start gap-2"><h2 class="font-bold">${p.name || p.label} の売却</h2><button id="sl-x" class="text-slate-400 text-xl leading-none shrink-0">✕</button></div>
    <div class="text-sm">まず不動産屋に査定を依頼しよう（行動力-5）</div>
    <button id="sl-appraise" class="w-full bg-navy text-white rounded py-2">査定を依頼する</button>
    <button id="sl-cancel" class="w-full text-slate-500 text-sm">やめる</button></div>`);
  m.appendChild(box);
  box.querySelector('#sl-cancel').addEventListener('click', close);
  box.querySelector('#sl-x').addEventListener('click', close);
  box.querySelector('#sl-appraise').addEventListener('click', () => {
    if (state.actionPower < 5) { alert('行動力が足りません'); return; }
    const r = L.requestAppraisal(state, propId, Math.random);
    state = r.state; save();
    drawPricing(m, p, r.appraisal, close);
  });
}

// v3.5: 売出価格は自由入力。査定はあくまで参考値として表示し、利回りをリアルタイムに見ながら自分で決める。
// v3.6: backを渡すと「← 戻る」を表示し、売り出し後・戻る押下でひとつ前の画面（売却センター等）へ戻る。
function drawPricing(m, p, appraisal, close, back) {
  m.innerHTML = '';
  let price = appraisal;
  const gpi = L.gpiAnnual(p);
  const yieldOf = (v) => (v > 0 ? (gpi / v * 100).toFixed(1) : '-');
  const box = el(`<div class="bg-white rounded-xl p-5 w-full max-w-md space-y-3">
    <div class="flex justify-between items-center gap-2">${back ? '<button id="sl-back" class="text-xs text-navy shrink-0">← 戻る</button>' : ''}<h2 class="font-bold flex-1">売出価格を決める</h2><button id="sl-x2" class="text-slate-400 text-xl leading-none shrink-0">✕</button></div>
    <div class="text-sm">不動産会社の査定額（参考）: <b>${L.yen(appraisal)}</b>（利回り${yieldOf(appraisal)}%）</div>
    <div class="text-center text-2xl font-black text-navy"><span id="sl-price-v">${L.yen(appraisal)}</span></div>
    <input id="sl-price-range" type="range" min="${Math.max(10000, Math.round(appraisal * 0.5))}" max="${Math.round(appraisal * 2)}" step="10000" value="${appraisal}" class="w-full">
    <div class="flex gap-1 text-xs">
      ${[0.9, 1.0, 1.1, 1.2].map(f => `<button class="sl-preset flex-1 border rounded py-1" data-f="${f}">査定×${Math.round(f * 100)}%</button>`).join('')}
    </div>
    <div class="text-center text-sm text-slate-600">この価格の表面利回り <span id="sl-yield" class="font-bold text-lg text-emerald-700">${yieldOf(appraisal)}</span>%
      <div class="text-[11px] text-slate-500">（満室想定・年間家賃収入 ${L.yen(gpi)} 基準）</div></div>
    <div class="text-xs text-slate-500">安くすれば早く売れ、高いほど時間がかかる。訳あり物件を高利回りで仕入れ、通常の利回り水準の価格で売り抜く戦略も。</div>
    <button id="sl-list" class="w-full bg-emerald text-white rounded py-2">この価格で売りに出す</button>
    <button id="sl-cancel2" class="w-full text-slate-500 text-sm">やめる</button></div>`);
  m.appendChild(box);
  const range = box.querySelector('#sl-price-range');
  const updatePrice = () => {
    price = Math.max(10000, Number(range.value));
    box.querySelector('#sl-price-v').textContent = L.yen(price);
    box.querySelector('#sl-yield').textContent = yieldOf(price);
  };
  range.addEventListener('input', updatePrice);
  box.querySelectorAll('.sl-preset').forEach(b => b.addEventListener('click', () => {
    range.value = Math.round(appraisal * Number(b.dataset.f) / 10000) * 10000;
    updatePrice();
  }));
  box.querySelector('#sl-list').addEventListener('click', () => {
    updatePrice();
    state = L.listForSale(state, p.id, price, appraisal).state;
    pushLog(`${p.label} を ${L.yen(price)} で売りに出した（表面${yieldOf(price)}%）`);
    save(); render(); close();
    back?.();   // v3.6: 売りに出したらひとつ前の画面（売却センター等）へ戻る
  });
  box.querySelector('#sl-back')?.addEventListener('click', () => { close(); back(); });
  box.querySelector('#sl-cancel2').addEventListener('click', close);
  box.querySelector('#sl-x2').addEventListener('click', close);
}

function drawListingManage(m, p, listing, close) {
  m.innerHTML = '';
  const downTo = Math.round(listing.askingPrice * 0.95 / 10000) * 10000;
  const box = el(`<div class="bg-white rounded-xl p-5 w-full max-w-md space-y-3">

// ジャンル別の手描き風シルエット。汚れ/ひび/雑草/傾きは svgBuildingParts() の判定を反映する。
const BUILDING_SHAPES = {
  kodate: (wall, roof, win) => `
    <polygon points="15,42 50,16 85,42" fill="${roof}"/>
    <rect x="20" y="42" width="60" height="33" fill="${wall}"/>
    <rect x="44" y="55" width="13" height="20" fill="#78350f"/>
    <rect x="27" y="49" width="11" height="11" fill="${win}"/>
    <rect x="62" y="49" width="11" height="11" fill="${win}"/>`,
  apart: (wall, roof, win) => `
    <rect x="14" y="20" width="66" height="55" fill="${wall}"/>
    <rect x="14" y="20" width="66" height="6" fill="${roof}"/>
    ${[0, 1, 2, 3].map(i => `<rect x="${20 + i * 14}" y="30" width="9" height="9" fill="${win}"/>`).join('')}
    ${[0, 1, 2, 3].map(i => `<rect x="${20 + i * 14}" y="55" width="9" height="9" fill="${win}"/>`).join('')}
    <polyline points="82,75 88,68 82,60 88,52 82,45" fill="none" stroke="#94a3b8" stroke-width="3"/>`,
  tekkotsu: (wall, roof, win) => `
    <rect x="15" y="10" width="70" height="65" fill="${wall}"/>
    <rect x="15" y="10" width="70" height="6" fill="${roof}"/>
    ${[0, 1, 2].flatMap(row => [0, 1, 2, 3].map(col =>
      `<rect x="${20 + col * 15}" y="${18 + row * 18}" width="9" height="9" fill="${win}"/>`)).join('')}`,
  kubun: (wall, roof, win) => `
    <rect x="22" y="5" width="56" height="70" fill="${wall}"/>
    <rect x="22" y="5" width="56" height="6" fill="${roof}"/>
    ${[0, 1, 2, 3].flatMap(row => [0, 1, 2].map(col =>
      `<rect x="${28 + col * 17}" y="${15 + row * 15}" width="10" height="9" fill="${row === 1 && col === 1 ? '#fbbf24' : win}" ${row === 1 && col === 1 ? 'stroke="#fff" stroke-width="1"' : ''}/>`)).join('')}`,
  rc: (wall, roof, win) => `
    <rect x="25" y="2" width="50" height="73" fill="${wall}"/>
    <rect x="25" y="2" width="50" height="6" fill="${roof}"/>
    ${[0, 1, 2, 3, 4].flatMap(row => [0, 1, 2].map(col =>

};

function renderBuildingSVG(p, sizeClass = 'w-16 h-16') {
  const parts = L.svgBuildingParts(p);
  const wall = parts.wake ? '#d8cba8' : '#f1e4c9';
  const roof = { kodate: '#b3542e', apart: '#5b7fa6', tekkotsu: '#5b7fa6', kubun: '#94a3b8', rc: '#64748b' }[parts.shape];
  const win = parts.dirtLevel > 0.6 ? '#475569' : '#7dd3fc';
  const body = BUILDING_SHAPES[parts.shape](wall, roof, win);
  const dirt = parts.dirtLevel > 0.05 ? `<rect x="10" y="10" width="80" height="65" fill="#4b3621" opacity="${(parts.dirtLevel * 0.35).toFixed(2)}"/>` : '';
  const cracks = parts.hasCracks ? `<path d="M40,45 L44,55 L40,65 M60,40 L64,50 L58,58" stroke="#1e293b" stroke-width="1" fill="none" opacity="0.5"/>` : '';
  const weeds = parts.hasWeeds ? `<path d="M18,75 q2,-8 4,0 M22,75 q2,-10 4,0 M74,75 q2,-8 4,0" stroke="#16a34a" stroke-width="2" fill="none"/>` : '';
  return `<svg viewBox="0 0 100 80" class="${sizeClass} shrink-0">
    <g transform="${parts.tilt ? 'rotate(-6 50 70)' : ''}">${body}${dirt}${cracks}${weeds}</g>
  </svg>`;
}

function openRepairService(propId) {
  const p = state.properties.find(x => x.id === propId);
  if (!p) return;
  if (p.repairJob) { alert('既に業者修繕が進行中です'); return; }
  const m = document.getElementById('repair-modal');
  m.classList.remove('hidden'); m.classList.add('flex'); m.innerHTML = '';
  const close = () => { m.classList.add('hidden'); m.classList.remove('flex'); m.innerHTML = ''; };
  const info = L.repairTierInfo(p);
  const cost = L.professionalRepairCost(p);
  const months = L.repairMonthsForCost(cost);   // v3.1: 工期は見積金額で決まる
  const hasReformLoan = !!p.reformLoan;
  const loanAmount = L.reformLoanAmount(cost, state.creditScore);
  const down = cost - loanAmount;
  const box = el(`<div class="bg-white rounded-xl p-5 w-full max-w-md space-y-2">
    <div class="flex justify-between items-start gap-2"><h2 class="font-bold">${p.name || p.label} を業者に依頼（行動力-5）</h2><button id="rp-x" class="text-slate-400 text-xl leading-none shrink-0">✕</button></div>
    <div class="text-sm">工事内容: <b>${info.label}</b></div>
    <div class="text-sm">見積もり: <b>${L.yen(cost)}</b>・工期 <b>${months}ヶ月</b>（完了時に修繕度100%）</div>
    <button id="rp-cash" class="w-full border rounded py-2 text-sm ${state.cash < cost ? 'opacity-40' : ''}" ${state.cash < cost ? 'disabled' : ''}>現金で支払う（${L.yen(cost)}）</button>
    <button id="rp-loan" class="w-full bg-navy text-white rounded py-2 text-sm ${hasReformLoan ? 'opacity-40' : ''}" ${hasReformLoan ? 'disabled' : ''}>
      リフォームローンを利用（頭金${L.yen(down)} + 借入${L.yen(loanAmount)}・金利${(L.CONFIG.reformLoanRate * 100).toFixed(1)}%・${L.CONFIG.reformLoanYears}年）</button>
    ${hasReformLoan ? '<div class="text-xs text-red-600">既存のリフォームローンが残っているため、完済まで新たな借入はできません（現金払いは可）</div>' : '<div class="text-xs text-slate-500">借入可能額は信用度で変動します</div>'}
    <div class="text-xs text-slate-500">工事中はDIY・追加発注はできません。完了は通知でお知らせします。</div>
    <button id="rp-cancel" class="w-full text-slate-500 text-sm">やめる</button></div>`);
  m.appendChild(box);
  box.querySelector('#rp-cancel').addEventListener('click', close);
  box.querySelector('#rp-x').addEventListener('click', close);
  const order = (financed) => {
    if (state.actionPower < 5) { alert('行動力が足りません'); return; }
    if (financed && state.cash < down) { alert('頭金分の現金が足りません'); return; }
    const r = L.startProfessionalRepair(state, propId, financed);
    if (!r.started) { alert('発注できませんでした'); return; }
    state = r.state;
    const pp = state.properties.find(x => x.id === propId);
    pushLog(`${pp.label} の修繕を発注（${financed && r.financed ? `リフォームローン${L.yen(r.loanAmount)}` : `現金${L.yen(r.cost)}`}・工期${r.monthsTotal}ヶ月）`);
    save(); render(); close();
    showRepairEffect(propId, `🔨 修繕開始（${info.label}・工期${r.monthsTotal}ヶ月）`);
  };
  box.querySelector('#rp-cash').addEventListener('click', () => order(false));
  box.querySelector('#rp-loan').addEventListener('click', () => order(true));
}

function openValueUp(propId) {

  if (p.repairJob || p.valueUpJob) { alert('別の工事が進行中です。完了までお待ちください。'); return; }
  const lv = p.valueUpLevel || 0;
  if (lv >= L.VALUE_UP_MAX_LEVEL) { alert(`この物件はバリューアップ上限（${L.VALUE_UP_MAX_LEVEL}回）に達しています。`); return; }
  const m = document.getElementById('repair-modal');
  m.classList.remove('hidden'); m.classList.add('flex'); m.innerHTML = '';
  const close = () => { m.classList.add('hidden'); m.classList.remove('flex'); m.innerHTML = ''; };
  const plans = Object.entries(L.VALUE_UP_PLANS).map(([key, pl]) => {
    const cost = L.valueUpCost(p, key);
    const disabled = state.cash < cost;
    return `<button class="vu-plan w-full border rounded-lg p-2 text-left ${disabled ? 'opacity-40' : 'hover:bg-slate-50'}" data-key="${key}" ${disabled ? 'disabled' : ''}>

    if (!r.started) { alert(r.reason === 'cash' ? '現金が足りません' : '発注できませんでした'); return; }

  }));
}

  const exp = state.skills[key].exp, lv = L.skillLevel(exp), next = L.expToNext(exp);
  return `<div class="flex justify-between text-sm relative" data-skill="${key}"><span class="font-bold text-slate-800">${name} Lv${lv}</span><span class="font-bold text-slate-600">${next===null?'MAX':'次まで'+next}</span></div>`;

// EXPフロート表示・実績バッジトースト。render()の後で毎回呼び、直前状態との差分から自動検知する。
let lastSkillExp = null;
function showExpFloats() {
  if (!state?.skills) return;
  if (lastSkillExp) {
    for (const key of Object.keys(state.skills)) {
      const before = lastSkillExp[key] ?? state.skills[key].exp;
      const gained = state.skills[key].exp - before;
      if (gained !== 0) {
        const row = document.querySelector(`[data-skill="${key}"]`);
        if (row) {
          // v3.8: 評判ダウン（EXP減少）は赤色で見せる
          const f = el(`<span class="absolute right-0 -top-3 text-xs font-bold ${gained > 0 ? 'text-emerald' : 'text-red-600'} exp-float">${gained > 0 ? '+' : ''}${gained} EXP</span>`);
          row.appendChild(f);
          setTimeout(() => f.remove(), 1200);
        }
      }
    }
  }
  lastSkillExp = Object.fromEntries(Object.keys(state.skills).map(k => [k, state.skills[k].exp]));
}

function wireWorkButton(btn) {
  let timer = null, sessionEarned = 0, sessionCount = 0;
  const workOnce = () => {
    const r = L.doWork(state, Math.random);
    if (!r.earned) { stopWork(); return; }
    state = r.state; sessionEarned += r.earned; sessionCount += 1;
    updateHudLive();
    sfxCoin();
    floatEarn(btn, r.earned);
  };
  const startWork = (e) => {
    e.preventDefault();
    if (timer) return;
    if (state.actionPower < 1) { alert('行動力が足りません。翌月へ進むと回復します。'); return; }
    workOnce();
    timer = setInterval(workOnce, 120);
  };
  const stopWork = () => {
    if (timer) { clearInterval(timer); timer = null; }
    if (sessionCount) {
      pushLog(`働いて ${L.yen(sessionEarned)} 稼いだ（行動力-${sessionCount}）`);
      sessionEarned = 0; sessionCount = 0;
      save(); render();
    }
  };
  btn.addEventListener('pointerdown', startWork);
  btn.addEventListener('pointerup', stopWork);
  btn.addEventListener('pointerleave', stopWork);
  btn.addEventListener('pointercancel', stopWork);
}

  const box = el(`<div class="bg-white rounded-xl p-4 w-full max-w-md max-h-[75vh] overflow-y-auto space-y-2">
    <div class="flex justify-between items-center"><h2 class="font-bold">🔔 通知</h2><button id="notifs-close" class="text-slate-400 text-xl">✕</button></div>

    save(); renderPanelRight(); openNotificationsModal();
  }));
  box.querySelectorAll('.notif-check').forEach(b => b.addEventListener('click', () => {
    const id = Number(b.dataset.id);
    const n = notifs.find(x => x.id === id);

    save(); renderPanelRight(); close();

  }));
}

// 値下げ・他決などの通知トースト。✕は表示を消すだけ（未読は残る）、✓は既読化＋物件詳細へ飛ぶ。
const _toasts = [];
function restackToasts() {
  let top = 16;
  _toasts.forEach(t => { t.style.top = top + 'px'; top += (t.offsetHeight || 44) + 8; });
}
function dismissToast(t) {
  const i = _toasts.indexOf(t); if (i < 0) return;
  _toasts.splice(i, 1);
  t.style.transition = 'opacity 0.3s'; t.style.opacity = '0';
  setTimeout(() => t.remove(), 300);
  restackToasts();
}
function showNotifToast(n) {
  const t = el(`<div class="fixed left-1/2 -translate-x-1/2 bg-amber-500 text-white rounded-lg shadow-lg px-3 py-2 z-[60] text-sm font-bold flex items-center gap-2">
    <span class="flex-1">🔔 ${n.message}</span>
    <button class="toast-check bg-white/25 rounded px-2 py-1 text-xs shrink-0" title="物件詳細へ">✓</button>
    <button class="toast-close bg-white/25 rounded px-2 py-1 text-xs shrink-0" title="閉じる">✕</button>
  </div>`);
  document.body.appendChild(t);
  _toasts.push(t);
  restackToasts();
  t.querySelector('.toast-close').addEventListener('click', (e) => { e.stopPropagation(); dismissToast(t); });
  t.querySelector('.toast-check').addEventListener('click', (e) => {
    e.stopPropagation();
    if (n.id != null) state = L.markNotificationRead(state, n.id).state;
    save(); renderPanelRight();
    dismissToast(t);
    openPropertyFromNotif(n);
  });
}
// Enterキーで一番上（最初に出た）トーストから順に閉じる。
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && _toasts.length) { e.preventDefault(); dismissToast(_toasts[0]); }
});

// v3: 営業は1押し=行動力2。ポータルサイト巡回・電話・訪問などの行動がランダムに出て、
// 累計消費が隠し閾値（6〜40）に達すると物件情報を入手する。進捗は月・条件変更を跨いで維持。
const SEARCH_ACTIONS = [
  '🖥️ ポータルサイトを巡回した',
  '📞 不動産屋に電話をかけた',
  '🏢 不動産屋へ飛び込み訪問した',
  '📮 投函チラシ・広告をチェックした',
  '👂 大家仲間の噂話を聞いた',
  '🗺️ 気になるエリアを車で流した',
];
const SEARCH_MISS = [
  '…収穫なし',
  '…それらしい話はあったが空振り',
  '…「良いのが出たら連絡しますよ」',
  '…惜しい物件は既に他で決まっていた',
  '…掘り出し物はまだ見つからない',
];
// v3.11: 平凡（低利回り）物件の淡々とした紹介フレーバー（良い情報ではなく日常の一コマ）
const MUNDANE_LINES = [
  '🖥️ ポータルサイトに普通に載っていた物件を眺めた',
  '📋 長く売りに出ている物件を紹介された',
  '🏢 不動産屋に「一応こんなのも」と勧められた',
  '📰 折込チラシに載っていた売れ残りをチェックした',
  '🤝 業者から「利回りは高くないですが」と案内された',
];

function onSearchPress(box, closeModal) {
  const sel = readSearchSelection();
  if (!sel.genres.length || !sel.areas.length || !sel.ages.length) { alert('ジャンル・エリア・築年帯を1つ以上選んでください'); return { pressed: false }; }
  if (state.actionPower < 1) { alert('行動力が足りません。翌月へ進むと回復します。'); return { pressed: false }; }
  searchSelection = sel;
  const genres = sel.wakeari ? sel.genres.flatMap(k => [k, WAKEARI_MAP[k]]) : sel.genres;
  const r = L.doSalesPress(state, { genres, areas: sel.areas, ages: sel.ages }, Math.random);
  if (!r.pressed) { alert('行動力が足りません。翌月へ進むと回復します。'); return { pressed: false }; }
  state = r.state; save();
  setCityState(state);   // v3.8fix: 新着物件を地図側の状態にも反映（これがないと「地図を見る」が効かない）
  const feed = box.querySelector('#sr-feed');
  feed.querySelector('.sr-empty')?.remove();
  const act = SEARCH_ACTIONS[Math.floor(Math.random() * SEARCH_ACTIONS.length)];
  updateHudLive();
  // v3.11: 平凡（低利回り）物件は淡々と一覧に流す（利回り数字で自分で判断する目利きの場）。長押しは止めない。
  if (r.mundane && r.mundane.length) {
    for (const mp of r.mundane) {
      const ml = MUNDANE_LINES[Math.floor(Math.random() * MUNDANE_LINES.length)];
      const line = el(`<div class="sr-mundane text-slate-500 underline cursor-pointer">${ml}：${mp.name || mp.label}（表面${(mp.grossYield * 100).toFixed(1)}%）</div>`);
      line.addEventListener('click', () => { closeModal(); openDetail(mp.id, 'market', openSearchModal); });
      feed.insertBefore(line, feed.firstChild);
    }
    pushLog(`平凡な出物を${r.mundane.length}件見た（低利回り・売れ残り）`);
    renderPanelRight();
  }
  if (r.found) {
    // v3.5: 自動で一覧へ飛ばず、発見ログをタップで詳細へ（ログは消えず残る）
    const line = el(`<div class="sr-found font-bold text-emerald-700 underline cursor-pointer">${act}…おっ！ ${r.found.name || r.found.label} の情報を掴んだ（タップで詳細）</div>`);
    line.addEventListener('click', () => { closeModal(); openDetail(r.found.id, 'market', openSearchModal); });
    feed.insertBefore(line, feed.firstChild);
    sfxKnock();
    pushLog(r.log);
    box.querySelector('#sr-progress').textContent = '発見！ 続けて探すこともできます';
    renderPanelRight();
    return { pressed: true, found: true };
  }
  const miss = SEARCH_MISS[Math.floor(Math.random() * SEARCH_MISS.length)];
  feed.insertBefore(el(`<div>${act}${miss}</div>`), feed.firstChild);
  box.querySelector('#sr-progress').textContent = `調査継続中（累計 行動力${state.salesSearch.spent}消費）`;
  renderPanelRight();
  return { pressed: true, found: false };
}

function onNextMonth() {
  if (state.properties.length) playCoinCollectAnimation();
  const nextMonth = state.month + 1;
  const settling = (state.pendingSales || []).filter(x => x.settleMonth <= nextMonth)
    .map(x => { const pp = state.properties.find(p => p.id === x.propertyId); return { sale: x, label: pp ? (pp.name || pp.label) : '物件' }; });
  const priorNotifIds = new Set((state.notifications || []).map(n => n.id));
  const r = L.advanceMonth(state, Math.random);
  state = r.state;
  (r.logs || []).forEach(pushLog);
  save(); render();
  const freshNotifs = (state.notifications || []).filter(n => !priorNotifIds.has(n.id));
  freshNotifs.forEach((n, i) => setTimeout(() => showNotifToast(n), 500 + i * 900));
  // v3.6: 売却成立も買付・購入と同じ判子スタンプ演出に統一
  settling.forEach((s, i) => setTimeout(() => playStampFx({
    stamp: '売却成立', title: '売り抜けた！', sub: `${s.label} ／ ${L.yen(s.sale.price)}`,
    emojis: ['💰', '📈', '✨', '💴', '🎉', '✨'],
  }), i * 2700));
  if (r.pendingEvent) { showEvent(r.pendingEvent); return; }
  const withOffer = (state.listings || []).find(l => l.offer);
  if (withOffer) { showOfferModal(withOffer); return; }
  checkEnd();
}

function showEvent(pending) {
  const ev = L.EVENTS.find(e => e.id === pending.id);
  if (!ev) { checkEnd(); return; }
  const m = document.getElementById('event-modal');
  m.classList.remove('hidden'); m.classList.add('flex'); m.innerHTML = '';
  const box = el(`<div class="bg-white rounded-xl p-5 w-full max-w-md space-y-3"><h2 class="font-bold">${ev.title}</h2></div>`);
  ev.choices.forEach(ch => {
    const b = el(`<button class="w-full border rounded py-2 text-sm">${ch.label}</button>`);
    b.addEventListener('click', () => {
      state = ch.apply(structuredClone(state), pending.targetId);
      pushLog(ch.log);
      m.classList.add('hidden'); m.classList.remove('flex'); m.innerHTML = '';
      save(); render();
      const withOffer = (state.listings || []).find(l => l.offer);
      if (withOffer) { showOfferModal(withOffer); return; }
      checkEnd();
    });
    box.appendChild(b);
  });
  m.appendChild(box);
}

// === v3.7: フィナーレ＆リザルト ===
let endFxShown = false;   // 演出の多重再生ガード（フリープレイ移行後はstate.freePlayで抑止）

// クリア専用フィナーレ。夜空に打ち上げ花火＋街のライトアップ＋巨大スタンプ。他のどの演出より一段派手に。
function playClearFinale(done) {
  sfxFanfare();
  const overlay = el(`<div class="fixed inset-0 z-[80]" style="background:linear-gradient(180deg,#020617 0%,#0f172a 70%,#1e293b 100%);"></div>`);
  const cv = document.createElement('canvas');
  cv.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;';
  overlay.appendChild(cv);
  const label = el(`<div class="absolute inset-0 flex flex-col items-center justify-center text-center pointer-events-none" style="opacity:0;transition:opacity 0.6s;">
    <style>@keyframes fin-stamp { 0% { transform: scale(3.4) rotate(14deg); opacity: 0; } 55% { transform: scale(0.92) rotate(-8deg); opacity: 1; } 75% { transform: scale(1.08) rotate(-8deg); } 100% { transform: scale(1) rotate(-8deg); } }</style>
    <div class="mx-auto w-52 h-52 rounded-full bg-white/95 shadow-2xl flex items-center justify-center" style="border:12px solid #dc2626;animation: fin-stamp 0.6s cubic-bezier(.2,1.4,.4,1) 0.2s both;">
      <span class="text-4xl font-black" style="color:#dc2626;">目標達成</span></div>
    <div class="mt-6 text-4xl md:text-5xl font-black tracking-widest"><span style="background:linear-gradient(180deg,#fde68a,#f59e0b);-webkit-background-clip:text;background-clip:text;color:transparent;">🏆 メガ大家、達成!!</span></div>
    <div class="mt-3 text-white/90 text-lg font-bold">開始から ${Math.floor(state.month / 12)}年${state.month % 12}ヶ月</div>
  </div>`);
  overlay.appendChild(label);
  document.body.appendChild(overlay);
  const ctx2 = cv.getContext('2d');
  const W = cv.width = overlay.clientWidth || window.innerWidth;
  const H = cv.height = overlay.clientHeight || window.innerHeight;
  const bldgs = Array.from({ length: 18 }, (_, i) => ({ x: i * (W / 18) + Math.random() * 10, w: W / 22, h: 40 + Math.random() * 90 }));
  const COLORS = ['#fbbf24', '#f472b6', '#60a5fa', '#34d399', '#f87171', '#c084fc', '#fde047'];
  const rockets = [], parts = [];
  let launched = 0;
  const launchTimer = setInterval(() => {
    if (launched >= 14) { clearInterval(launchTimer); return; }
    launched += 1;
    rockets.push({ x: W * (0.15 + Math.random() * 0.7), y: H, vy: -(H * 0.012 + Math.random() * H * 0.004),
      color: COLORS[launched % COLORS.length], fuse: H * (0.30 + Math.random() * 0.28) });
    sfxKnock();
  }, 330);
  let raf;
  const step = () => {
    ctx2.clearRect(0, 0, W, H);
    bldgs.forEach(b => {
      ctx2.fillStyle = '#0b1220';
      ctx2.fillRect(b.x, H - b.h, b.w, b.h);
      ctx2.fillStyle = 'rgba(253,224,71,0.85)';
      for (let wy = H - b.h + 8; wy < H - 6; wy += 14) for (let wx = b.x + 4; wx < b.x + b.w - 4; wx += 10)
        if ((Math.round(wx) * 7 + Math.round(wy) * 13) % 5 < 2) ctx2.fillRect(wx, wy, 4, 6);
    });
    for (let i = rockets.length - 1; i >= 0; i--) {
      const r = rockets[i];
      r.y += r.vy;
      ctx2.fillStyle = '#fff'; ctx2.fillRect(r.x - 1.5, r.y, 3, 10);
      if (r.y <= r.fuse) {
        rockets.splice(i, 1);
        for (let k = 0; k < 46; k++) {
          const a = Math.random() * Math.PI * 2, sp = 1.5 + Math.random() * 3.6;
          parts.push({ x: r.x, y: r.y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, life: 1, color: r.color });
        }
      }
    }
    for (let i = parts.length - 1; i >= 0; i--) {
      const p2 = parts[i];
      p2.x += p2.vx; p2.y += p2.vy; p2.vy += 0.035; p2.life -= 0.012;
      if (p2.life <= 0) { parts.splice(i, 1); continue; }
      ctx2.globalAlpha = Math.max(0, p2.life);
      ctx2.fillStyle = p2.color;
      ctx2.fillRect(p2.x, p2.y, 3, 3);
    }
    ctx2.globalAlpha = 1;
    raf = requestAnimationFrame(step);
  };
  raf = requestAnimationFrame(step);
  setTimeout(() => { label.style.opacity = '1'; sfxFanfare(); }, 1400);
  setTimeout(() => { cancelAnimationFrame(raf); clearInterval(launchTimer); overlay.remove(); done(); }, 6200);
}
