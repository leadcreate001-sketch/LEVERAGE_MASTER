  <script type="module">
  // ==== inlined from src/logic.mjs（このビルドは scripts/build-inline.mjs が自動生成）====
export const CONFIG = {
  closingCostRate: 0.07,   // 諸費用率
  baseRate: 0.03,          // 融資基準金利
  rateFloor: 0.009,        // 適用金利の下限
  deadCrossTaxRate: 0.40,  // 償却切れ後のNOI課税率
  capGainTaxShort: 0.39,   // 譲渡税（保有5年以内）
  capGainTaxLong: 0.20,    // 譲渡税（5年超）
  defaultTermYears: 25,    // 融資期間デフォルト
  salaryEmployee: 150000,  // サラリーマンの月次余剰
  salarySelf: 100000,      // 自営業の月次余剰
  creditEmployee: 60,      // 信用度 初期（サラリーマン）
  creditSelf: 10,          // 信用度 初期（自営業）
  ltvMax: 0.90,            // LTV上限
  minCreditToFinance: 20,  // 融資可能な最低信用度
  minDscr: 1.3,            // 融資可能な最低DSCR
  eventChance: 0.15,       // 月送りイベント発生率
  troubleChance: 0.03,     // 月次トラブル発生率
  troubleMin: 50000, troubleMax: 300000,
  maxAge: 80,              // 融資・ゲーム期限の上限年齢
  salaryMin: 0, salaryMax: 5_000_000,     // 月余剰の設定可能範囲
  seedMin: 0, seedMax: 50_000_000,        // 種銭の設定可能範囲
  ageLoanPenaltyStart: 60, // この年齢からLTVが徐々に縮む
  reformLoanRate: 0.035,   // リフォームローン金利
  reformLoanYears: 10,     // リフォームローン期間
};

export function yen(n) {
  const r = Math.round(n);
  const sign = r < 0 ? '-' : '';
  return sign + '¥' + Math.abs(r).toLocaleString('en-US');
}

export function monthlyPayment(principal, annualRate, years) {
  if (principal <= 0) return 0;
  const n = Math.round(years * 12);
  const r = annualRate / 12;
  if (r === 0) return principal / n;
  const pow = Math.pow(1 + r, n);
  return principal * (r * pow) / (pow - 1);
}

export function remainingPrincipal(principal, annualRate, years, paymentsMade) {
  if (principal <= 0) return 0;
  const n = Math.round(years * 12);
  const k = Math.min(Math.max(paymentsMade, 0), n);
  const r = annualRate / 12;
  if (r === 0) return principal * (1 - k / n);
  const pow = Math.pow(1 + r, n);
  const powK = Math.pow(1 + r, k);
  return principal * (pow - powK) / (pow - 1);
}

export function noiAnnual(annualRentFull, opexRate) {
  return annualRentFull * (1 - opexRate);
}

export function dscr(noiAnnualVal, annualDebtService) {
  if (annualDebtService <= 0) return Infinity;
  return noiAnnualVal / annualDebtService;
}

export function monthlyDepreciation(price, bldgRatio, deprMonths) {
  return (price * bldgRatio) / deprMonths;
}

export function monthlyTax(noiAnnualVal, deprRemainingMonths) {
  if (deprRemainingMonths > 0) return 0;
  return (noiAnnualVal / 12) * CONFIG.deadCrossTaxRate;
}

export function negotiationRateCut(level) { return Math.min((level - 1) * 0.0025, 0.01); }
export function termBonusYears(level) { return Math.round(Math.min((level - 1) * 1.25, 5)); }
export function ltvCap(creditScore) { return Math.min(creditScore / 100, CONFIG.ltvMax); }
export function applicableRate(creditScore, negotiationLevel) {
  const r = CONFIG.baseRate - (creditScore / 100) * 0.015 - negotiationRateCut(negotiationLevel);
  return Math.max(r, CONFIG.rateFloor);
}
export function canFinance(creditScore, dscrValue) {
  return creditScore >= CONFIG.minCreditToFinance && dscrValue >= CONFIG.minDscr;
}
export function requiredCash({ price, ltv, useLoan }) {
  const closing = price * CONFIG.closingCostRate;
  return useLoan ? price * (1 - ltv) + closing : price + closing;
}

export const EXP_THRESHOLDS = [0, 100, 350, 850, 1850];

export function skillLevel(exp) {
  let lv = 1;
  for (let i = 1; i < EXP_THRESHOLDS.length; i++) if (exp >= EXP_THRESHOLDS[i]) lv = i + 1;
  return lv;
}

export function expToNext(exp) {
  const lv = skillLevel(exp);
  if (lv >= 5) return null;
  return EXP_THRESHOLDS[lv] - exp;
}

export function troubleRepairCost(base, selfMgmtLevel) {
  return base * (1 - Math.min(selfMgmtLevel * 0.10, 0.5));
}

// === v2: 物件生成（レントロール・費用・訳あり） ===

let __pidCounter = 0;
function __pid() { return ++__pidCounter; }

const AGE_BANDS = { young: [0, 10], mid: [11, 25], old: [26, 100] };

function pickJunk(genreKey, rng) {
  const pool = genreKey.includes('kubun') ? ['事故歴', '管理崩壊', '残置物']
    : genreKey === 'w_kodate' ? ['残置物', '再建築不可', '傾き', '事故歴']
    : ['残置物', '事故歴', '管理崩壊', '立退き交渉中'];
  const n = 1 + (rng() < 0.3 ? 1 : 0);
  const out = [];
  while (out.length < n) { const f = pool[Math.floor(rng() * pool.length)]; if (!out.includes(f)) out.push(f); }
  return out;
}

// 物件名を築年数に応じて生成（築浅=モダン／築古=荘・文化・第一ビル等の古い名前）。
// 共有rngは消費せず、idベースのハッシュで決定的に決める（生成時にp.nameへ保存されるので以後は再計算しない）。
function _hashRng(str) {
  let h = 2166136261;
  for (let i = 0; i < String(str).length; i++) { h ^= String(str).charCodeAt(i); h = Math.imul(h, 16777619); }
  let s = h >>> 0 || 1;
  return () => { s ^= s << 13; s ^= s >>> 17; s ^= s << 5; s >>>= 0; return s / 4294967296; };
}
const PLACE_TOKENS = ['本町', '緑丘', '桜台', '旭', '港南', '松原', '若葉', '泉', '月見', 'みどり', '東雲', '富士見', '栄', '幸', '錦', '宮前', '高砂', '日之出', '大手', '花水木'];
export function propertyName(genreKey, builtAge, seed) {
  const rnd = _hashRng('name:' + seed);
  const place = PLACE_TOKENS[Math.floor(rnd() * PLACE_TOKENS.length)];
  const detached = genreKey === 'kodate' || genreKey === 'w_kodate';
  if (detached) {
    if (builtAge >= 26) return `${place}の古家`;
    if (builtAge >= 11) return `${place}の一戸建て`;
    return `${place}ハウス`;
  }
  if (builtAge >= 26) {   // 築古: 古めかしい名前
    const pool = [`${place}荘`, `コーポ${place}`, `${place}文化`, `第${1 + Math.floor(rnd() * 3)}${place}ビル`, `${place}アパート`];
    return pool[Math.floor(rnd() * pool.length)];
  }
  if (builtAge >= 11) {   // 中古: 標準的な名前
    const pool = [`${place}ハイツ`, `${place}コーポ`, `サンハイツ${place}`, `${place}プラザ`, `${place}ハイム`];
    return pool[Math.floor(rnd() * pool.length)];
  }
  const pool = [`グランレジデンス${place}`, `パーク${place}テラス`, `ザ・${place}ヒルズ`, `${place}ガーデンズ`, `リヴェール${place}`];   // 築浅: モダンな名前
  return pool[Math.floor(rnd() * pool.length)];
}

export function generateProperty(genreKey, areaKey, rng = Math.random, ageBands = null) {
  const g = GENRE[genreKey], a = AREA_ADJ[areaKey];
  const lr = (lo, hi) => lo + (hi - lo) * rng();
  let ageMin = g.ageMin, ageMax = g.ageMax;
  if (ageBands && ageBands.length) {
    const ok = ageBands.map(k => AGE_BANDS[k]).filter(([lo, hi]) => hi >= g.ageMin && lo <= g.ageMax);
    if (ok.length) { const [lo, hi] = ok[Math.floor(rng() * ok.length)]; ageMin = Math.max(lo, g.ageMin); ageMax = Math.min(hi, g.ageMax); }
  }
  const builtAge = Math.round(lr(ageMin, ageMax));
  const price = Math.max(10000, Math.round(lr(g.priceMin, g.priceMax) * a.priceF / 10000) * 10000);
  const grossYield = lr(g.yieldMin, g.yieldMax) + a.yieldAdd;
  const unitCount = Math.round(lr(g.unitsMin, g.unitsMax));
  const rentTotalM = price * grossYield / 12;
  const units = Array.from({ length: unitCount }, () => {
    const rent = Math.max(5000, Math.round(rentTotalM / unitCount * lr(0.9, 1.1) / 1000) * 1000);
    const occupied = g.wake ? rng() < 0.4 : rng() > Math.max(0.03, 0.10 + a.vacancyAdd);
    return { rent, occupied, vacantMonths: occupied ? 0 : Math.round(lr(1, 6)) };
  });
  const isKubun = genreKey === 'kubun' || genreKey === 'w_kubun';
  const id = __pid();
  const p = {
    id, genreKey, areaKey, name: propertyName(genreKey, builtAge, id), label: `${g.label}（${a.label}）`,
    builtAge, structure: g.structure, units,
    price, askingPrice: price, origPrice: price, timeValue: Math.round(price * lr(0.95, 1.15)),
    grossYield,
    mgmtFeeM: isKubun ? Math.round(lr(10000, 20000)) : Math.round(rentTotalM * 0.03),
    repairReserveM: isKubun ? Math.round(lr(5000, 15000)) : Math.round(rentTotalM * 0.02),
    pmFeeRate: 0.05,
    propTaxA: Math.max(30000, Math.round(price * 0.007)),
    repairState: Math.round(g.wake ? lr(0, 40) : lr(40, 90)),
    junkFlags: g.wake ? pickJunk(genreKey, rng) : [],
    bldgRatio: g.structure === '木造' ? 0.5 : 0.45,
    deprRemaining: deprMonthsFor(g.structure, builtAge),
    listedMonths: 0, staleFlag: false, refusedOffer: false,
    loan: null, boughtPrice: null, boughtMonth: null, selfManaged: false,
    history: [], cum: { cf: 0, months: 0 },
  };
  return p;
}

// === Task 5: 購入フロー（指値・銀行選択・buyProperty v2） ===

export function offerSuccessChance(property, cutRate, negotiationLv) {
  if (cutRate === 0) return 1;
  let p = 0.5 - cutRate * 3;
  if (property.staleFlag) p += 0.25;
  if (property.junkFlags.length > 0) p += 0.15;
  p += (negotiationLv - 1) * 0.05;
  return Math.max(0.02, Math.min(0.95, p));
}

export function makeOffer(state, propertyId, cutRate, rng = Math.random) {
  const s = structuredClone(state);
  const p = s.market.find(x => x.id === propertyId);
  if (!p) return { state: s, accepted: false, price: 0 };
  if (p.refusedOffer && cutRate > 0) return { state: s, accepted: false, price: 0 };   // 再指値は不可（満額は常に成立）
  s.actionPower -= 10;
  const lv = skillLevel(s.skills.negotiation.exp);
  if (rng() < offerSuccessChance(p, cutRate, lv)) {
    return { state: s, accepted: true, price: Math.round(p.price * (1 - cutRate)) };
  }
  p.refusedOffer = true;
  return { state: s, accepted: false, price: 0 };
}

export function buyPropertyV2(state, propertyId, { method, downRatio = 0, price }) {
  const s = structuredClone(state);
  const i = s.market.findIndex(x => x.id === propertyId);
  const p = s.market[i];
  const logs = [];
  const closing = Math.round(price * CONFIG.closingCostRate);
  if (method === 'cash') {
    s.cash -= price + closing;
    p.loan = null;
  } else {
    const terms = reviewLoan(method, p, price, downRatio, s).terms;
    s.cash -= Math.round(price * downRatio) + closing;
    p.loan = { bankKey: method, principal: Math.round(price * (1 - downRatio)),
      rate: bankRate(method, s), years: terms?.years ?? BANKS[method].termMax, monthsPaid: 0 };
    s.bankRelations[method].loans += 1;
  }
  p.boughtPrice = price; p.boughtMonth = s.month;
  p.listedMonths = 0; p.staleFlag = false; p.askingPrice = null;
  if (['apart', 'tekkotsu', 'rc'].includes(p.genreKey)) s.creditScore = Math.min(100, s.creditScore + 5);
  s.properties.push(p); s.market.splice(i, 1);
  logs.push(`${p.label} を${method === 'cash' ? '現金' : BANKS[method].label + 'の融資'}で購入（${yen(price)}）`);
  s.stats = s.stats || { buys: 0, sales: 0, profitSales: 0, junkFlips: 0, hadLoan: false };
  s.stats.buys += 1;
  if (method !== 'cash') s.stats.hadLoan = true;
  return { state: s, logs };
}

// === Task 8: 売却処理 ===

export function currentMarketValue(prop) {
  const years = prop.monthsHeld / 12;
  return prop.price * Math.pow(1 + prop.annualDrift, years) * (0.9 + 0.1 * prop.repair);
}

// === Task 3: v2 物件収支ヘルパー ===

export function gpiAnnual(p) {
  return p.units.reduce((s, u) => s + u.rent, 0) * 12;
}

export function vacancyLossAnnual(p) {
  return p.units.filter(u => !u.occupied).reduce((s, u) => s + u.rent, 0) * 12;
}

export function egiAnnual(p) {
  return gpiAnnual(p) - vacancyLossAnnual(p);
}

export function opexAnnual(p) {
  const pm = p.selfManaged ? 0 : Math.round(egiAnnual(p) * p.pmFeeRate);
  return p.mgmtFeeM * 12 + p.repairReserveM * 12 + pm + p.propTaxA;
}

export function noiAnnualV2(p) {
  return egiAnnual(p) - opexAnnual(p);
}

function loanMonthlyBreakdown(loan) {
  if (!loan) return { interest: 0, principal: 0 };
  const rem = remainingPrincipal(loan.principal, loan.rate, loan.years, loan.monthsPaid);
  const pay = monthlyPayment(loan.principal, loan.rate, loan.years);
  const interest = Math.round(rem * loan.rate / 12);
  return { interest, principal: Math.round(pay - interest) };
}

export function propertyMonthlyPL(p) {
  const rentIn = p.units.filter(u => u.occupied).reduce((s, u) => s + u.rent, 0);
  const vacancyLoss = p.units.filter(u => !u.occupied).reduce((s, u) => s + u.rent, 0);
  const pm = p.selfManaged ? 0 : Math.round(rentIn * p.pmFeeRate);
  const opex = p.mgmtFeeM + p.repairReserveM + pm + Math.round(p.propTaxA / 12);
  const loanBd = loanMonthlyBreakdown(p.loan);
  const reformBd = loanMonthlyBreakdown(p.reformLoan);
  const interest = loanBd.interest + reformBd.interest;
  const principalPay = loanBd.principal + reformBd.principal;
  const noiM = rentIn - opex;
  const tax = p.deprRemaining > 0 ? 0 : Math.max(0, Math.round(noiM * CONFIG.deadCrossTaxRate));
  return { rentIn, vacancyLoss, opex, interest, principal: principalPay, tax,
    cf: rentIn - opex - interest - principalPay - tax };
}

export function bookValueV2(p) {
  const deprTotalM = deprMonthsFor(p.structure, p.builtAge);
  const done = deprTotalM - p.deprRemaining;
  const bldg = (p.boughtPrice ?? p.price) * p.bldgRatio;
  const land = (p.boughtPrice ?? p.price) * (1 - p.bldgRatio);
  return Math.round(land + Math.max(0, bldg * (1 - done / Math.max(1, deprTotalM))));
}

export function offerChance(askingPrice, timeValue, fullyOccupied, listedMonths) {
  const ratio = askingPrice / timeValue;
  let p = ratio <= 0.9 ? 0.50 : ratio <= 1.0 ? 0.30 : ratio <= 1.1 ? 0.15 : 0.05;
  p += fullyOccupied ? 0.10 : -0.10;
  return Math.max(0.02, Math.min(0.8, p));
}

export function rollBuyOffer(listing, property, rng = Math.random) {
  const full = property.units.every(u => u.occupied);
  if (rng() >= offerChance(listing.askingPrice, property.timeValue, full, listing.listedMonths)) return null;
  const mustSashine = listing.listedMonths >= 6;
  const sashine = mustSashine || rng() < 0.4;
  if (!sashine) return { price: listing.askingPrice, type: 'full' };
  const cut = 0.03 + rng() * 0.09;
  return { price: Math.round(listing.askingPrice * (1 - cut) / 10000) * 10000, type: 'sashine' };
}

export function respondToOffer(state, propertyId, action, negotiationLv, rng = Math.random) {
  const s = structuredClone(state);
  const l = s.listings.find(x => x.propertyId === propertyId);
  const offer = l?.offer;
  if (!offer) return { state: s, result: 'rejected' };
  const queue = (price) => { s.pendingSales.push({ propertyId, price, settleMonth: s.month + 1 });
    s.listings = s.listings.filter(x => x.propertyId !== propertyId); };
  if (action === 'accept') { queue(offer.price); return { state: s, result: 'accepted', settlePrice: offer.price }; }
  if (action === 'reject') { l.offer = null; return { state: s, result: 'rejected' }; }
  // counter: 中間価格
  const counterPrice = Math.round((offer.price + l.askingPrice) / 2 / 10000) * 10000;
  if (rng() < 0.5 + (negotiationLv - 1) * 0.05) { queue(counterPrice); return { state: s, result: 'counter_ok', settlePrice: counterPrice }; }
  l.offer = null;
  return { state: s, result: 'counter_ng' };
}

export function settleSale(state, sale) {
  const s = structuredClone(state);
  const i = s.properties.findIndex(x => x.id === sale.propertyId);
  const p = s.properties[i];
  const logs = [];
  const book = bookValueV2(p);
  const gain = Math.max(0, sale.price - book);
  const heldYears = (s.month - p.boughtMonth) / 12;
  const taxRate = heldYears <= 5 ? CONFIG.capGainTaxShort : CONFIG.capGainTaxLong;
  const capTax = Math.round(gain * taxRate);
  let payoff = 0;
  if (p.loan) payoff += Math.round(remainingPrincipal(p.loan.principal, p.loan.rate, p.loan.years, p.loan.monthsPaid));
  if (p.reformLoan) payoff += Math.round(remainingPrincipal(p.reformLoan.principal, p.reformLoan.rate, p.reformLoan.years, p.reformLoan.monthsPaid));
  s.cash += sale.price - capTax - payoff;
  if (p.loan) { const rel = s.bankRelations?.[p.loan.bankKey]; if (rel) rel.paidOff += 1; }
  logs.push(`${p.label} を ${yen(sale.price)} で売却（譲渡税 ${yen(capTax)}・残債精算 ${yen(payoff)}）`);
  s.stats = s.stats || { buys: 0, sales: 0, profitSales: 0, junkFlips: 0, hadLoan: false };
  s.stats.sales += 1;
  if (gain > 0) s.stats.profitSales += 1;
  if (p.junkFlags && p.junkFlags.length > 0) s.stats.junkFlips += 1;
  s.properties.splice(i, 1);
  s.pendingSales = s.pendingSales.filter(x => x.propertyId !== sale.propertyId);
  return { state: s, logs };
}

// === Task 9: 空室・退去・客付け＋DIY v2 ===

export function monthlyVacancyRoll(property, rng = Math.random) {
  let vacated = 0;
  const rate = 0.01 + (property.builtAge >= 26 ? 0.005 : 0) + (property.junkFlags.includes('管理崩壊') ? 0.01 : 0);
  property.units.forEach(u => {
    if (u.occupied && rng() < rate) { u.occupied = false; u.vacantMonths = 0; vacated += 1; }
  });
  return { property, vacated };
}

export function naturalFillRoll(property, rng = Math.random) {
  let filled = 0;
  property.units.forEach(u => {
    if (!u.occupied) {
      if (rng() < 0.20) { u.occupied = true; u.vacantMonths = 0; filled += 1; }
      else u.vacantMonths += 1;
    }
  });
  return { property, filled };
}

export function fillVacancy(state, propertyId, unitIndex, method, rng = Math.random) {
  const s = structuredClone(state);
  const p = s.properties.find(x => x.id === propertyId);
  const u = p.units[unitIndex];
  if (!u || u.occupied) return { state: s, success: false };
  let chance;
  if (method === 'ad') { s.cash -= u.rent; chance = 0.70; }
  else { s.actionPower -= 30; const lv = skillLevel(s.skills.selfmgmt.exp); chance = 0.40 + (lv - 1) * 0.10; s.skills.selfmgmt.exp += 10; }
  const success = rng() < chance;
  if (success) { u.occupied = true; u.vacantMonths = 0; }
  return { state: s, success };
}

export function doDIY(state, propertyId) {
  const s = structuredClone(state);
  const p = s.properties.find(x => x.id === propertyId);
  s.actionPower -= 30;
  const before = p.repairState;
  p.repairState = Math.min(100, p.repairState + 20);
  s.skills.selfmgmt.exp += 10;
  if (before < 100 && p.repairState === 100) p.timeValue = Math.round(p.timeValue * 1.05);
  return { state: s };
}

export function totalDebt(state) {
  return Math.round(state.properties.reduce((t, p) => t
    + (p.loan ? remainingPrincipal(p.loan.principal, p.loan.rate, p.loan.years, p.loan.monthsPaid) : 0)
    + (p.reformLoan ? remainingPrincipal(p.reformLoan.principal, p.reformLoan.rate, p.reformLoan.years, p.reformLoan.monthsPaid) : 0), 0));
}

// === 業者への修繕依頼（DIYより高コストだが一括で修繕度100・リフォームローン利用可）===
export function professionalRepairCost(property) {
  const gap = Math.max(0, 100 - property.repairState);
  return Math.max(50000, Math.round(property.price * 0.10 * gap / 100 / 10000) * 10000);
}

export function reformLoanAmount(cost, creditScore) {
  const ratio = Math.max(0.3, Math.min(0.9, creditScore / 100));
  return Math.round(cost * ratio / 10000) * 10000;
}

export function doProfessionalRepair(state, propertyId, financed = false) {
  const s = structuredClone(state);
  const p = s.properties.find(x => x.id === propertyId);
  const cost = professionalRepairCost(p);
  s.actionPower -= 20;
  const canFinance = financed && !p.reformLoan;   // 既存のリフォームローン完済前は再借入不可（多重借入で残債が消える事故を防ぐ）
  let loanAmount = 0;
  if (canFinance) {
    loanAmount = reformLoanAmount(cost, s.creditScore);
    s.cash -= (cost - loanAmount);
    p.reformLoan = { principal: loanAmount, rate: CONFIG.reformLoanRate, years: CONFIG.reformLoanYears, monthsPaid: 0 };
  } else {
    s.cash -= cost;
  }
  const before = p.repairState;
  p.repairState = 100;
  s.skills.selfmgmt.exp += 15;
  if (before < 100) p.timeValue = Math.round(p.timeValue * 1.08);
  return { state: s, cost, loanAmount, financed: canFinance };
}
export function totalAssetsV2(state) { return state.cash + state.properties.reduce((t, p) => t + p.timeValue, 0); }
export function netWorth(state) { return Math.round(totalAssetsV2(state) - totalDebt(state)); }
export function monthlyCF(state) { return state.properties.reduce((t, p) => t + (p.history.at(-1)?.cf ?? 0), 0); }
export function isClearedV2(state) {
  const g = state.goal;
  return g.type === 'networth' ? netWorth(state) >= g.amount : monthlyCF(state) >= g.amount;
}
export function isTimeUpV2(state) { return state.month >= state.goal.years * 12; }
export function isBankrupt(state) { return state.cash < 0; }
export function taxRiskLevelV2(state) {
  if (!state.properties.length) return '低';
  const m = Math.min(...state.properties.map(p => p.deprRemaining));
  return m >= 36 ? '低' : m >= 12 ? '中' : '高';
}

  const s = structuredClone(state);

  return { state: s };
}

export function createInitialState({ attr, goalType, goalAmount, goalYears, seedCash, age, salaryMonthly }) {
  const emp = attr === 'employee';
  const clampedAge = Math.max(18, Math.min(CONFIG.maxAge - 1, Math.round(age ?? 30)));
  const clampedSeed = Math.max(CONFIG.seedMin, Math.min(CONFIG.seedMax, Math.round(seedCash)));
  const defaultSalary = emp ? CONFIG.salaryEmployee : CONFIG.salarySelf;
  const clampedSalary = Math.max(CONFIG.salaryMin, Math.min(CONFIG.salaryMax, Math.round(salaryMonthly ?? defaultSalary)));
  const clampedYears = Math.max(1, Math.min(goalYears, maxYearsForAge(clampedAge)));
  return {
    cash: clampedSeed, month: 0, attr, age: clampedAge,
    salary: clampedSalary,
    creditScore: emp ? CONFIG.creditEmployee : CONFIG.creditSelf,
    baseActionPower: emp ? 100 : 120, actionPower: emp ? 100 : 120,
    goal: { type: goalType, amount: goalAmount, years: clampedYears },
    skills: { appraisal: { exp: 0 }, negotiation: { exp: 0 }, selfmgmt: { exp: 0 } },
    properties: [], market: [], listings: [], pendingSales: [],
    bankRelations: { kouko: { loans: 0, paidOff: 0 }, chigin: { loans: 0, paidOff: 0 },
      shinkin: { loans: 0, paidOff: 0 }, nonbank: { loans: 0, paidOff: 0 } },
    log: ['ゲーム開始。まずは営業で物件を探そう。'],
    stats: { buys: 0, sales: 0, profitSales: 0, junkFlips: 0, hadLoan: false },
    badges: [],

  };
}

  const s = structuredClone(state);

  const p = s.market.find(x => x.id === propertyId);
  if (!p) return { state: s, added: false, reason: 'not_found' };

  const stats = state.stats || {};
  const ids = [];
  if ((stats.buys || 0) >= 1) ids.push('first_buy');
  if (stats.hadLoan) ids.push('first_loan');
  if (state.properties.length >= 5) ids.push('five_properties');
  if (state.properties.some(p => p.units.every(u => u.occupied))) ids.push('first_full');
  if ((stats.sales || 0) >= 1) ids.push('first_sale');
  if ((stats.profitSales || 0) >= 1) ids.push('first_profit');
  if ((stats.junkFlips || 0) >= 1) ids.push('junk_flip');
  if (['appraisal', 'negotiation', 'selfmgmt'].some(k => skillLevel(state.skills[k].exp) >= 5)) ids.push('skill_master');
  if (state.properties.length > 0 && totalDebt(state) === 0) ids.push('debt_free');
  if (isClearedV2(state)) ids.push('goal_clear');
  return ids;
}

export function advanceMonth(state, rng = Math.random) {
  let s = structuredClone(state);
  const logs = [];
  s.month += 1;
  for (const sale of [...(s.pendingSales || [])].filter(x => x.settleMonth <= s.month)) {
    const r = settleSale(s, sale); s = r.state; logs.push(...r.logs);
  }
  for (const p of s.properties) {
    monthlyVacancyRoll(p, rng);
    naturalFillRoll(p, rng);
    const pl = propertyMonthlyPL(p);
    s.cash += pl.cf;
    if (p.loan) {
      p.loan.monthsPaid += 1;
      if (p.loan.monthsPaid >= p.loan.years * 12) p.loan = null;   // 完済したら返済を止める
    }
    if (p.reformLoan) {
      p.reformLoan.monthsPaid += 1;
      if (p.reformLoan.monthsPaid >= p.reformLoan.years * 12) p.reformLoan = null;
    }
    if (p.deprRemaining > 0) p.deprRemaining -= 1;
    const drift = p.structure === '木造' ? -0.0015 : p.structure === 'S' ? -0.001 : -0.0005;
    p.timeValue = Math.max(10000, Math.round(p.timeValue * (1 + drift)));
    p.history.push({ month: s.month, ...pl });
    if (p.history.length > 24) p.history.shift();
    p.cum.cf += pl.cf; p.cum.months += 1;
    if (rng() < CONFIG.troubleChance) {
      const base = CONFIG.troubleMin + rng() * (CONFIG.troubleMax - CONFIG.troubleMin);
      const c = Math.round(troubleRepairCost(base, skillLevel(s.skills.selfmgmt.exp)));
      s.cash -= c;
      logs.push(`${p.label} で突発修繕（-${yen(c)}）`);
    }
    // 修繕度が20%を割ったら管理会社から修繕依頼（通知は劣化中に一度だけ・回復で再アーム）
    if (p.repairState < 20 && !p.repairAlerted) {
      const nm = p.name || p.label;
      pushNotification(s, 'repair_needed', p.id, nm, `${nm} の劣化が深刻です（修繕度${p.repairState}%）。管理会社から修繕依頼が届きました`);
      p.repairAlerted = true;
    } else if (p.repairState >= 20) {
      p.repairAlerted = false;
    }
  }
  if (s.month % 12 === 0) { s.properties.forEach(p => { p.builtAge += 1; }); s.age = (s.age ?? 30) + 1; }
  s.cash += s.salary;
  for (const l of s.listings || []) {
    l.listedMonths += 1;
    if (!l.offer) {
      const p = s.properties.find(x => x.id === l.propertyId);
      const o = rollBuyOffer(l, p, rng);
      if (o) { l.offer = { ...o, month: s.month }; logs.push(`${p.label} に買付！（${o.type === 'full' ? '満額' : '指値'} ${yen(o.price)}）`); }
    }
  }
  { const r = tickMarket(s, rng); s = r.state; logs.push(...r.logs); }
  let pendingEvent = null;
  if (rng() < CONFIG.eventChance) {
    const es = eligibleEvents(s);
    if (es.length) {
      const ev = es[Math.floor(rng() * es.length)];
      let targetId = null;
      if (ev.genres) {
        const cands = s.properties.filter(p => ev.genres.includes(p.genreKey));
        targetId = cands.length ? cands[Math.floor(rng() * cands.length)].id : null;
      }
      pendingEvent = { id: ev.id, targetId };
    }
  }
  s.actionPower = s.baseActionPower;
  return { state: s, logs, pendingEvent };
}

export function svgBuildingParts(property) {

  const wake = !!(property.junkFlags && property.junkFlags.length > 0);
  const ageFactor = Math.min(property.builtAge, 60) / 300;
  const dirtLevel = Math.max(0, Math.min(1, (100 - property.repairState) / 100 + (wake ? 0.25 : 0) + ageFactor));
  const hasCracks = property.repairState < 50 || wake;

export function usefulLifeRemaining(structure, builtAge) {
  const legal = STRUCTURE_LIFE[structure];
  if (builtAge >= legal) return Math.max(4, Math.floor(legal * 0.2));
  return Math.floor((legal - builtAge) + builtAge * 0.2);
}
export function deprMonthsFor(structure, builtAge) {
  return usefulLifeRemaining(structure, builtAge) * 12;
}

// ===== Task 4: 銀行審査エンジン =====
export function bankRate(bankKey, state) {
  const b = BANKS[bankKey];
  const rel = (state.bankRelations && state.bankRelations[bankKey]) || { paidOff: 0 };
  const negLv = skillLevel(state.skills.negotiation.exp);
  const cut = (state.creditScore / 100) * 0.005 + negotiationRateCut(negLv) + Math.min(rel.paidOff * 0.001, 0.005);
  return Math.max(b.baseRate - cut, b.baseRate - 0.007);
}

export function reviewLoan(bankKey, property, price, downRatio, state) {
  const b = BANKS[bankKey];
  const reasons = [];
  const loanAmount = Math.round(price * (1 - downRatio));
  const rel = (state.bankRelations && state.bankRelations[bankKey]) || { paidOff: 0 };
  const ltvMax = bankKey === 'chigin' && rel.paidOff >= 3 ? 0.90 : b.ltvMax;

  if (state.creditScore < b.minCredit) reasons.push({ code: 'CREDIT_LOW', msg: `属性・信用度が基準未満（${state.creditScore} < ${b.minCredit}）` });
  if (property.junkFlags.length > 0 && !b.wakeOk) reasons.push({ code: 'WAKEARI_NG', msg: '瑕疵・事故物件のため取扱不可' });
  if (b.areaLimit && property.areaKey !== b.areaLimit) reasons.push({ code: 'AREA_NG', msg: `${b.label}の営業エリア外（地方・郊外のみ）` });
  if (price < b.minPrice || loanAmount > b.maxLoan) reasons.push({ code: 'AMOUNT_NG', msg: `融資額が取扱範囲外（${b.label}）` });

  const remainYears = usefulLifeRemaining(property.structure, property.builtAge);
  let years = b.termMax;
  if (b.lifeStrict === true) {
    if (property.builtAge >= STRUCTURE_LIFE[property.structure]) reasons.push({ code: 'LIFE_OVER', msg: `法定耐用年数切れ（${property.structure}築${property.builtAge}年）は取扱不可` });
    years = Math.min(b.termMax, remainYears);
  } else if (b.lifeStrict === 'soft') {
    years = Math.min(b.termMax, remainYears + 5);
  }
  const preAgeYears = years;   // 年齢キャップを適用する前の年数（築年数由来の制約はここに反映済み）
  const age = state.age ?? 0;
  const maxTermByAge = Math.max(0, CONFIG.maxAge - age);
  years = Math.min(years, maxTermByAge);
  // 年齢キャップが「実際に」否認の原因になった場合だけAGE_OVERを出す。
  // 築年数側の制約(LIFE_OVER・soft cap等)で既にtermMin未満だったケースまで年齢のせいにしない。
  if (years < b.termMin && preAgeYears >= b.termMin) {
    reasons.push({ code: 'AGE_OVER', msg: `完済時年齢が上限(${CONFIG.maxAge}歳)を超えるため取扱不可（現在${age}歳・借入可能最長${maxTermByAge}年）` });
  }
  years = Math.max(b.termMin, years);

  if ((1 - downRatio) > ltvMax) reasons.push({ code: 'OVER_LTV', msg: `自己資金${Math.round((1 - ltvMax) * 100)}%以上が必要（LTV上限${Math.round(ltvMax * 100)}%）` });

  const rate = bankRate(bankKey, state);
  const monthlyPay = monthlyPayment(loanAmount, rate, years);
  const d = dscr(noiAnnualV2(property), monthlyPay * 12);
  if (d < CONFIG.minDscr) reasons.push({ code: 'DSCR_LOW', msg: `収支が返済に対して弱い（DSCR ${d.toFixed(2)} < ${CONFIG.minDscr}）` });

  const requiredCash = Math.round(price * downRatio + price * CONFIG.closingCostRate);
  if (state.cash < requiredCash) reasons.push({ code: 'NO_CASH', msg: `自己資金が足りない（必要 ${yen(requiredCash)} / 手元 ${yen(state.cash)}）` });

  const approved = reasons.length === 0;
  return { bankKey, label: b.label, approved, reasons,
    terms: approved ? { rate, years, ltv: 1 - downRatio, loanAmount, monthlyPay: Math.round(monthlyPay), requiredCash } : undefined };
}

export function reviewAllBanks(property, price, downRatio, state) {
  return ['kouko', 'chigin', 'shinkin', 'nonbank'].map(k => reviewLoan(k, property, price, downRatio, state));
}

export function appraise(property, appraisalLv, rng = Math.random) {
  const spread = Math.max(0.02, 0.10 - (appraisalLv - 1) * 0.01);
  const f = (1 - spread) + rng() * spread * 2;
  return Math.round(property.timeValue * f / 10000) * 10000;
}

export function requestAppraisal(state, propertyId, rng = Math.random) {
  const s = structuredClone(state);
  s.actionPower -= 20;
  const p = s.properties.find(x => x.id === propertyId);
  const lv = skillLevel(s.skills?.appraisal?.exp ?? 0);
  const appraisal = appraise(p, lv, rng);
  return { state: s, appraisal };
}

export function listForSale(state, propertyId, askingPrice, appraisal = null) {
  const s = structuredClone(state);
  s.listings = s.listings || [];
  s.listings.push({ propertyId, askingPrice, appraisal, listedMonths: 0, offer: null });
  return { state: s };
}

export function updateListing(state, propertyId, newPrice) {
  const s = structuredClone(state);
  s.listings = s.listings || [];
  const l = s.listings.find(x => x.propertyId === propertyId);
  if (l) { l.askingPrice = newPrice; l.offer = null; }
  return { state: s };
}

export function delist(state, propertyId) {
  const s = structuredClone(state);
  s.listings = (s.listings || []).filter(x => x.propertyId !== propertyId);
  return { state: s };
}

export function bargainScore(p) {
  const g = GENRE[p.genreKey];
  return Math.max(0, Math.min(1, (p.grossYield - g.yieldMin) / (g.yieldMax - g.yieldMin)));
}

function pushNotification(s, kind, propertyId, label, message) {
  s.notifications = s.notifications || [];
  const id = s.nextNotifId || 1;
  s.nextNotifId = id + 1;
  s.notifications.unshift({ id, month: s.month, kind, propertyId, label, message, read: false });
}

export function tickMarket(state, rng = Math.random) {
  const s = structuredClone(state);
  const logs = [];
  s.favorites = s.favorites || [];
  s.market = s.market.filter(p => {
    const sc = bargainScore(p);
    const soldP = sc > 0.66 ? 0.30 : sc > 0.33 ? 0.15 : 0.05;
    if (rng() < soldP) {
      const nm = p.name || p.label;
      logs.push(`${nm} は他の買主で決まってしまった`);
      if (s.favorites.some(f => f.propertyId === p.id)) {
        pushNotification(s, 'sold_out', p.id, nm, `${nm} は他の買主で成約しました`);
        s.favorites = s.favorites.filter(f => f.propertyId !== p.id);
      }
      return false;
    }
    return true;
  });
  s.market.forEach(p => {
    if (rng() < 0.20) {
      const cut = 0.03 + rng() * 0.05;
      p.price = Math.max(10000, Math.round(p.price * (1 - cut) / 10000) * 10000);
      p.askingPrice = p.price;
      const nm = p.name || p.label;
      logs.push(`${nm} が値下げされた（${yen(p.price)}）`);
      if (s.favorites.some(f => f.propertyId === p.id)) {
        pushNotification(s, 'price_cut', p.id, nm, `${nm} が値下げされました（${yen(p.price)}）`);
      }
    }
    p.listedMonths += 1;
    if (p.listedMonths >= 6) p.staleFlag = true;
  });
  return { state: s, logs };
}

export function searchHitChance(nGenres, nAreas, nAges, appraisalLv) {
  let p = [0.55, 0.70, 0.85, 1.0][Math.min(nGenres, 4) - 1];
  if (nAges === 1) p -= 0.10;
  if (nAreas === 1) p -= 0.05;
  p += (appraisalLv - 1) * 0.05;
  return Math.round(Math.max(0.30, Math.min(1.0, p)) * 100) / 100;
}

export function doSalesSearch(state, { genres, areas, ages }, rng = Math.random) {
  const s = structuredClone(state);
  s.actionPower -= 40;
  const lv = skillLevel(s.skills.appraisal.exp);
  if (rng() >= searchHitChance(genres.length, areas.length, ages.length, lv)) {
    s.skills.appraisal.exp += 5;
    return { state: s, found: null, log: '今月は良い出物なし…（目利き+5 EXP）' };
  }
  const gk = genres[Math.floor(rng() * genres.length)];
  const ak = areas[Math.floor(rng() * areas.length)];
  const p = generateProperty(gk, ak, rng, ages);
  s.market.unshift(p);
  s.skills.appraisal.exp += 10;

}

    ctx.stroke();
  }
  ctx.restore();

  // 未開拓エリアの🔒（将来アップデートで解禁される予感）
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  for (const area of UNEXPLORED_AREAS) {
    const p = project(area.center.lat, area.center.lon);
    if (p.z < 0.05) continue;
    ctx.globalAlpha = Math.min(1, p.z * 2);
    ctx.font = `${Math.round(18 * (0.6 + p.z * 0.6))}px sans-serif`;
    ctx.fillText('🔒', p.x, p.y);
  }
  ctx.globalAlpha = 1;
}

// グレー雰囲気建物: 絵文字スプライトをグレースケール化して描画（呼び出し元でfilterを一括設定）
function drawGrayBuilding(lat, lon, stories, emoji) {
  const p = project(lat, lon);
  if (p.z < 0.05) return;
  const scale = 0.65 + p.z * 0.85;
  const size = (12 + stories * 2.1) * scale;
  ctx.globalAlpha = 0.55 + p.z * 0.35;
  ctx.font = `${Math.round(size)}px "Segoe UI Emoji", sans-serif`;
  ctx.fillText(emoji, p.x, p.y);
}

// カラー建物（所有・売り出し中）: ジャンル別の絵文字＋状態バッジ。市場物件は常時グレー表示。
// お気に入り登録済みの市場物件だけタップで情報を開ける（⭐マーク付き）。
function drawColorBuilding(p, lat, lon, kind) {
  const parts = L.svgBuildingParts(p);
  const pr = project(lat, lon);
  if (pr.z < 0.04) return;
  const scale = 0.85 + pr.z * 1.15;
  const stories = SHAPE_STORIES[parts.shape] ?? 1;
  const emoji = GENRE_EMOJI[parts.shape] ?? '🏠';
  const size = (17 + stories * 2.9) * scale;

  const isFav = kind === 'market' && (st.favorites || []).some(f => f.propertyId === p.id);
  ctx.save();
  ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
  // 密集した雰囲気建物に埋もれないよう、タップ可能な実物件（所有・お気に入り市場）の足元にだけ
  // 淡いハロー（円形の光暈）を敷いて視認性を上げる。
  if (kind === 'owned' || isFav) {
    ctx.globalAlpha = Math.min(1, 0.35 + pr.z * 0.3);
    ctx.fillStyle = kind === 'owned' ? '#a7f3d0' : '#fde68a';
    ctx.beginPath(); ctx.arc(pr.x, pr.y - size * 0.35, size * 0.62, 0, TAU); ctx.fill();
  }
  if (kind === 'market') ctx.filter = 'grayscale(1) brightness(0.75)';
  ctx.globalAlpha = Math.min(1, 0.6 + pr.z * 0.55);
  ctx.font = `${Math.round(size)}px "Segoe UI Emoji", sans-serif`;
  ctx.fillText(emoji, pr.x, pr.y);
  ctx.filter = 'none';

  if (kind === 'owned') {
    const occ = p.units && p.units.length ? p.units.filter(u => u.occupied).length / p.units.length : 1;
    ctx.fillStyle = occ >= 0.999 ? '#4ade80' : occ > 0 ? '#fbbf24' : '#f87171';
    ctx.beginPath(); ctx.arc(pr.x + size * 0.30, pr.y - size * 0.95, 2.6 * scale, 0, TAU); ctx.fill();
    if ((st.listings || []).some(l => l.propertyId === p.id)) {
      ctx.fillStyle = '#facc15';
      ctx.beginPath(); ctx.arc(pr.x - size * 0.30, pr.y - size * 0.95, 2.6 * scale, 0, TAU); ctx.fill();
    }
  } else if (kind === 'market' && (st.favorites || []).some(f => f.propertyId === p.id)) {
    // お気に入り登録した市場物件だけ⭐を付けタップ可能にする（未登録の市場物件は雰囲気建物と同じ扱い）
    ctx.filter = 'none';
    ctx.font = `${Math.round(13 * scale)}px sans-serif`;
    ctx.fillText('⭐', pr.x, pr.y - size * 1.05);
  }
  ctx.restore();
}

// 実物件（所有・市場）同士が重なってタップしづらくなるのを防ぐ決定的な間引き配置。
// 既に配置済みの点と近すぎる場合、id由来の固定角度でスパイラル状に押し出す（毎フレーム同じ結果になる）。
const MIN_SEP = 0.11;
function spreadItems(items) {
  const placed = [];
  for (const it of items) {
    let lat = it.lat, lon = it.lon;
    for (let tries = 0; tries < 24; tries++) {
      const conflict = placed.some(pl => {
        const dlat = lat - pl.lat;
        const dlon = (lon - pl.lon) * Math.cos(lat);
        return Math.sqrt(dlat * dlat + dlon * dlon) < MIN_SEP;
      });
      if (!conflict) break;
      const pushAng = hashSeed('push:' + it.kind + ':' + it.p.id + ':' + tries)() * TAU;
      const pushRad = MIN_SEP * 0.65 * (tries + 1);
      lat = it.lat + Math.sin(pushAng) * pushRad;
      lon = it.lon + Math.cos(pushAng) * pushRad;
    }
    placed.push({ ...it, lat, lon });
  }
  return placed;
}

function coloredItems() {
  if (!st) return [];
  const items = [];
  st.properties.forEach(p => { const s = slotFor(p.areaKey, 'o:' + p.id); items.push({ p, lat: s.lat, lon: s.lon, kind: 'owned' }); });
  st.market.forEach(p => { const s = slotFor(p.areaKey, 'm:' + p.id); items.push({ p, lat: s.lat, lon: s.lon, kind: 'market' }); });
  return spreadItems(items);
}

function draw(ts) {
  rafId = requestAnimationFrame(draw);
  if (ts - lastFrame < 1000 / FPS) return;
  const dt = Math.min(0.1, (ts - lastFrame) / 1000 || 0.033);
  lastFrame = ts;
  const w = canvas.width / dpr, h = canvas.height / dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, w, h);
  cx = w / 2; cy = h * 0.52; R = Math.min(w, h) * 0.44;

  if (!dragging) { yaw += yawV * dt; yawV *= 0.92; }

  drawSky(w, h);
  drawGlobeBase();
  drawLandmasses();

  // グレー雰囲気建物（filterを一括設定してからまとめて描く＝呼び出しごとのsave/restoreを避け軽量化）
  ctx.save();
  ctx.filter = 'grayscale(1) brightness(0.72)';
  ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
  for (const s of GRAY_SLOTS) drawGrayBuilding(s.lat, s.lon, s.stories, s.emoji);
  ctx.restore();

  // 実物件（所有=カラー／市場=グレー）は奥から手前へ
  const items = coloredItems().map(it => ({ ...it, z: project(it.lat, it.lon).z })).sort((a, b) => a.z - b.z);
  for (const it of items) drawColorBuilding(it.p, it.lat, it.lon, it.kind);

  // 一覧「地図を見る」からのハイライト（拡大リング＋跳ねる📍ピン）。どこかをクリックするまで維持され、
  // ピン自体をクリックすると詳細画面が開く（pointerup側で処理）。
  if (pingItem) {
    const pr = project(pingItem.lat, pingItem.lon);
    if (pr.z > 0.02) {
      pingItem.sx = pr.x; pingItem.sy = pr.y;   // クリック判定用に画面座標を保持
      const now = performance.now();
      const t = (now % 900) / 900;
      ctx.save();
      // 二重の拡大リング
      ctx.strokeStyle = `rgba(250,204,21,${0.9 * (1 - t)})`;
      ctx.lineWidth = 3.5;
      ctx.beginPath(); ctx.arc(pr.x, pr.y - 8, 14 + t * 34, 0, TAU); ctx.stroke();
      ctx.strokeStyle = `rgba(250,204,21,${0.6 * (1 - ((t + 0.5) % 1))})`;
      ctx.beginPath(); ctx.arc(pr.x, pr.y - 8, 14 + ((t + 0.5) % 1) * 34, 0, TAU); ctx.stroke();
      // 跳ねる📍ピン
      const bounce = Math.abs(Math.sin(now / 220)) * 9;
      ctx.font = '28px "Segoe UI Emoji", sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
      ctx.fillText('📍', pr.x, pr.y - 26 - bounce);
      ctx.restore();
    } else {
      pingItem.sx = null; pingItem.sy = null;   // 裏面に回ったらクリック不可
    }
  }
}

// 地図上でタップ対象になるのは所有物件、および★お気に入り登録済みの市場物件のみ。
function hitTest(px, py) {
  const favIds = new Set((st?.favorites || []).map(f => f.propertyId));
  const items = coloredItems()
    .filter(it => it.kind === 'owned' || favIds.has(it.p.id))
    .map(it => ({ ...it, pr: project(it.lat, it.lon) }))
    .filter(it => it.pr.z > 0.04)
    .sort((a, b) => b.pr.z - a.pr.z);
  for (const it of items) {
    const scale = 0.85 + it.pr.z * 1.15;
    const stories = SHAPE_STORIES[L.svgBuildingParts(it.p).shape] ?? 1;
    const size = (17 + stories * 2.9) * scale;
    const half = size * 0.55;
    // 建物同士が近くても押しやすいよう、見た目の絵文字より少し広めの当たり判定にする。
    if (px >= it.pr.x - half - 8 && px <= it.pr.x + half + 8 && py >= it.pr.y - size - 10 && py <= it.pr.y + 8) return it;
  }
  return null;
}

// 立っている📍ピンのクリック判定（ピン頭〜リング周辺を広めに取る）
function hitPin(px, py) {
  if (!pingItem || pingItem.sx == null) return false;
  const dx = px - pingItem.sx, dy = py - (pingItem.sy - 20);
  return dx * dx + dy * dy < 26 * 26;
}

// 未開拓エリアの🔒クリック判定。表面に見えている最寄りのロックを返す。
function hitLock(px, py) {
  for (const area of UNEXPLORED_AREAS) {
    const p = project(area.center.lat, area.center.lon);
    if (p.z < 0.05) continue;
    const dx = px - p.x, dy = py - p.y;
    if (dx * dx + dy * dy < 20 * 20) return area;
  }
  return null;
}

function resize() {
  dpr = window.devicePixelRatio || 1;
  canvas.width = canvas.clientWidth * dpr;
  canvas.height = canvas.clientHeight * dpr;
}

function initCity(cv, callbacks) {
  canvas = cv; cbs = callbacks || {};
  ctx = canvas.getContext('2d');
  resize();
  // Tailwind CDNのスタイル適用が非同期のため、initCity実行時点ではcanvasのレイアウトサイズが
  // まだ確定していないことがある（clientWidth=0）。ResizeObserverで実際のサイズ確定を捉える。
  if (typeof ResizeObserver !== 'undefined') {
    new ResizeObserver(resize).observe(canvas);
  } else {
    window.addEventListener('resize', resize);
  }

  canvas.addEventListener('pointerdown', e => {
    dragging = true; moved = 0; lastX = e.clientX; lastY = e.clientY; yawV = 0;
    try { canvas.setPointerCapture(e.pointerId); } catch (err) {}
    canvas.style.cursor = 'grabbing';
  });
  canvas.addEventListener('pointermove', e => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    if (!dragging) {
      // ホバー時: タップできる対象（所有/お気に入り物件・ピン・🔒）の上ではカーソルを指マークに
      const over = hitPin(mx, my) || hitLock(mx, my) || hitTest(mx, my);
      canvas.style.cursor = over ? 'pointer' : 'grab';
      return;
    }
    const dx = e.clientX - lastX, dy = e.clientY - lastY;
    moved += Math.abs(dx) + Math.abs(dy);
    yaw += dx / (R || 150);
    pitch = Math.max(-1.1, Math.min(1.1, pitch + dy / (R || 150)));
    yawV = dx / (R || 150) * 6;
    lastX = e.clientX; lastY = e.clientY;
  });
  canvas.addEventListener('pointerup', e => {
    dragging = false; canvas.style.cursor = 'grab';
    if (moved < 8) {
      const rect = canvas.getBoundingClientRect();
      const mx = e.clientX - rect.left, my = e.clientY - rect.top;
      // ①ピンをクリック → 詳細画面へ（ピンは消す）
      if (hitPin(mx, my)) { const id = pingItem.id; pingItem = null; if (cbs.onTapMarketDetail) cbs.onTapMarketDetail(id); return; }
      // どこかをクリックしたらピンは解除（②以降の判定は続ける）
      pingItem = null;
      // ②🔒未開拓エリア → ティーザー表示
      if (hitLock(mx, my)) { if (cbs.onTapLock) cbs.onTapLock(); return; }
      // ③物件
      const hit = hitTest(mx, my);
      if (hit) {
        if (hit.kind === 'owned' && cbs.onTapProperty) cbs.onTapProperty(hit.p.id);
        if (hit.kind === 'market' && cbs.onTapMarket) cbs.onTapMarket(hit.p.id);
      }
    }
  });
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) { cancelAnimationFrame(rafId); rafId = 0; }
    else if (!rafId) rafId = requestAnimationFrame(draw);
  });
  rafId = requestAnimationFrame(draw);
}

function setCityState(s) { st = s; }

// 物件一覧の「地図を見る」から呼ぶ: 該当の市場物件が正面に来るよう回転しピンを立てる。
// ピンはどこかをクリックするまで維持され、ピン自体をクリックすると詳細画面が開く。
function focusOnMarket(propertyId) {
  if (!st) return;
  const p = st.market.find(x => x.id === propertyId);
  if (!p) return;
  const s = slotFor(p.areaKey, 'm:' + p.id);
  yaw = -s.lon; pitch = Math.max(-0.6, Math.min(0.2, -s.lat * 0.6));
  yawV = 0;
  pingItem = { lat: s.lat, lon: s.lon, id: propertyId, sx: null, sy: null };
}

// コイン回収アニメ用: 所有建物のビューポート座標一覧
function cityBuildingScreenPositions() {
  if (!canvas || !st) return [];
  const rect = canvas.getBoundingClientRect();
  return st.properties.map(p => {
    const s = slotFor(p.areaKey, 'o:' + p.id);
    const pr = project(s.lat, s.lon);
    if (pr.z < 0.04) return null;
    return { x: rect.left + pr.x, y: rect.top + pr.y };
  }).filter(Boolean);
}

// src/ui.mjs

const SAVE_KEY = 'leverage_master_save_v2';
let state = null;

function el(html){ const t=document.createElement('template'); t.innerHTML=html.trim(); return t.content.firstChild; }

// ===== サウンド（Web Audio APIでその場合成。外部音源ファイル不要・単一ファイルのまま） =====
const MUTE_KEY = 'leverage_master_muted';
const BGM_KEY = 'leverage_master_bgm';
let muted = localStorage.getItem(MUTE_KEY) === '1';
let bgmMood = localStorage.getItem(BGM_KEY) || 'relax';
let audioCtx = null;
let bgmHandle = null;

function ensureAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function playTone({ freq, duration = 0.15, type = 'sine', gain = 0.12, delay = 0 }) {
  if (muted) return;
  const ctx = ensureAudioCtx();
  const osc = ctx.createOscillator(), g = ctx.createGain();
  osc.type = type;
  const t0 = ctx.currentTime + delay;
  osc.frequency.setValueAtTime(freq, t0);
  g.gain.setValueAtTime(0, t0);
  g.gain.linearRampToValueAtTime(gain, t0 + 0.01);
  g.gain.exponentialRampToValueAtTime(0.001, t0 + duration);
  osc.connect(g); g.connect(ctx.destination);
  osc.start(t0); osc.stop(t0 + duration + 0.02);
}

function sfxClick() { playTone({ freq: 700, duration: 0.05, type: 'square', gain: 0.05 }); }
function sfxKnock() { playTone({ freq: 180, duration: 0.08, type: 'triangle', gain: 0.14 }); playTone({ freq: 160, duration: 0.08, type: 'triangle', gain: 0.12, delay: 0.16 }); }
function sfxCoin() { [880, 1180, 1480].forEach((f, i) => playTone({ freq: f, duration: 0.12, type: 'sine', gain: 0.10, delay: i * 0.05 })); }
function sfxFanfare() { [523, 659, 784, 1046].forEach((f, i) => playTone({ freq: f, duration: 0.28, type: 'triangle', gain: 0.15, delay: i * 0.1 })); }
function sfxBadge() { playTone({ freq: 1046, duration: 0.15, type: 'sine', gain: 0.12 }); playTone({ freq: 1568, duration: 0.22, type: 'sine', gain: 0.10, delay: 0.1 }); }
// 買付の溜め用ドラムロール（低音の連打が徐々に速く強くなる）
function sfxDrumroll() { for (let i = 0; i < 22; i++) playTone({ freq: 90 + (i % 2) * 20, duration: 0.05, type: 'triangle', gain: 0.05 + i * 0.004, delay: i * (0.09 - i * 0.002) }); }
// 買付不成立の残念音（下降する短二音）
function sfxFail() { playTone({ freq: 392, duration: 0.22, type: 'sawtooth', gain: 0.12 }); playTone({ freq: 294, duration: 0.35, type: 'sawtooth', gain: 0.12, delay: 0.2 }); }

// 気分で選べるBGM（コード進行＋アルペジオ＋ベースをその場で生成。単調なドローンではなく音楽的に展開させる）。
function midi(n) { return 440 * Math.pow(2, (n - 69) / 12); }
const BGM_MOODS = {
  // chords は各コードの構成音（MIDIノート番号）。stepMsごとにアルペジオを1音鳴らし、コード頭でベースを添える。
  relax:  { label: '🌿 のんびり', stepMs: 640, gain: 0.05, wave: 'sine',
    chords: [[60, 64, 67, 71], [57, 60, 64, 67], [53, 57, 60, 64], [55, 59, 62, 65]] },
  chill:  { label: '🌙 しっとり', stepMs: 500, gain: 0.045, wave: 'triangle',
    chords: [[57, 60, 64], [52, 55, 59], [53, 57, 60], [55, 59, 62]] },
  lively: { label: '✨ わくわく', stepMs: 340, gain: 0.05, wave: 'triangle',
    chords: [[60, 64, 67], [55, 59, 62], [57, 60, 64], [53, 57, 60]] },
};

function playBgmNote(ctx, master, freq, wave, duration, gain) {
  const osc = ctx.createOscillator(), g = ctx.createGain();
  const t0 = ctx.currentTime;
  osc.type = wave; osc.frequency.value = freq;
  g.gain.setValueAtTime(0, t0);
  g.gain.linearRampToValueAtTime(gain, t0 + 0.04);
  g.gain.exponentialRampToValueAtTime(0.001, t0 + duration);
  osc.connect(g); g.connect(master);
  osc.start(t0); osc.stop(t0 + duration + 0.05);
}

function startBgm() {
  if (muted || bgmHandle) return;
  const mood = BGM_MOODS[bgmMood] || BGM_MOODS.relax;
  const ctx = ensureAudioCtx();
  const master = ctx.createGain();
  master.gain.value = mood.gain;
  master.connect(ctx.destination);
  const chordLen = 8;   // 1コードあたりのステップ数
  let step = 0;
  const timer = setInterval(() => {
    const chord = mood.chords[Math.floor(step / chordLen) % mood.chords.length];
    const pos = step % chordLen;
    // アルペジオ（1オクターブ上げて明瞭に）＋コード頭でベース
    playBgmNote(ctx, master, midi(chord[pos % chord.length] + 12), mood.wave, 0.55, 0.5);
    if (pos === 0) playBgmNote(ctx, master, midi(chord[0] - 12), 'sine', 1.6, 0.6);
    if (pos === 4) playBgmNote(ctx, master, midi(chord[0]), 'sine', 1.0, 0.35);   // 中間で軽く土台
    step++;
  }, mood.stepMs);
  bgmHandle = { master, timer };
}

function stopBgm() {
  if (!bgmHandle) return;
  clearInterval(bgmHandle.timer);
  try { bgmHandle.master.disconnect(); } catch (e) {}
  bgmHandle = null;
}

function setMuted(v) {
  muted = v;
  localStorage.setItem(MUTE_KEY, v ? '1' : '0');
  if (v) stopBgm(); else startBgm();
}

function setBgmMood(mood) {
  bgmMood = mood;
  localStorage.setItem(BGM_KEY, mood);
  if (!muted) { stopBgm(); startBgm(); }   // 再生中なら即切り替え
}

// ヘッダー🎵ボタン: BGMの気分を選ぶポップオーバー。
function openBgmModal() {
  const m = document.getElementById('bgm-modal');
  m.classList.remove('hidden'); m.classList.add('flex'); m.innerHTML = '';
  const close = () => { m.classList.add('hidden'); m.classList.remove('flex'); m.innerHTML = ''; };
  const rows = Object.keys(BGM_MOODS).map(k =>
    `<button class="bgm-pick w-full border rounded py-2 text-sm ${bgmMood === k && !muted ? 'bg-navy text-white' : ''}" data-mood="${k}">${BGM_MOODS[k].label}</button>`).join('');
  const box = el(`<div class="bg-white rounded-xl p-4 w-full max-w-xs space-y-2">
    <div class="flex justify-between items-center"><h2 class="font-bold">🎵 BGMの気分</h2><button id="bgm-close" class="text-slate-400 text-xl">✕</button></div>
    ${rows}
    <button id="bgm-off" class="w-full border rounded py-2 text-sm ${muted ? 'bg-slate-200' : ''}">🔇 BGMを止める</button>
    <div class="text-[11px] text-slate-400">気分に合わせて選べます。いつでも変更できます。</div></div>`);
  m.appendChild(box);
  box.querySelector('#bgm-close').addEventListener('click', close);
  box.querySelectorAll('.bgm-pick').forEach(b => b.addEventListener('click', () => {
    if (muted) setMuted(false);   // 消音中に気分を選んだら鳴らし始める
    setBgmMood(b.dataset.mood);
    updateMuteButton(); openBgmModal();
  }));
  box.querySelector('#bgm-off').addEventListener('click', () => { setMuted(true); updateMuteButton(); openBgmModal(); });
}

function updateMuteButton() {
  const btnMute = document.getElementById('btn-mute');
  if (btnMute) btnMute.textContent = muted ? '🔇' : '🔊';

// 最初のユーザー操作でBGM開始（ブラウザの自動再生ポリシー対策）。ボタンは種類を問わず拾う汎用クリック音も同時に配線。
function wireGlobalAudioHooks() {
  const startOnce = () => { if (!muted) startBgm(); document.body.removeEventListener('click', startOnce, true); };
  document.body.addEventListener('click', startOnce, true);
  document.body.addEventListener('click', (e) => { if (e.target.closest('button')) sfxClick(); }, true);
}

// カンマ区切りの数値入力（type="text"）。入力中は自動でカンマ整形し、取り出しは parseCommaNumber で行う。
function parseCommaNumber(v){ return Number(String(v).replace(/[^\d-]/g, '')) || 0; }
function wireCommaInput(input, { min = 0, max = Infinity } = {}){
  input.addEventListener('input', () => {
    const digits = input.value.replace(/[^\d]/g, '');
    input.value = digits ? Number(digits).toLocaleString('en-US') : '';
  });
  input.addEventListener('blur', () => {
    const clamped = Math.max(min, Math.min(max, parseCommaNumber(input.value)));
    input.value = clamped.toLocaleString('en-US');
  });
}
function setCommaValue(input, n){ input.value = Number(n).toLocaleString('en-US'); }

function showSetup() {
  const m = document.getElementById('setup-modal');
  m.classList.remove('hidden'); m.innerHTML = '';
  m.appendChild(el(`

      <div><div class="font-bold text-sm mb-1">目標タイプ</div>
        <div class="flex gap-2">
          <label class="flex-1 border rounded p-2 text-sm text-center"><input type="radio" name="goaltype" value="networth" checked> 純資産</label>
          <label class="flex-1 border rounded p-2 text-sm text-center"><input type="radio" name="goaltype" value="cashflow"> 月間CF</label>

      <button id="btn-start" class="w-full bg-navy text-white rounded py-2 font-bold">ゲーム開始</button>
    </div>`));
  const PRESETS = {
    networth: [[30_000_000, '3,000万'], [100_000_000, '1億'], [300_000_000, '3億']],
    cashflow: [[300_000, '30万'], [1_000_000, '100万'], [3_000_000, '300万']],
  };
  const attrSel = m.querySelector('#in-attr');
  const salaryInput = m.querySelector('#in-salary');
  const seedInput = m.querySelector('#in-seed');
  const ageInput = m.querySelector('#in-age');
  const yearsInput = m.querySelector('#in-years');
  const yearsHint = m.querySelector('#years-max-hint');
  wireCommaInput(salaryInput, { min: L.CONFIG.salaryMin, max: L.CONFIG.salaryMax });
  wireCommaInput(seedInput, { min: L.CONFIG.seedMin, max: L.CONFIG.seedMax });
  wireCommaInput(m.querySelector('#in-goalval'), { min: 0, max: Infinity });
  const applyDefaultSalary = () => setCommaValue(salaryInput, attrSel.value === 'employee' ? 150000 : 100000);
  attrSel.addEventListener('change', applyDefaultSalary);
  applyDefaultSalary();
  setCommaValue(seedInput, 10_000_000);
  const updateYearsCap = () => {
    const age = Math.max(18, Math.min(79, Number(ageInput.value) || 30));
    const maxYears = L.maxYearsForAge(age);
    yearsInput.max = String(maxYears);
    yearsHint.textContent = `（80歳までの上限 ${maxYears}年）`;
    if (Number(yearsInput.value) > maxYears) yearsInput.value = maxYears;
  };
  ageInput.addEventListener('input', updateYearsCap);
  updateYearsCap();
  const renderPresets = () => {
    const t = m.querySelector('input[name="goaltype"]:checked').value;
    const box = m.querySelector('#goal-presets'); box.innerHTML = '';

function save(){ localStorage.setItem(SAVE_KEY, L.serialize(state)); }
function load(){
  const raw = localStorage.getItem(SAVE_KEY);
  if(!raw) return false;
  state = L.deserialize(raw);
  state.stats = state.stats || { buys: 0, sales: 0, profitSales: 0, junkFlips: 0, hadLoan: false };
  state.badges = state.badges || [];
  state.favorites = state.favorites || [];
  state.notifications = state.notifications || [];
  state.nextNotifId = state.nextNotifId || 1;
  return true;
}

function render(){ setCityState(state); renderPanelLeft(); renderPanelRight(); checkEnd(); checkNewBadges(); save(); showExpFloats(); }

function pushLog(msg){ state.log = state.log || []; state.log.unshift(msg); if(state.log.length>50) state.log.pop(); }
function gainExp(skill, base){ state.skills[skill].exp += Math.round(base * (state.expMult||1)); }

// ホーム画面の「詳細を表示」開閉状態。render()を跨いで記憶する（毎回閉じ直されないように）。

      <div class="grid grid-cols-2 gap-1">

    <div class="hud-panel pointer-events-auto rounded-lg shadow p-2 text-[11px]">
      🎯 ${pct}% 達成
      <div class="w-full bg-slate-200 rounded h-1.5 mt-1"><div class="bg-emerald h-1.5 rounded" style="width:${pct}%"></div></div>
      <button id="btn-bs-toggle" class="text-[10px] text-slate-400 underline mt-1">${bsDetailOpen ? '▲ 閉じる' : '▶ 詳細'}</button>
      <div id="bs-detail" class="mt-1 space-y-1 max-h-32 overflow-y-auto ${bsDetailOpen ? '' : 'hidden'}">

        <div>総資産 <b>${L.yen(L.totalAssetsV2(state))}</b></div>
        <div>総負債 <b>${L.yen(L.totalDebt(state))}</b></div>
        <div>税リスク <span class="${risk === '低' ? 'bg-blue-100 text-blue-700' : risk === '中' ? 'bg-yellow-100 text-yellow-700' : 'bg-red-100 text-red-700'} rounded px-1">${risk}</span></div>
        <div class="border-t pt-1">給与 <b>${L.yen(state.salary)}</b>
          <div class="flex gap-1 mt-1">
            <input id="in-salary-edit" type="text" inputmode="numeric" class="flex-1 min-w-0 border rounded px-1 py-0.5 text-[10px]" value="${Number(state.salary).toLocaleString('en-US')}">
            <button id="btn-salary-apply" class="border rounded px-1 text-[10px] shrink-0">変更</button>
          </div></div>

}

// 左上の4KPIアイコン（💰🏠📈📊）をタップすると、それぞれの内訳・詳細を表示する。
function openKpiModal(which) {
  const m = document.getElementById('kpi-modal');
  m.classList.remove('hidden'); m.classList.add('flex'); m.innerHTML = '';
  const close = () => { m.classList.add('hidden'); m.classList.remove('flex'); m.innerHTML = ''; };
  let title = '', body = '';
  if (which === 'cash') {
    title = '💰 資産スナップショット';
    body = `<table class="w-full text-sm">
      <tr><td>手元現金</td><td class="text-right font-bold">${L.yen(state.cash)}</td></tr>
      <tr class="border-t"><td>総資産（現金＋物件時価）</td><td class="text-right">${L.yen(L.totalAssetsV2(state))}</td></tr>
      <tr><td>総負債（残債）</td><td class="text-right text-red-600">-${L.yen(L.totalDebt(state))}</td></tr>
      <tr class="border-t font-bold"><td>純資産</td><td class="text-right text-emerald">${L.yen(L.netWorth(state))}</td></tr>
      <tr class="border-t"><td>月の余剰資金（給与等）</td><td class="text-right">${L.yen(state.salary)}</td></tr>
    </table>`;
  } else if (which === 'props') {
    title = `🏠 所有物件（${state.properties.length}件）`;
    body = state.properties.length ? `<div class="space-y-1">${state.properties.map(p => {
      const occ = p.units.length ? Math.round(p.units.filter(u => u.occupied).length / p.units.length * 100) : 0;
      const alert = p.repairState < 20 ? ' <span class="text-red-600">⚠️要修繕</span>' : '';
      return `<button class="kpi-prop w-full text-left border rounded p-2 text-xs hover:bg-slate-50" data-id="${p.id}">
        <div class="font-bold">${p.name || p.label}</div>
        <div class="text-slate-500">${p.label}｜利回り${(p.grossYield * 100).toFixed(1)}%・修繕度${p.repairState}%・入居${occ}%${alert}</div></button>`;
    }).join('')}</div>` : '<div class="text-slate-400 text-sm">まだ物件を所有していません。営業→買付で増やしましょう。</div>';
  } else if (which === 'cf') {
    title = '📈 月間キャッシュフロー内訳';
    const total = L.monthlyCF(state);
    const rows = state.properties.map(p => {
      const cf = p.history.at(-1)?.cf ?? 0;
      return `<tr class="border-t"><td>${p.name || p.label}</td><td class="text-right ${cf >= 0 ? 'text-emerald' : 'text-red-600'}">${L.yen(cf)}</td></tr>`;
    }).join('');
    body = `<table class="w-full text-sm">${rows || '<tr><td class="text-slate-400 py-2">まだ物件収支の記録がありません（買付後、翌月から計上）</td></tr>'}
      <tr class="border-t-2 font-bold"><td>物件からの月CF合計</td><td class="text-right ${total >= 0 ? 'text-emerald' : 'text-red-600'}">${L.yen(total)}</td></tr></table>
      <div class="text-[11px] text-slate-400 mt-2">※ 給与等の余剰資金（${L.yen(state.salary)}/月）は上記CFとは別枠で手元現金に加算されます。</div>`;
  } else if (which === 'credit') {
    title = '📊 信用度と銀行取引実績';
    const rel = state.bankRelations || {};
    const bankRows = Object.keys(L.BANKS).map(k => {
      const r = rel[k] || { loans: 0, paidOff: 0 };
      return `<tr class="border-t"><td>${L.BANKS[k].label}</td><td class="text-right">融資${r.loans}件・完済${r.paidOff}件</td></tr>`;
    }).join('');
    body = `<div class="text-sm mb-2">現在の信用度: <b>${state.creditScore}</b></div>
      <div class="text-[11px] text-slate-400 mb-1">信用度が高いほど審査に通りやすく、取引実績（完済）が増えると金利優遇を受けやすくなります。</div>
      <table class="w-full text-sm">${bankRows}</table>`;
  }
  const boxEl = el(`<div class="bg-white rounded-xl p-4 w-full max-w-md max-h-[75vh] overflow-y-auto space-y-2">
    <div class="flex justify-between items-center"><h2 class="font-bold">${title}</h2><button id="kpi-close" class="text-slate-400 text-xl">✕</button></div>
    <div>${body}</div></div>`);
  m.appendChild(boxEl);
  boxEl.querySelector('#kpi-close').addEventListener('click', close);
  boxEl.querySelectorAll('.kpi-prop').forEach(b => b.addEventListener('click', () => { close(); openDetail(Number(b.dataset.id), 'owned', () => openKpiModal('props')); }));
}

// back を渡すと「← 戻る」を表示し、閉じたあと元のモーダルへ戻れる（別モーダルから開いた場合の重なりも解消）。
function openDetail(propId, from, back) {
  const p = (from === 'market' ? state.market : state.properties).find(x => x.id === propId);
  if (!p) return;
  const m = document.getElementById('detail-modal');
  m.classList.remove('hidden'); m.classList.add('flex');
  const tabs = ['概要', 'レントロール', '収支', '融資'];
  let active = 0;
  const close = () => { m.classList.add('hidden'); m.classList.remove('flex'); m.innerHTML = ''; };
  const draw = () => {
    m.innerHTML = '';
    const footer = from === 'owned' ? `<div class="p-2 border-t flex gap-2">
        <button class="dt-diy flex-1 border rounded py-1.5 text-sm" ${p.repairState >= 100 ? 'disabled' : ''}>🖌️ DIY(-30)</button>
        <button class="dt-repair flex-1 border rounded py-1.5 text-sm" ${p.repairState >= 100 ? 'disabled' : ''}>業者修繕</button>
        <button class="dt-sell flex-1 border rounded py-1.5 text-sm">売却</button></div>` : '';
    const box = el(`<div class="bg-white rounded-xl w-full max-w-lg max-h-[85vh] flex flex-col">
      <div class="p-3 border-b shrink-0">
        <div class="flex justify-between items-center mb-1">
          ${back ? '<button id="dt-back" class="text-xs text-navy">← 戻る</button>' : '<span></span>'}
          <button id="dt-close" class="text-slate-400 text-xl leading-none">✕</button></div>
        <div class="flex items-center gap-2">${renderBuildingSVG(p, 'w-14 h-14')}
          <div class="min-w-0"><div class="font-bold truncate">${p.name || p.label}</div><div class="text-[11px] text-slate-400">${p.label}</div></div></div>
      </div>
      <div class="flex border-b text-sm shrink-0">${tabs.map((t, i) => `<button class="dt-tab flex-1 py-2 ${i === active ? 'border-b-2 border-navy font-bold' : 'text-slate-400'}" data-i="${i}">${t}</button>`).join('')}</div>
      <div id="dt-body" class="p-4 text-sm overflow-y-auto min-h-0 flex-1"></div>
      ${footer}</div>`);
    m.appendChild(box);
    box.querySelector('#dt-close').addEventListener('click', close);
    if (back) box.querySelector('#dt-back').addEventListener('click', () => { close(); back(); });
    box.querySelectorAll('.dt-tab').forEach(b => b.addEventListener('click', () => { active = Number(b.dataset.i); draw(); }));
    const body = box.querySelector('#dt-body');
    if (active === 0) body.innerHTML = overviewTab(p, from);
    if (active === 1) { body.innerHTML = rentRollTab(p, from); wireFillButtons(body, p, from); }
    if (active === 2) body.innerHTML = plTab(p);
    if (active === 3) body.innerHTML = financeTab(p);
    if (from === 'owned') {
      box.querySelector('.dt-diy').addEventListener('click', () => { close(); openDiyGame(p.id); });
      box.querySelector('.dt-repair').addEventListener('click', () => { close(); openRepairService(p.id); });
      box.querySelector('.dt-sell').addEventListener('click', () => { close(); openSell(p.id); });
    }
  };
  draw();
}

// 修繕度ゲージ: 緑(60%以上)→黄(20〜59%)→赤(20%未満)で一目で分かる。20%割れは管理会社アラートを併記。
function repairGauge(pct) {
  const color = pct >= 60 ? 'bg-emerald' : pct >= 20 ? 'bg-yellow-400' : 'bg-red-500';
  const warn = pct < 20 ? '<span class="text-red-600 text-[10px] ml-1">⚠️管理会社から修繕依頼</span>' : '';
  return `<span class="inline-flex items-center gap-1 align-middle">
    <span class="inline-block w-24 bg-slate-200 rounded h-2 overflow-hidden"><span class="${color} block h-2" style="width:${Math.max(0, Math.min(100, pct))}%"></span></span>
    <b>${pct}%</b>${warn}</span>`;
}

function noiTable(p) {
  const gpi = L.gpiAnnual(p), egi = L.egiAnnual(p), opex = L.opexAnnual(p), noi = L.noiAnnualV2(p);
  return `<table class="w-full text-xs mt-2">
      <tr><td>満室想定年収（GPI）</td><td class="text-right">${L.yen(gpi)}</td></tr>
      <tr><td>現況の空室損</td><td class="text-right">-${L.yen(L.vacancyLossAnnual(p))}</td></tr>
      <tr><td>現況年収（EGI）</td><td class="text-right">${L.yen(egi)}</td></tr>
      <tr><td>年間運営費（管理費・修繕積立・PM・固都税）</td><td class="text-right">-${L.yen(opex)}</td></tr>
      <tr class="font-bold border-t"><td>NOI（営業純収益）</td><td class="text-right">${L.yen(noi)}</td></tr>
    </table>`;
}

function overviewTab(p, from) {
  // 所有物件は「日々の管理ダッシュボード」（現況入居率・直近月CF・現在時価・購入時比較）を主表示にする。
  if (from === 'owned') {
    const occN = p.units.filter(u => u.occupied).length, occ = p.units.length ? Math.round(occN / p.units.length * 100) : 0;
    const lastCf = p.history.at(-1)?.cf;
    const gain = (p.timeValue || 0) - (p.boughtPrice || 0);
    return `<div class="space-y-1">
      <div class="text-[11px] text-slate-400">日々の管理ダッシュボード（現況ベース）</div>
      <div class="grid grid-cols-2 gap-1 text-xs">
        <div class="border rounded p-1">現況入居率<div class="font-bold ${occ >= 100 ? 'text-emerald' : occ > 0 ? 'text-amber-600' : 'text-red-600'}">${occ}%（${occN}/${p.units.length}戸）</div></div>
        <div class="border rounded p-1">直近の月CF<div class="font-bold ${(lastCf ?? 0) >= 0 ? 'text-emerald' : 'text-red-600'}">${lastCf == null ? '—' : L.yen(lastCf)}</div></div>
        <div class="border rounded p-1">現在の時価<div class="font-bold">${L.yen(p.timeValue)}</div></div>
        <div class="border rounded p-1">購入時との差<div class="font-bold ${gain >= 0 ? 'text-emerald' : 'text-red-600'}">${gain >= 0 ? '+' : ''}${L.yen(gain)}</div></div>
      </div>
      <div class="flex items-center gap-1">🔧 修繕度 ${repairGauge(p.repairState)}</div>
      <div>${p.structure}造・築${p.builtAge}年・${p.units.length}戸／残存償却 ${p.deprRemaining}ヶ月 ${p.deprRemaining === 0 ? '⚠️デッドクロス中' : ''}</div>
      <div class="text-[11px] text-slate-400">購入時 ${L.yen(p.boughtPrice)}（${Math.floor((p.boughtMonth ?? 0) / 12)}年${(p.boughtMonth ?? 0) % 12}ヶ月目に取得）</div>
      ${p.junkFlags.length ? `<div class="text-red-600">訳あり: ${p.junkFlags.join('・')}</div>` : ''}
      ${noiTable(p)}</div>`;
  }
  // 市場物件は売出情報を主表示。

function plTab(p) {
  if (!p.history.length) return '<div class="text-slate-400">購入後、月が進むと収支が記録されます。</div>';
  const equity = p.boughtPrice ? p.boughtPrice - (p.loan ? p.loan.principal : 0) + Math.round(p.boughtPrice * L.CONFIG.closingCostRate) : 0;
  const ccr = equity > 0 ? (p.cum.cf / equity * 100).toFixed(1) : '-';
  return `<div class="mb-1">累計CF: <b class="${p.cum.cf >= 0 ? 'text-emerald' : 'text-red-600'}">${L.yen(p.cum.cf)}</b>（${p.cum.months}ヶ月）／ 自己資金回収率 ${ccr}%</div>
    <div class="max-h-60 overflow-y-auto"><table class="w-full text-xs">
    <tr class="text-slate-400"><th>月</th><th>家賃</th><th>空室損</th><th>運営費</th><th>利息</th><th>元金</th><th>税</th><th>CF</th></tr>
    ${[...p.history].reverse().map(h => `<tr class="border-t"><td>${h.month}</td><td>${L.yen(h.rentIn)}</td><td>${L.yen(h.vacancyLoss)}</td>
      <td>${L.yen(h.opex)}</td><td>${L.yen(h.interest)}</td><td>${L.yen(h.principal)}</td><td>${L.yen(h.tax)}</td>
      <td class="${h.cf >= 0 ? 'text-emerald' : 'text-red-600'}">${L.yen(h.cf)}</td></tr>`).join('')}
    </table></div>`;
}

function financeTab(p) {

// back を渡すと「← 戻る」を表示し、元のモーダルへ戻れる。
function openPurchase(propId, back) {
  const p = state.market.find(x => x.id === propId);
  if (!p) return;
  const m = document.getElementById('purchase-modal');
  m.classList.remove('hidden'); m.classList.add('flex'); m.innerHTML = '';
  const close = () => { m.classList.add('hidden'); m.classList.remove('flex'); m.innerHTML = ''; };
  const box = el(`<div class="bg-white rounded-xl p-5 w-full max-w-md space-y-2">
    <div class="flex justify-between items-center gap-2">
      ${back ? '<button id="of-back" class="text-xs text-navy">← 戻る</button>' : '<span></span>'}
      <button id="of-x" class="text-slate-400 text-xl leading-none shrink-0">✕</button></div>
    <div><h2 class="font-bold">${p.name || p.label} に買付を入れる（行動力-10）</h2><div class="text-[11px] text-slate-400">${p.label}</div></div>
    <div class="text-sm">売出価格: ${p.origPrice && p.price < p.origPrice ? `<span class="line-through text-slate-400">${L.yen(p.origPrice)}</span> → ` : ''}<b>${L.yen(p.price)}</b>${p.origPrice && p.price < p.origPrice ? ' <span class="text-[10px] bg-red-500 text-white rounded px-1">値下げ中</span>' : ''}${p.staleFlag ? '（売れ残り中・指値チャンス）' : ''}</div>
    <button id="of-detail" class="w-full text-xs text-navy underline">📋 レントロール・収支・融資の詳細を見る</button>
    ${[0, 0.05, 0.10, 0.15].map(c => `<button class="of-btn w-full border rounded py-2 text-sm" data-c="${c}" ${p.refusedOffer && c > 0 ? 'disabled' : ''}>
      ${c === 0 ? `満額 ${L.yen(p.price)}（必ず通る）` : `指値 -${Math.round(c * 100)}% → ${L.yen(Math.round(p.price * (1 - c)))}`}</button>`).join('')}
    <button id="of-cancel" class="w-full text-slate-400 text-sm">やめる</button></div>`);
  m.appendChild(box);
  // 詳細は買付モーダルを閉じてから開く（重なりで見えなくなる問題を解消）。詳細から買付へ「戻る」で戻れる。
  box.querySelector('#of-detail').addEventListener('click', () => { close(); openDetail(propId, 'market', () => openPurchase(propId, back)); });
  box.querySelector('#of-cancel').addEventListener('click', close);
  box.querySelector('#of-x').addEventListener('click', close);
  if (back) box.querySelector('#of-back').addEventListener('click', () => { close(); back(); });
  box.querySelectorAll('.of-btn').forEach(b => b.addEventListener('click', () => {
    if (state.actionPower < 10) { alert('行動力が足りません'); return; }
    const cut = Number(b.dataset.c);
    const r = L.makeOffer(state, propId, cut, Math.random);
    state = r.state; save();
    // 買付は一番ドキドキするポイント。結果を即出さず「交渉中…」の溜め演出を挟んでから発表する。
    playOfferSuspense(r.accepted, cut, () => {
      if (!r.accepted) { pushLog(`${p.label} への指値は断られた…（この物件には再指値できない）`); render(); close(); return; }
      pushLog(`${p.label} の買付が通った！（${L.yen(r.price)}）`);
      showPayment(propId, r.price, close);
    });
  }));
}

// 買付の結果発表: 交渉中の溜め（ドラムロール＋鼓動）→ ドラマチックな成立/残念の発表 → done()。
function playOfferSuspense(accepted, cut, done) {
  const overlay = el(`<div class="fixed inset-0 z-[70] bg-black/70 flex items-center justify-center p-4">
    <div class="text-center text-white space-y-4">
      <div id="ofs-emoji" class="text-6xl">🧑‍💼📄</div>
      <div id="ofs-title" class="text-2xl font-bold">交渉中<span id="ofs-dots"></span></div>
      <div id="ofs-sub" class="text-sm opacity-80">${cut > 0 ? `指値 -${Math.round(cut * 100)}% で相手の返事を待っています…` : '満額で申し込み中…'}</div>
    </div></div>`);
  document.body.appendChild(overlay);
  const dotsEl = overlay.querySelector('#ofs-dots');
  const emojiEl = overlay.querySelector('#ofs-emoji');
  const titleEl = overlay.querySelector('#ofs-title');
  const subEl = overlay.querySelector('#ofs-sub');
  // 溜め: ドット点滅＋鼓動アニメ＋ドラムロール音
  let dots = 0;
  const dotTimer = setInterval(() => { dots = (dots + 1) % 4; dotsEl.textContent = '.'.repeat(dots); }, 300);
  emojiEl.style.transition = 'transform 0.35s ease-in-out';
  const beatTimer = setInterval(() => {
    emojiEl.style.transform = emojiEl.style.transform === 'scale(1.15)' ? 'scale(1)' : 'scale(1.15)';
  }, 350);
  sfxDrumroll();
  const suspenseMs = cut > 0 ? 2000 : 1100;   // 満額は必ず通るので溜めは短め
  setTimeout(() => {
    clearInterval(dotTimer); clearInterval(beatTimer);
    emojiEl.style.transition = 'transform 0.4s cubic-bezier(.2,1.5,.4,1)';
    if (accepted) {
      emojiEl.textContent = '🎉'; emojiEl.style.transform = 'scale(1.6)';
      titleEl.textContent = '買付 成立！'; titleEl.className = 'text-3xl font-bold text-emerald-400';
      subEl.textContent = '契約に進みましょう';
      sfxFanfare();
    } else {
      emojiEl.textContent = '😢'; emojiEl.style.transform = 'scale(1.2)';
      titleEl.textContent = '残念…見送りに'; titleEl.className = 'text-3xl font-bold text-red-400';
      subEl.textContent = 'この物件へはもう指値できません';
      sfxFail();
    }
    setTimeout(() => { overlay.remove(); done(); }, accepted ? 1200 : 1500);
  }, suspenseMs);
}

function showPayment(propId, price, close) {
  const p = state.market.find(x => x.id === propId);
  const m = document.getElementById('purchase-modal');
  const cashNeed = price + Math.round(price * L.CONFIG.closingCostRate);
  let downRatio = 0.2;
  const draw = () => {
    m.innerHTML = '';
    const rs = L.reviewAllBanks(p, price, downRatio, state);
    const box = el(`<div class="bg-white rounded-xl p-5 w-full max-w-md space-y-2 max-h-[85vh] overflow-y-auto">
      <div class="flex justify-between items-start gap-2"><h2 class="font-bold">支払い方法（成約価格 ${L.yen(price)}）</h2><button id="pay-x" class="text-slate-400 text-xl leading-none shrink-0">✕</button></div>
      <button id="pay-cash" class="w-full border rounded py-2 text-sm ${state.cash < cashNeed ? 'opacity-40' : ''}" ${state.cash < cashNeed ? 'disabled' : ''}>現金一括（必要 ${L.yen(cashNeed)}）</button>
      <div class="text-sm font-bold pt-2 border-t">融資（4行同時審査）・頭金:
        <select id="pay-down" class="border rounded p-1 text-sm">
          <option value="0.1" ${downRatio === 0.1 ? 'selected' : ''}>1割</option>
          <option value="0.2" ${downRatio === 0.2 ? 'selected' : ''}>2割</option>
          <option value="0.3" ${downRatio === 0.3 ? 'selected' : ''}>3割</option>
        </select></div>
      <div id="pay-banks"></div>
      <button id="pay-cancel" class="w-full text-slate-400 text-sm">買付を取り下げる（ペナルティなし）</button></div>`);
    m.appendChild(box);
    const banksDiv = box.querySelector('#pay-banks');
    banksDiv.innerHTML = rs.map(r => r.approved
      ? `<div class="border rounded p-2 mb-1"><div class="flex justify-between items-center"><b>◯ ${r.label}</b>
          <button class="pay-bank bg-navy text-white rounded px-2 py-1 text-sm" data-k="${r.bankKey}">借りる</button></div>
          <div class="text-xs">金利${(r.terms.rate * 100).toFixed(2)}%・${r.terms.years}年・月返済${L.yen(r.terms.monthlyPay)}・要自己資金${L.yen(r.terms.requiredCash)}</div></div>`
      : `<div class="border rounded p-2 mb-1 bg-slate-50"><b>✕ ${r.label}</b>
          <div class="text-xs text-red-600">${r.reasons.map(x => x.msg).join('／')}</div></div>`).join('');
    box.querySelector('#pay-down').addEventListener('change', e => { downRatio = Number(e.target.value); draw(); });
    box.querySelector('#pay-cash').addEventListener('click', () => {
      const r = L.buyPropertyV2(state, propId, { method: 'cash', price });
      state = r.state; r.logs.forEach(pushLog); save(); render(); close(); checkEnd();
      celebrate('マイホーム(?)ゲット！', `${p.name || p.label} を ${L.yen(price)} で購入`, '🏠✨');
    });
    box.querySelectorAll('.pay-bank').forEach(b => b.addEventListener('click', () => {
      const r = L.buyPropertyV2(state, propId, { method: b.dataset.k, downRatio, price });
      state = r.state; r.logs.forEach(pushLog); save(); render(); close(); checkEnd();
      celebrate('新しい大家さんの誕生！', `${p.name || p.label} を ${L.yen(price)} で購入`, '🏠✨');
    }));
    box.querySelector('#pay-cancel').addEventListener('click', () => { pushLog('買付を取り下げた'); close(); });
    box.querySelector('#pay-x').addEventListener('click', () => { pushLog('買付を取り下げた'); close(); });
  };
  draw();
}

function openSell(propId) {
  const p = state.properties.find(x => x.id === propId);
  if (!p) return;
  const m = document.getElementById('sell-modal');
  m.classList.remove('hidden'); m.classList.add('flex'); m.innerHTML = '';
  const close = () => { m.classList.add('hidden'); m.classList.remove('flex'); m.innerHTML = ''; };
  const listing = (state.listings || []).find(l => l.propertyId === propId);
  if (listing) { drawListingManage(m, p, listing, close); return; }
  const box = el(`<div class="bg-white rounded-xl p-5 w-full max-w-md space-y-3">
    <div class="flex justify-between items-start gap-2"><h2 class="font-bold">${p.name || p.label} の売却</h2><button id="sl-x" class="text-slate-400 text-xl leading-none shrink-0">✕</button></div>
    <div class="text-sm">まず不動産屋に査定を依頼しよう（行動力-20）</div>
    <button id="sl-appraise" class="w-full bg-navy text-white rounded py-2">査定を依頼する</button>
    <button id="sl-cancel" class="w-full text-slate-400 text-sm">やめる</button></div>`);
  m.appendChild(box);
  box.querySelector('#sl-cancel').addEventListener('click', close);
  box.querySelector('#sl-x').addEventListener('click', close);
  box.querySelector('#sl-appraise').addEventListener('click', () => {
    if (state.actionPower < 20) { alert('行動力が足りません'); return; }
    const r = L.requestAppraisal(state, propId, Math.random);

    drawPricing(m, p, r.appraisal, close);

function drawPricing(m, p, appraisal, close) {
  m.innerHTML = '';
  let price = appraisal;
  const gpi = L.gpiAnnual(p);
  const yieldOf = (v) => (v > 0 ? (gpi / v * 100).toFixed(1) : '-');
  const box = el(`<div class="bg-white rounded-xl p-5 w-full max-w-md space-y-3">
    <div class="flex justify-between items-start gap-2"><h2 class="font-bold">売出価格を決める</h2><button id="sl-x2" class="text-slate-400 text-xl leading-none shrink-0">✕</button></div>
    <div class="text-sm">査定額: <b>${L.yen(appraisal)}</b></div>
    <input id="sl-range" type="range" min="${Math.round(appraisal * 0.7)}" max="${Math.round(appraisal * 1.3)}" value="${appraisal}" step="10000" class="w-full">
    <div class="text-center font-bold text-lg" id="sl-price">${L.yen(appraisal)}</div>
    <div class="text-center text-sm text-slate-500">表面利回り <span id="sl-yield" class="font-bold">${yieldOf(appraisal)}</span>%（満室想定・年間家賃収入 ${L.yen(gpi)} 基準）</div>
    <div class="text-xs text-slate-400">安くすれば早く売れる。高くすると時間がかかり、売れ残ると指値が入りやすくなる。</div>
    <button id="sl-list" class="w-full bg-emerald text-white rounded py-2">この価格で売りに出す</button>
    <button id="sl-cancel2" class="w-full text-slate-400 text-sm">やめる</button></div>`);
  m.appendChild(box);
  box.querySelector('#sl-range').addEventListener('input', e => {
    price = Number(e.target.value);
    box.querySelector('#sl-price').textContent = L.yen(price);
    box.querySelector('#sl-yield').textContent = yieldOf(price);
  });
  box.querySelector('#sl-list').addEventListener('click', () => {
    state = L.listForSale(state, p.id, price, appraisal).state;
    pushLog(`${p.label} を ${L.yen(price)} で売りに出した`);
    save(); render(); close();
  });
  box.querySelector('#sl-cancel2').addEventListener('click', close);
  box.querySelector('#sl-x2').addEventListener('click', close);
}

function drawListingManage(m, p, listing, close) {
  m.innerHTML = '';
  const downTo = Math.round(listing.askingPrice * 0.95 / 10000) * 10000;
  const box = el(`<div class="bg-white rounded-xl p-5 w-full max-w-md space-y-3">
    <div class="flex justify-between items-start gap-2"><h2 class="font-bold">${p.name || p.label}（売出中 ${listing.listedMonths}ヶ月目）</h2><button id="sl-x3" class="text-slate-400 text-xl leading-none shrink-0">✕</button></div>

    <button id="sl-delist" class="w-full border rounded py-2 text-sm">掲載を取り下げる</button>
    <button id="sl-close" class="w-full text-slate-400 text-sm">閉じる</button></div>`);
  m.appendChild(box);
  box.querySelector('#sl-down').addEventListener('click', () => {
    state = L.updateListing(state, p.id, downTo).state;
    pushLog(`${p.label} を ${L.yen(downTo)} に値下げした`); save(); render(); close();
  });
  box.querySelector('#sl-delist').addEventListener('click', () => {

    pushLog(`${p.label} の掲載を取り下げた`); save(); render(); close();

function showOfferModal(listing) {
  const p = state.properties.find(x => x.id === listing.propertyId);
  if (!p || !listing.offer) return;
  const m = document.getElementById('sell-modal');
  m.classList.remove('hidden'); m.classList.add('flex'); m.innerHTML = '';
  const close = () => { m.classList.add('hidden'); m.classList.remove('flex'); m.innerHTML = ''; };
  const o = listing.offer;
  const lv = L.skillLevel(state.skills.negotiation.exp);
  const counterPrice = Math.round((o.price + listing.askingPrice) / 2 / 10000) * 10000;
  const box = el(`<div class="bg-white rounded-xl p-5 w-full max-w-md space-y-2">
    <h2 class="font-bold">💌 ${p.name || p.label} に買付が入った！</h2>
    <div class="text-sm">売出 ${L.yen(listing.askingPrice)} に対し <b>${o.type === 'full' ? '満額' : '指値'} ${L.yen(o.price)}</b></div>
    <button class="of-act w-full bg-emerald text-white rounded py-2 text-sm" data-a="accept">承諾する（翌月決済）</button>
    ${o.type === 'sashine' ? `<button class="of-act w-full border rounded py-2 text-sm" data-a="counter">カウンター ${L.yen(counterPrice)}（成立確率${Math.round((0.5 + (lv - 1) * 0.05) * 100)}%・不成立なら買付消滅）</button>` : ''}
    <button class="of-act w-full border rounded py-2 text-sm" data-a="reject">断る（掲載継続）</button></div>`);
  m.appendChild(box);
  box.querySelectorAll('.of-act').forEach(b => b.addEventListener('click', () => {
    const r = L.respondToOffer(state, listing.propertyId, b.dataset.a, lv, Math.random);

    save(); render(); close();
  }));
}
