    <div class="text-center text-white space-y-4">
      <div class="mx-auto w-44 h-44 rounded-full flex items-center justify-center" style="border:10px solid #94a3b8;background:rgba(255,255,255,0.05);animation: df-stamp 0.5s cubic-bezier(.2,1.4,.4,1) both;">
        <span class="${conf.stamp.length >= 4 ? 'text-3xl' : 'text-4xl'} font-black" style="color:#cbd5e1;">${conf.stamp}</span></div>
      <div class="text-2xl font-bold">${conf.title}</div>
      <div class="text-sm opacity-80">${conf.sub}</div>
    </div></div>`);
  document.body.appendChild(overlay);
  setTimeout(() => { overlay.remove(); done(); }, 2300);
}

// リザルト画面。最終バランスシート・ポートフォリオ・生涯実績・称号をまとめて最終チェックできる。
function openResultScreen(kind) {
  const m = document.getElementById('setup-modal');
  m.classList.remove('hidden'); m.innerHTML = '';
  const nw = L.netWorth(state), ta = L.totalAssetsV2(state), td = L.totalDebt(state);
  const title = L.resultTitle(state);
  const goalText = `${state.goal.type === 'networth' ? '純資産' : '月間CF'} ${L.yen(state.goal.amount)}`;
  const persProps = state.properties.filter(p => p.owner !== 'corp');
  const corpProps = state.properties.filter(p => p.owner === 'corp');
  const sumTv = (arr) => arr.reduce((t, p) => t + p.timeValue, 0);
  const propRows = state.properties.length ? state.properties.map(p => `
    <div class="flex items-center gap-2 border rounded p-1.5">${renderBuildingSVG(p, 'w-8 h-8')}
      <div class="min-w-0 flex-1 text-left"><div class="font-bold truncate text-[11px]">${p.name || p.label}</div>
      <div class="text-[11px] text-slate-500">${p.owner === 'corp' ? '🏢法人' : '👤個人'}・時価 ${L.yen(p.timeValue)}</div></div></div>`).join('')
    : '<div class="text-slate-500 text-xs col-span-2">所有物件なし</div>';
  const st = state.stats || {};
  const badgeIds = L.evaluateBadges(state);
  const badges = badgeIds.length ? badgeIds.map(id => `<span class="inline-block border rounded px-1.5 py-0.5 mr-1 mb-1">${L.BADGES[id].icon}${L.BADGES[id].label}</span>`).join('') : 'なし';
  const head = kind === 'clear'
    ? `<div class="text-3xl font-black"><span style="background:linear-gradient(180deg,#f59e0b,#b45309);-webkit-background-clip:text;background-clip:text;color:transparent;">🏆 称号「${title}」</span></div>
       <div class="text-sm text-slate-600">目標 ${goalText} を ${Math.floor(state.month / 12)}年${state.month % 12}ヶ月 で達成！</div>`
    : `<div class="text-2xl font-black text-slate-700">${kind === 'bankrupt' ? '💥' : '⏰'} 称号「${title}」</div>
       <div class="text-sm text-slate-600">${Math.floor(state.month / 12)}年${state.month % 12}ヶ月の挑戦でした（目標 ${goalText}）</div>`;
  const box = el(`<div class="bg-white rounded-xl p-5 w-full max-w-lg max-h-[90vh] overflow-y-auto space-y-3 text-center">
    ${head}
    <div class="text-left">
      <div class="font-bold text-sm mb-1">📒 最終バランスシート</div>
      <table class="w-full text-sm">
        <tr><td>手元現金</td><td class="text-right font-bold">${L.yen(state.cash)}</td></tr>
        <tr class="border-t"><td>総資産（現金＋物件時価）</td><td class="text-right">${L.yen(ta)}</td></tr>
        <tr><td>総負債（残債）</td><td class="text-right text-red-600">-${L.yen(td)}</td></tr>
        <tr class="border-t font-bold"><td>純資産</td><td class="text-right text-emerald-700">${L.yen(nw)}</td></tr>
        <tr class="border-t"><td>月間キャッシュフロー</td><td class="text-right">${L.yen(L.monthlyCF(state))}</td></tr>
      </table>
    </div>
    <div class="text-left">
      <div class="font-bold text-sm mb-1">🏙️ ポートフォリオ（👤${persProps.length}件 ${L.yen(sumTv(persProps))} ・ 🏢${corpProps.length}件 ${L.yen(sumTv(corpProps))}）</div>
      <div class="grid grid-cols-2 gap-1">${propRows}</div>
    </div>
    <div class="text-left text-xs">
      <div class="font-bold text-sm mb-1">📜 生涯実績</div>
      <div>購入 ${st.buys || 0}件 ／ 売却 ${st.sales || 0}件（うち利益売却 ${st.profitSales || 0}件）／ 訳あり再生 ${st.junkRepairs || 0}件・転売 ${st.junkFlips || 0}件 ／ 最大月CF ${L.yen(st.maxMonthlyCF ?? 0)}</div>
      <div class="mt-1 leading-relaxed">${badges}</div>
    </div>
    <div class="flex gap-2 pt-2 border-t">
      <button id="rs-retry" class="flex-1 bg-navy text-white rounded-lg py-2.5 text-sm font-bold">🔁 新しい人生でもう一度</button>
      ${kind === 'clear' ? '<button id="rs-continue" class="flex-1 bg-amber-500 hover:bg-amber-600 text-white rounded-lg py-2.5 text-sm font-bold">🏙️ このまま経営を続ける</button>' : ''}
    </div></div>`);
  m.appendChild(box);
  box.querySelector('#rs-retry').addEventListener('click', () => {
    if (confirm('この人生を終えて、新しい人生をはじめますか？')) { localStorage.removeItem(SAVE_KEY); location.reload(); }
  });
  box.querySelector('#rs-continue')?.addEventListener('click', () => {
    state.freePlay = true; save();
    m.classList.add('hidden'); m.innerHTML = '';
    render();
  });
}

function checkEnd() {
  if (!state || state.freePlay) return;   // クリア後フリープレイ中は再判定しない
  if (L.isClearedV2(state)) {
    if (!endFxShown) { endFxShown = true; playClearFinale(() => openResultScreen('clear')); }
    return;
  }
  if (L.isBankrupt(state)) {
    if (!endFxShown) { endFxShown = true; playDefeatFx('bankrupt', () => openResultScreen('bankrupt')); }
    return;
  }
  if (L.isTimeUpV2(state)) {
    if (!endFxShown) { endFxShown = true; playDefeatFx('timeup', () => openResultScreen('timeup')); }
  }
}

wireGlobalAudioHooks();

// シティビュー初期化（建物タップ→詳細、売出し看板タップ→買付フロー）
initCity(document.getElementById('city-canvas'), {
  onTapProperty: (id) => { if (state) openDetail(id, 'owned'); },
  onTapMarket: (id) => { if (state) openPurchase(id); },
  onTapMarketDetail: (id) => { if (state) openDetail(id, 'market'); },   // 地図のピンをクリック→詳細画面
  onTapLock: () => openLockTeaser(),                                      // 🔒未開拓エリアをクリック→ティーザー
});

// 起動（v3.7: まずタイトル画面。セーブがあれば「続きから」）
showTitle(load());
document.getElementById('btn-result')?.addEventListener('click', () => openResultScreen('clear'));

document.getElementById('btn-reset').addEventListener('click', () => {
  if (confirm('データをリセットしますか？')) { localStorage.removeItem(SAVE_KEY); location.reload(); }
});

const btnMute = document.getElementById('btn-mute');
if (btnMute) {
  btnMute.textContent = muted ? '🔇' : '🔊';
  btnMute.addEventListener('click', () => {
    setMuted(!muted);
    updateMuteButton();
  });
}
const btnBgm = document.getElementById('btn-bgm');
if (btnBgm) btnBgm.addEventListener('click', openBgmModal);
  </script>
</body>
</html>
