function renderBuildingSVG(p, sizeClass = 'w-16 h-16') {
  const parts = L.svgBuildingParts(p);
  const wall = parts.wake ? '#d8cba8' : '#f1e4c9';
  const roof = { kodate: '#b3542e', apart: '#5b7fa6', tekkotsu: '#5b7fa6', kubun: '#94a3b8', rc: '#64748b' }[parts.shape];
  const win = parts.dirtLevel > 0.6 ? '#475569' : '#7dd3fc';
  const body = BUILDING_SHAPES[parts.shape](wall, roof, win);
  const dirt = parts.dirtLevel > 0.05 ? `<rect x="10" y="10" width="80" height="65" fill="#4b3621" opacity="${(parts.dirtLevel * 0.35).toFixed(2)}"/>` : '';
  const cracks = parts.hasCracks ? `<path d="M40,45 L44,55 L40,65 M60,40 L64,50 L58,58" stroke="#1e293b" stroke-width="1" fill="none" opacity="0.5"/>` : '';
  const weeds = parts.hasWeeds ? `<path d="M18,75 q2,-8 4,0 M22,75 q2,-10 4,0 M74,75 q2,-8 4,0" stroke="#16a34a" stroke-width="2" fill="none"/>` : '';
  return `<svg viewBox="0 0 100 80" class="${sizeClass} shrink-0">
    <g transform="${parts.tilt ? 'rotate(-6 50 70)' : ''}">${body}${dirt}${cracks}${weeds}</g>
  </svg>`;
}

// EXPフロート表示・実績バッジトースト。render()の後で毎回呼び、直前状態との差分から自動検知する。
let lastSkillExp = null;
function showExpFloats() {
  if (!state?.skills) return;
  if (lastSkillExp) {
    for (const key of Object.keys(state.skills)) {
      const before = lastSkillExp[key] ?? state.skills[key].exp;
      const gained = state.skills[key].exp - before;
      if (gained > 0) {
        const row = document.querySelector(`[data-skill="${key}"]`);
        if (row) {
          const f = el(`<span class="absolute right-0 -top-3 text-xs font-bold text-emerald exp-float">+${gained} EXP</span>`);
          row.appendChild(f);
          setTimeout(() => f.remove(), 1200);
        }
      }
    }
  }
  lastSkillExp = Object.fromEntries(Object.keys(state.skills).map(k => [k, state.skills[k].exp]));
}

  const colors = ['#f59e0b', '#10b981', '#3b82f6', '#ec4899', '#facc15'];

    const piece = el(`<div class="absolute rounded-sm" style="width:8px;height:8px;left:${45 + Math.random() * 10}%;top:40%;background:${colors[i % colors.length]};transition:transform 1.1s cubic-bezier(.2,.8,.4,1), opacity 1.1s;"></div>`);

    ${rows}</div>`);
  m.appendChild(box);
  const close = () => { m.classList.add('hidden'); m.classList.remove('flex'); m.innerHTML = ''; };
  box.querySelector('#notifs-close').addEventListener('click', close);
  box.querySelectorAll('.notif-dismiss').forEach(b => b.addEventListener('click', () => {
    const id = Number(b.dataset.id);
    state = L.markNotificationRead(state, id).state;
    save(); renderPanelRight(); openNotificationsModal();
  }));
  box.querySelectorAll('.notif-check').forEach(b => b.addEventListener('click', () => {
    const id = Number(b.dataset.id);
    const n = notifs.find(x => x.id === id);
    state = L.markNotificationRead(state, id).state;
    save(); renderPanelRight(); close();
    if (n) openPropertyFromNotif(n.propertyId);
  }));
}

// 値下げ・他決などの通知トースト。✕は表示を消すだけ（未読は残る）、✓は既読化＋物件詳細へ飛ぶ。
const _toasts = [];
function restackToasts() {
  let top = 16;
  _toasts.forEach(t => { t.style.top = top + 'px'; top += (t.offsetHeight || 44) + 8; });
}
function dismissToast(t) {
  const i = _toasts.indexOf(t); if (i < 0) return;
  _toasts.splice(i, 1);
  t.style.transition = 'opacity 0.3s'; t.style.opacity = '0';
  setTimeout(() => t.remove(), 300);
  restackToasts();
}
function showNotifToast(n) {
  const t = el(`<div class="fixed left-1/2 -translate-x-1/2 bg-amber-500 text-white rounded-lg shadow-lg px-3 py-2 z-[60] text-sm font-bold flex items-center gap-2">
    <span class="flex-1">🔔 ${n.message}</span>
    <button class="toast-check bg-white/25 rounded px-2 py-1 text-xs shrink-0" title="物件詳細へ">✓</button>
    <button class="toast-close bg-white/25 rounded px-2 py-1 text-xs shrink-0" title="閉じる">✕</button>
  </div>`);
  document.body.appendChild(t);
  _toasts.push(t);
  restackToasts();
  t.querySelector('.toast-close').addEventListener('click', (e) => { e.stopPropagation(); dismissToast(t); });
  t.querySelector('.toast-check').addEventListener('click', (e) => {
    e.stopPropagation();
    if (n.id != null) state = L.markNotificationRead(state, n.id).state;
    save(); renderPanelRight();
    dismissToast(t);
    openPropertyFromNotif(n.propertyId);
  });
}
// Enterキーで一番上（最初に出た）トーストから順に閉じる。
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && _toasts.length) { e.preventDefault(); dismissToast(_toasts[0]); }
});

// 営業ポップオーバー: 条件（ジャンル/エリア/築年帯）はボタンを押すと出てくる。
function openSearchModal() {
  const m = document.getElementById('search-modal');
  m.classList.remove('hidden'); m.classList.add('flex'); m.innerHTML = '';
  const close = () => { m.classList.add('hidden'); m.classList.remove('flex'); m.innerHTML = ''; };
  const genreBoxes = BASE_GENRE_ORDER.map(k =>
    `<label class="flex items-center gap-1 text-xs border rounded px-1 py-0.5"><input type="checkbox" class="sel-genre" value="${k}" ${searchSelection.genres.includes(k) ? 'checked' : ''}> ${L.GENRE[k].label}</label>`).join('');
  const box = el(`<div class="bg-white rounded-xl p-5 w-full max-w-md space-y-2">
    <div class="flex justify-between items-start gap-2"><h2 class="font-bold">🏘️ 不動産屋へ営業（行動力-40）</h2><button id="search-x" class="text-slate-400 text-xl leading-none shrink-0">✕</button></div>
    <div class="grid grid-cols-2 gap-1">${genreBoxes}</div>
    <label class="flex items-center gap-1 text-xs"><input type="checkbox" id="sel-wakeari" ${searchSelection.wakeari ? 'checked' : ''}> 訳あり物件も含める</label>
    <div class="flex gap-3 text-xs">
      <label><input type="checkbox" class="sel-area" value="local" ${searchSelection.areas.includes('local') ? 'checked' : ''}> 地方・郊外</label>
      <label><input type="checkbox" class="sel-area" value="urban" ${searchSelection.areas.includes('urban') ? 'checked' : ''}> 都心・駅近</label>
    </div>
    <div class="flex gap-3 text-xs">
      <label><input type="checkbox" class="sel-age" value="young" ${searchSelection.ages.includes('young') ? 'checked' : ''}> 築浅〜10年</label>
      <label><input type="checkbox" class="sel-age" value="mid" ${searchSelection.ages.includes('mid') ? 'checked' : ''}> 11〜25年</label>
      <label><input type="checkbox" class="sel-age" value="old" ${searchSelection.ages.includes('old') ? 'checked' : ''}> 築古26年〜</label>
    </div>
    <button id="btn-search" class="w-full bg-navy text-white rounded py-2 text-sm font-bold">この条件で探す</button>
    <button id="btn-search-close" class="w-full text-slate-400 text-sm">閉じる</button></div>`);
  m.appendChild(box);
  box.querySelectorAll('.sel-genre, .sel-area, .sel-age, #sel-wakeari').forEach(cb =>
    cb.addEventListener('change', () => { searchSelection = readSearchSelection(); }));
  box.querySelector('#btn-search').addEventListener('click', e => onSearchClick(e, close));
  box.querySelector('#btn-search-close').addEventListener('click', close);
  box.querySelector('#search-x').addEventListener('click', close);
}

// 営業ボタン: ポップオーバーを閉じ、電話＆街を駆け回る大げさな全画面演出を挟んでから検索(doSearch)を実行する。
function onSearchClick(e, closeModal) {
  const sel = readSearchSelection();
  if (!sel.genres.length || !sel.areas.length || !sel.ages.length) { alert('ジャンル・エリア・築年帯を1つ以上選んでください'); return; }
  if (state.actionPower < 40) { alert('行動力が足りません。翌月へ進むと回復します。'); return; }
  searchSelection = sel;   // モーダルを閉じる前に条件を確定（doSearchはこの値を使う。閉じたDOMを読み直さない）
  closeModal();
  playSearchMinigame(() => { const found = doSearch(); if (found) openListingsModal(); });
}

// 営業ミニゲーム: DIYと同様、📞電話でヒアリング・📄資料を集める・🏢不動産屋を訪問の各ステップを
// タップして進める。3つ全部こなすと doSearch を実行する（コスト・確率はロジックのまま不変）。
function playSearchMinigame(done) {
  const steps = [
    { icon: '📞', label: '不動産屋に電話でヒアリング' },
    { icon: '📄', label: '資料・図面を集める' },
    { icon: '🏢', label: '不動産屋を訪問して交渉' },
  ];
  let doneCount = 0;
  const overlay = el(`<div class="fixed inset-0 z-[70] bg-black/60 flex items-center justify-center p-4">
    <div class="bg-white rounded-xl p-5 w-full max-w-sm space-y-2 text-center">
      <h2 class="font-bold">🕵️ 物件を探す（営業活動）</h2>
      <div class="text-xs text-slate-500">各ステップをタップして営業を進めよう！</div>
      <div id="sm-steps" class="space-y-2"></div>
      <div class="text-[11px] text-slate-400">3つ全部こなすと出物が見つかるかも…</div>
    </div></div>`);
  document.body.appendChild(overlay);
  const stepsDiv = overlay.querySelector('#sm-steps');
  steps.forEach(stp => {
    const b = el(`<button class="sm-step w-full border rounded py-3 text-sm flex items-center justify-center gap-2"><span class="text-2xl">${stp.icon}</span>${stp.label}</button>`);
    stepsDiv.appendChild(b);
    b.addEventListener('click', () => {
      if (b.dataset.done) return;
      b.dataset.done = '1';
      b.classList.add('bg-emerald', 'text-white');
      b.innerHTML = `<span class="text-2xl">✅</span>${stp.label} 完了！`;
      sfxKnock();
      doneCount++;
      if (doneCount >= steps.length) setTimeout(() => { overlay.remove(); done(); }, 520);
    });
  });
}

// 🔒未開拓エリアをタップしたときの気の利いたティーザー（今後のアップデート解放を匂わせる）。
function openLockTeaser() {
  const overlay = el(`<div class="fixed inset-0 z-[65] bg-black/60 flex items-center justify-center p-4">
    <div class="bg-white rounded-xl p-6 max-w-xs text-center space-y-3">
      <div class="text-5xl">🔒🏝️</div>
      <h2 class="font-bold text-lg">未開拓エリア</h2>
      <p class="text-sm text-slate-600">ここはまだ手つかずの原野。<br>君がもっと大物大家になるか、時が満ちれば……いつか新しい街が広がるかも。</p>
      <p class="text-[11px] text-slate-400">🚧 今後のアップデートで解放予定</p>
      <button id="lock-ok" class="w-full bg-navy text-white rounded py-2 text-sm">わくわく…！</button>
    </div></div>`);
  document.body.appendChild(overlay);
  const close = () => overlay.remove();
  overlay.querySelector('#lock-ok').addEventListener('click', close);
  overlay.addEventListener('click', (e) => { if (e.target === overlay) close(); });
}

// 物件が見つかったかどうかを返す（呼び出し元が「見つかったら一覧を開く」判断に使う）。
// 条件は呼び出し前に searchSelection へ確定済み（モーダルを閉じた後に呼ばれるためDOMは読み直さない）。
function doSearch() {
  const { genres: baseGenres, areas, ages, wakeari } = searchSelection;
  if (!baseGenres.length || !areas.length || !ages.length) { alert('ジャンル・エリア・築年帯を1つ以上選んでください'); return false; }
  if (state.actionPower < 40) { alert('行動力が足りません。翌月へ進むと回復します。'); return false; }
  const genres = wakeari ? baseGenres.flatMap(k => [k, WAKEARI_MAP[k]]) : baseGenres;
  const r = L.doSalesSearch(state, { genres, areas, ages }, Math.random);
  state = r.state; pushLog(r.log); save(); render();
  return !!r.found;
}

// 翌月へ進む瞬間、シティビューの各建物から現金表示へコインが飛ぶ「回収」の動き。
function playCoinCollectAnimation() {
  const cashTile = document.getElementById('hud-cash');
  const spots = cityBuildingScreenPositions();
  if (!cashTile || !spots.length) return;
  const dest = cashTile.getBoundingClientRect();
  const destX = dest.left + dest.width / 2, destY = dest.top + dest.height / 2;
  spots.forEach((pos, i) => {
    const coin = el(`<div class="fixed z-50 text-xl pointer-events-none" style="left:${pos.x}px; top:${pos.y - 30}px; transition: left 0.7s ease-in, top 0.7s ease-in, opacity 0.7s;">🪙</div>`);
    document.body.appendChild(coin);
    setTimeout(() => {
      coin.style.left = destX + 'px'; coin.style.top = destY + 'px'; coin.style.opacity = '0.2';
      sfxCoin();
    }, i * 90 + 20);
    setTimeout(() => coin.remove(), i * 90 + 760);
  });
}

function onNextMonth() {
  if (state.properties.length) playCoinCollectAnimation();
  const nextMonth = state.month + 1;
  const settling = (state.pendingSales || []).filter(x => x.settleMonth <= nextMonth)
    .map(x => { const pp = state.properties.find(p => p.id === x.propertyId); return { sale: x, label: pp ? (pp.name || pp.label) : '物件' }; });
  const priorNotifIds = new Set((state.notifications || []).map(n => n.id));
  const r = L.advanceMonth(state, Math.random);
  state = r.state;
  (r.logs || []).forEach(pushLog);
  save(); render();
  const freshNotifs = (state.notifications || []).filter(n => !priorNotifIds.has(n.id));
  freshNotifs.forEach((n, i) => setTimeout(() => showNotifToast(n), 500 + i * 900));
  settling.forEach((s, i) => setTimeout(() => celebrate('売買成立！おめでとうございます',
    `${s.label} を ${L.yen(s.sale.price)} で売却`, '💰🎉'), i * 2200));
  if (r.pendingEvent) { showEvent(r.pendingEvent); return; }
  const withOffer = (state.listings || []).find(l => l.offer);
  if (withOffer) { showOfferModal(withOffer); return; }
  checkEnd();
}

function showEvent(pending) {
  const ev = L.EVENTS.find(e => e.id === pending.id);
  if (!ev) { checkEnd(); return; }
  const m = document.getElementById('event-modal');
  m.classList.remove('hidden'); m.classList.add('flex'); m.innerHTML = '';
  const box = el(`<div class="bg-white rounded-xl p-5 w-full max-w-md space-y-3"><h2 class="font-bold">${ev.title}</h2></div>`);
  ev.choices.forEach(ch => {
    const b = el(`<button class="w-full border rounded py-2 text-sm">${ch.label}</button>`);
    b.addEventListener('click', () => {
      state = ch.apply(structuredClone(state), pending.targetId);
      pushLog(ch.log);
      m.classList.add('hidden'); m.classList.remove('flex'); m.innerHTML = '';
      save(); render();
      const withOffer = (state.listings || []).find(l => l.offer);
      if (withOffer) { showOfferModal(withOffer); return; }
      checkEnd();
    });
    box.appendChild(b);
  });
  m.appendChild(box);
}

function endScreen(title, detail, color){
  const m = document.getElementById('setup-modal');
  m.classList.remove('hidden'); m.innerHTML='';
  m.appendChild(el(`<div class="bg-white rounded-xl p-6 text-center space-y-3 max-w-md">
    <h2 class="font-bold text-2xl ${color}">${title}</h2><p class="text-sm">${detail}</p>
    <button onclick="localStorage.removeItem('${SAVE_KEY}');location.reload()" class="bg-navy text-white rounded px-4 py-2">もう一度プレイ</button></div>`));
}

function checkEnd() {
  if (L.isClearedV2(state)) return endScreen('🎉 ゲームクリア！', `目標（${state.goal.type === 'networth' ? '純資産' : '月CF'} ${L.yen(state.goal.amount)}）を達成した。メガ大家への道、達成！`, 'text-emerald');
  if (L.isBankrupt(state)) return endScreen('💥 自己破産', '手元現金がマイナスに。ゲームオーバー。', 'text-red-600');
  if (L.isTimeUpV2(state)) return endScreen('⏰ タイムアップ', '期限までに目標未達。', 'text-red-600');
}

wireGlobalAudioHooks();

// シティビュー初期化（建物タップ→詳細、売出し看板タップ→買付フロー）
initCity(document.getElementById('city-canvas'), {
  onTapProperty: (id) => { if (state) openDetail(id, 'owned'); },
  onTapMarket: (id) => { if (state) openPurchase(id); },
  onTapMarketDetail: (id) => { if (state) openDetail(id, 'market'); },   // 地図のピンをクリック→詳細画面
  onTapLock: () => openLockTeaser(),                                      // 🔒未開拓エリアをクリック→ティーザー
});

// 起動
if (load()) { document.getElementById('setup-modal').classList.add('hidden'); render(); }
else showSetup();

document.getElementById('btn-reset').addEventListener('click', () => {
  if (confirm('データをリセットしますか？')) { localStorage.removeItem(SAVE_KEY); location.reload(); }
});

const btnMute = document.getElementById('btn-mute');
if (btnMute) {
  btnMute.textContent = muted ? '🔇' : '🔊';
  btnMute.addEventListener('click', () => {
    setMuted(!muted);
    updateMuteButton();
  });
}
const btnBgm = document.getElementById('btn-bgm');
if (btnBgm) btnBgm.addEventListener('click', openBgmModal);
  </script>
